<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=500, height=160">
<title>邦德猫 v0.3.25</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:500px; height:160px; overflow:hidden; background:transparent; font-family:'Segoe UI',sans-serif; user-select:none; }
#titlebar { border-radius: 8px 8px 0 0;
  height:24px; background:rgba(15,15,30,0.75); display:flex; align-items:center; padding:0 6px;
  cursor:default; border-bottom:1px solid #2a2a4a;
}
#titlebar .title { color:#f0a040; font-size:11px; font-weight:bold; white-space:nowrap; }
#titlebar .stats { color:#ccc; font-size:10px; margin-left:auto; white-space:nowrap; letter-spacing:0.5px; }
#titlebar .btns { margin-left:12px; display:flex; gap:2px; }
#titlebar .btns button {
  background:none; border:1px solid #333; color:#aaa; font-size:11px; width:22px; height:18px;
  cursor:pointer; border-radius:3px; display:flex; align-items:center; justify-content:center;
  padding:0; line-height:1;
}
#titlebar .btns button:hover { background:#333; color:#fff; border-color:#555; }
#titlebar .btns button:last-child:hover { background:#a33; }
canvas { display:block; }
#modal {
  display:none; position:fixed; top:0; left:0; width:500px; height:160px;
  background:rgba(0,0,0,0.85); z-index:100; flex-direction:column; align-items:center; justify-content:center;
}
#modal.open { display:flex; }
#modal .panel {
  background:#1a1a2e; border:2px solid #f0a040; border-radius:8px; padding:12px 16px;
  min-width:320px; max-width:460px; max-height:130px; overflow-y:auto; color:#eee; font-size:11px;
}
#modal .panel h3 { color:#f0a040; font-size:13px; margin-bottom:8px; text-align:center; }
#modal .panel .row { display:flex; justify-content:space-between; align-items:center; padding:3px 0; border-bottom:1px solid #222; }
#modal .panel .row:last-child { border:none; }
#modal .panel button {
  background:#f0a040; color:#000; border:none; padding:3px 10px; border-radius:4px;
  cursor:pointer; font-size:10px; font-weight:bold;
}
#modal .panel button:hover { background:#ffb860; }
#modal .panel button.owned { background:#555; color:#999; cursor:default; }
#modal .panel button.equipped { background:#4a4; color:#fff; cursor:default; }
#modal .close-hint { color:#666; font-size:9px; margin-top:6px; }
#modal .panel::-webkit-scrollbar { width:5px; }
#modal .panel::-webkit-scrollbar-thumb { background:#555; border-radius:3px; }
#modal .panel h3 { border-bottom:1px solid #333; padding-bottom:4px; }
</style>
</head>
<body>
<div id="titlebar" data-tauri-drag-region>
  <span class="title" data-tauri-drag-region>邦德猫 v0.3.25</span>
  <span class="stats" id="stats" data-tauri-drag-region></span>
  <div class="btns">
    <button onclick="openModal('backpack')">📦</button>
    <button onclick="openModal('shop')">🛒</button>
    <button onclick="openModal('skills')">🌟</button>
    <button onclick="openModal('achievements')">🏆</button>
    <button onclick="hideWindow()">✕</button>
  </div>
</div>
<canvas id="game" width="500" height="136"></canvas>
<div id="xpbar" style="position:absolute;top:24px;left:0;width:0;height:2px;background:linear-gradient(90deg,#f0a040,#ffd880);pointer-events:none;z-index:50;transition:width 0.2s;"></div>
<div id="axwarn" style="display:none;position:fixed;top:24px;left:0;width:500px;background:#cc3300;color:#fff;font-size:10px;padding:4px 8px;z-index:200;text-align:center;">
  ⚠️ 需要辅助功能权限 <button onclick="openAxSettings()" style="background:#fff;color:#c30;border:none;padding:1px 6px;border-radius:3px;font-size:9px;cursor:pointer;margin-left:4px;">打开设置</button>
  <span style="font-size:8px;display:block;margin-top:2px;">授权后需重启App</span>
</div>

<div id="modal"><div class="panel" id="modalContent"></div><div class="close-hint">ESC 关闭</div></div>

<script>
// ============ IMAGE ASSETS ============
const IMG = {};
const IMG_SOURCES = {
  cat: 'assets/cat.png',
  slime: 'assets/slime.png',
  bat: 'assets/bat.png',
  skull: 'assets/skull.png',
  goblin: 'assets/goblin.png',
  dragon: 'assets/dragon_boss.png',
  chestN: 'assets/chest_normal.png',
  chestR: 'assets/chest_rare.png',
  chestE: 'assets/chest_epic.png',
  ground: 'assets/ground.png',
  swordWep: 'assets/weapon_sword.png',
  hammerWep: 'assets/weapon_hammer.png',
  wandWep: 'assets/weapon_wand.png',
};
let IMG_LOADED = 0;
const IMG_TOTAL = Object.keys(IMG_SOURCES).length;
for (const [k, src] of Object.entries(IMG_SOURCES)) {
  const im = new Image();
  im.onload = () => { IMG_LOADED++; };
  im.onerror = () => { console.error('img failed', src); IMG_LOADED++; };
  im.src = src;
  IMG[k] = im;
}
// Particle colors per monster type (since no more sprite colors)
const MONSTER_PARTICLE_COLOR = { slime:'#44cc44', bat:'#9944cc', skull:'#e8e8e8', goblin:'#66aa44', dragon:'#cc2222' };

// ============ DRAW HELPER ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function drawImg(img, x, y, w, h, flash) {
  if (!img || !img.complete) return;
  ctx.drawImage(img, x, y, w, h);
  if (flash) {
    // White tint overlay for hit feedback
    ctx.save();
    ctx.globalCompositeOperation = 'source-atop';
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y, w, h);
    ctx.restore();
  }
}

// ============ GAME STATE ============
const SAVE_KEY = 'bondcat_v4';
let state = loadState();

function defaultState() {
  return {
    gold: 0, kills: 0, level: 1, xp: 0,
    catHp: 100, catMaxHp: 100,
    weapon: 0, outfit: 0,
    chests: [0, 0, 0],
    weaponOwned: [true, false, false],
    outfitOwned: [true, false, false],
    skills: { attack: 0, vitality: 0, greed: 0, luck: 0 },
    achievements: [],
    bossKills: 0,
    maxCombo: 0,
  };
}
function loadState() {
  try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if (!s || s.gold === undefined) return defaultState(); if (!s.skills) s.skills = { attack:0, vitality:0, greed:0, luck:0 }; if (s.skills.luck === undefined) s.skills.luck = 0; if (!s.achievements) s.achievements = []; if (s.bossKills === undefined) s.bossKills = 0; if (s.maxCombo === undefined) s.maxCombo = 0; return s; }
  catch(e) { return defaultState(); }
}
function saveState() { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }

const WEAPONS = [{name:'木剑',dmg:1,cost:0},{name:'铁锤',dmg:3,cost:500},{name:'魔杖',dmg:6,cost:2000}];
const OUTFITS = [{name:'普通',cost:0},{name:'骑士',cost:1000},{name:'魔法',cost:3000}];

// ============ ENTITIES ============
let monsters = [];
let particles = [];
let floatTexts = [];
let chestDrops = [];
let attackAnim = 0;
let attackArc = 0;
let catFlash = 0;
let comboCount = 0;
let comboTimer = 0;
let lastComboMilestone = 0;
let catDead = 0;
let spawnTimer = 0;
let modalOpen = false;
let stars = [];

for (let i = 0; i < 40; i++) {
  stars.push({ x: Math.random() * 500, y: Math.random() * 100, s: Math.random() * 1.5 + 0.5, phase: Math.random() * Math.PI * 2 });
}
let weatherMode = 'clear'; // clear|rain|snow
let weatherTimer = 30;
let weatherDrops = [];

const MONSTER_TYPES = [
  { name:'史莱姆', img:'slime', size:40, hp:3, xpVal:2, goldMin:3, goldMax:8, minLv:1, isBoss:false },
  { name:'蝙蝠', img:'bat', size:40, hp:5, xpVal:4, goldMin:5, goldMax:12, minLv:2, isBoss:false },
  { name:'骷髅', img:'skull', size:44, hp:8, xpVal:7, goldMin:8, goldMax:20, minLv:4, isBoss:false },
  { name:'哥布林', img:'goblin', size:48, hp:16, xpVal:15, goldMin:20, goldMax:50, minLv:6, isBoss:false },
  { name:'赤龙王', img:'dragon', size:64, hp:120, xpVal:100, goldMin:250, goldMax:600, minLv:10, isBoss:true },
];

function pickMonsterType() {
  const available = [];
  for (let i = 0; i < MONSTER_TYPES.length; i++) {
    const t = MONSTER_TYPES[i];
    if (state.level < t.minLv) continue;
    // Boss has low base weight
    if (t.isBoss) { available.push({ i, w: 1 }); continue; }
    // Recent tiers weighted higher
    const tierAge = state.level - t.minLv;
    const w = Math.max(1, 10 - tierAge);
    available.push({ i, w });
  }
  const total = available.reduce((s, x) => s + x.w, 0);
  let r = Math.random() * total;
  for (const x of available) { r -= x.w; if (r <= 0) return x.i; }
  return available[0].i;
}

function spawnMonster() {
  if (monsters.length >= 4) return;
  const typeIdx = pickMonsterType();
  const t = MONSTER_TYPES[typeIdx];
  const hpMult = 1 + (state.level - 1) * 0.3;
  const isElite = !t.isBoss && Math.random() < 0.1;
  const eliteHp = isElite ? 2 : 1;
  const finalHp = Math.ceil(t.hp * hpMult * eliteHp);
  monsters.push({
    type: typeIdx, x: 360 + Math.random() * 100, y: 136 - t.size - 8,
    hp: finalHp, maxHp: finalHp, elite: isElite,
    speed: t.isBoss ? 12 : (25 + Math.random() * 10), flash: 0, atkTimer: 0,
  });
  if (t.isBoss) {
    floatTexts.push({ x: 250, y: 30, text: '⚠ BOSS 来袭!', color: '#ff4040', life: 2.0 });
  } else if (isElite) {
    floatTexts.push({ x: 250, y: 30, text: '✨ 精英怪!', color: '#ffd700', life: 1.5 });
  }
}

// ============ ATTACK ============
function comboMultiplier() {
  if (comboCount >= 30) return 4;
  if (comboCount >= 20) return 3;
  if (comboCount >= 10) return 2;
  if (comboCount >= 5) return 1.5;
  return 1;
}

function playerAttack() {
  if (catDead > 0) return;
  attackAnim = 0.3;
  attackArc = 1.0;
  const mult = comboMultiplier();
  const atkBuff = 1 + (state.skills.attack * 0.1);
  const base = (WEAPONS[state.weapon].dmg + Math.floor(state.level * 0.5)) * atkBuff;
  const critChance = 0.05 + (state.skills.luck * 0.02);
  const isCrit = Math.random() < critChance;
  const dmg = Math.ceil(base * mult * (isCrit ? 2 : 1));
  let hit = false, target = null;
  for (const m of monsters) { if (m.x < 200) { target = m; break; } }
  if (!target) for (const m of monsters) { if (m.x < 300) { target = m; break; } }
  if (target) {
    target.hp -= dmg;
    target.flash = 0.15;
    hit = true;
    const hitColor = isCrit ? '#ff8040' : (mult >= 2 ? '#ffff40' : (mult >= 1.5 ? '#80ffff' : '#ffffff'));
    floatTexts.push({ x: target.x + 10, y: target.y - 5, text: (isCrit ? 'CRIT -' : '-') + dmg, color: hitColor, life: 0.8 });
    if (isCrit) {
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: target.x + target.size/2 || target.x + 15, y: target.y + 15,
          vx: (Math.random()-0.5)*160, vy: -Math.random()*160,
          color: '#ff8040', life: 0.6,
          size: 3, glow: true, gravity: 150, drag: 0.95,
        });
      }
    }
    if (target.hp <= 0) killMonster(target);
    comboCount++;
    comboTimer = 2.0;
    if (comboCount > state.maxCombo) state.maxCombo = comboCount;
    const milestones = [5,10,20,30];
    for (const ms of milestones) {
      if (comboCount === ms && lastComboMilestone < ms) {
        lastComboMilestone = ms;
        floatTexts.push({ x: 250, y: 50, text: 'COMBO x' + ms + '!', color: '#ffff00', life: 1.5 });
        break;
      }
    }
  }
}

function killMonster(m) {
  const t = MONSTER_TYPES[m.type];
  state.kills++;
  state.xp += t.xpVal;
  const xpNeeded = state.level * 15;
  if (state.xp >= xpNeeded) { state.level++; state.xp -= xpNeeded; state.catMaxHp += 10; state.catHp = state.catMaxHp;
    floatTexts.push({ x: 80, y: 20, text: 'LEVEL UP!', color: '#ffff00', life: 1.5 });
  }
  // particles (boss = big explosion)
  const partCount = t.isBoss ? 40 : 14;
  const partSpeed = t.isBoss ? 220 : 120;
  for (let i = 0; i < partCount; i++) {
    particles.push({
      x: m.x + t.size/2, y: m.y + t.size/2,
      vx: (Math.random()-0.5)*partSpeed, vy: (Math.random()-0.5)*partSpeed,
      color: MONSTER_PARTICLE_COLOR[t.img] || '#ffffff',
      life: 0.6 + Math.random()*0.5,
      size: t.isBoss ? 5 : 3,
      glow: t.isBoss,
      gravity: 120, drag: 0.98,
    });
  }
  if (t.isBoss) {
    floatTexts.push({ x: 250, y: 40, text: '💥 BOSS 已斩!', color: '#ffff40', life: 2.0 });
  }
  // chest drop 80%
  if (Math.random() < 0.7) {
    const r = Math.random();
    const rarity = r < 0.6 ? 0 : (r < 0.9 ? 1 : 2);
    const greedBuff = 1 + (state.skills.greed * 0.1); const gold = Math.ceil((t.goldMin + Math.floor(Math.random() * (t.goldMax - t.goldMin + 1))) * greedBuff);
    chestDrops.push({ x: m.x, y: m.y, rarity, gold: m.elite ? gold * 3 : gold, timer: 2.0, collected: false });
  }
  saveState();
}

function monsterAttack(m) {
  if (catDead > 0) return;
  const t = MONSTER_TYPES[m.type]; const dmg = t.isBoss ? (10 + Math.floor(state.level * 0.8)) : (3 + m.type * 2 + Math.floor(state.level * 0.5));
  state.catHp -= dmg;
  catFlash = 0.2;
  floatTexts.push({ x: 80, y: 40, text: '-' + dmg, color: '#ff4444', life: 0.8 });
  if (state.catHp <= 0) {
    state.catHp = 0;
    catDead = 3.0;
    const lost = Math.floor(state.gold * 0.2);
    state.gold -= lost;
    if (lost > 0) floatTexts.push({ x: 80, y: 30, text: '-' + lost + '💰', color: '#ff6666', life: 1.2 });
  }
  saveState();
}

// ============ MODAL ============
function openModal(type) {
  modalOpen = true;
  const el = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  el.classList.add('open');
  if (type === 'backpack') {
    const names = ['普通宝箱🟫','稀有宝箱🔵','史诗宝箱🟣'];
    let total = state.chests[0] + state.chests[1] + state.chests[2];
    let html = '<h3>📦 背包</h3>';
    for (let i = 0; i < 3; i++) html += `<div class="row"><span>${names[i]}</span><span>x${state.chests[i]}</span></div>`;
    html += `<div style="text-align:center;margin-top:8px"><button onclick="openAllChests()" ${total===0?'class="owned"':''}>一键全开 (${total})</button></div>`;
    content.innerHTML = html;
  } else if (type === 'shop') {
    let html = '<h3>🛒 商城</h3>';
    html += '<div style="margin-bottom:6px;color:#f0a040;font-size:10px">💰 ' + state.gold + ' 金币</div>';
    html += '<div style="font-size:10px;color:#888;margin-bottom:4px">⚔️ 武器</div>';
    for (let i = 0; i < WEAPONS.length; i++) {
      const w = WEAPONS[i];
      const owned = state.weaponOwned[i];
      const equipped = state.weapon === i;
      let btn = '';
      if (equipped) btn = '<button class="equipped">装备中</button>';
      else if (owned) btn = `<button onclick="equipWeapon(${i})">装备</button>`;
      else btn = `<button onclick="buyWeapon(${i})">${w.cost}💰</button>`;
      html += `<div class="row"><span>${w.name} (DMG+${w.dmg})</span>${btn}</div>`;
    }
    html += '<div style="font-size:10px;color:#888;margin:4px 0">🎨 装扮</div>';
    for (let i = 0; i < OUTFITS.length; i++) {
      const o = OUTFITS[i];
      const owned = state.outfitOwned[i];
      const equipped = state.outfit === i;
      let btn = '';
      if (equipped) btn = '<button class="equipped">穿着中</button>';
      else if (owned) btn = `<button onclick="equipOutfit(${i})">穿上</button>`;
      else btn = `<button onclick="buyOutfit(${i})">${o.cost}💰</button>`;
      html += `<div class="row"><span>${o.name}</span>${btn}</div>`;
    }
    content.innerHTML = html;
  }
}

const ACHIEVEMENTS = [
  { id:'first_blood', name:'首杀', desc:'击败第一只怪物', check: s => s.kills >= 1, reward: 10 },
  { id:'slayer_50', name:'猎人', desc:'累计击杀 50', check: s => s.kills >= 50, reward: 100 },
  { id:'slayer_500', name:'屠戮者', desc:'累计击杀 500', check: s => s.kills >= 500, reward: 1000 },
  { id:'rich', name:'小康', desc:'持有 1000 金币', check: s => s.gold >= 1000, reward: 200 },
  { id:'tycoon', name:'巨贾', desc:'持有 10000 金币', check: s => s.gold >= 10000, reward: 2000 },
  { id:'level_5', name:'学徒', desc:'达到 5 级', check: s => s.level >= 5, reward: 50 },
  { id:'level_15', name:'大师', desc:'达到 15 级', check: s => s.level >= 15, reward: 500 },
  { id:'combo_10', name:'连击手', desc:'连击 10', check: s => s.maxCombo >= 10, reward: 100 },
  { id:'combo_30', name:'机枪手', desc:'连击 30', check: s => s.maxCombo >= 30, reward: 500 },
  { id:'boss_slayer', name:'屠龙者', desc:'首次击杀 BOSS', check: s => s.bossKills >= 1, reward: 1000 },
];

function checkAchievements() {
  let unlocked = false;
  for (const a of ACHIEVEMENTS) {
    if (state.achievements.includes(a.id)) continue;
    if (a.check(state)) {
      state.achievements.push(a.id);
      state.gold += a.reward;
      floatTexts.push({ x: 250, y: 30, text: '🏆 ' + a.name, color: '#ffd700', life: 2.5 });
      floatTexts.push({ x: 250, y: 50, text: '+' + a.reward + '💰', color: '#ffd700', life: 2.5 });
      for (let i = 0; i < 30; i++) {
        particles.push({
          x: 250, y: 40,
          vx: (Math.random()-0.5)*200, vy: -Math.random()*180 - 40,
          color: '#ffd700', life: 1.0 + Math.random()*0.5,
          size: 4, glow: true, gravity: 160, drag: 0.97,
        });
      }
      unlocked = true;
    }
  }
  if (unlocked) saveState();
}

function skillCost(level) { return 50 * (level + 1) * (level + 1); }

function buySkill(key) {
  const cur = state.skills[key];
  if (cur >= 10) return;
  const cost = skillCost(cur);
  if (state.gold < cost) return;
  state.gold -= cost;
  state.skills[key] = cur + 1;
  if (key === 'vitality') { state.catMaxHp += 20; state.catHp = Math.min(state.catMaxHp, state.catHp + 20); }
  saveState();
  openModal('skills');
}

function closeModal() { modalOpen = false; document.getElementById('modal').classList.remove('open'); }

function openAllChests() {
  let totalGold = 0;
  let totalCount = state.chests[0] + state.chests[1] + state.chests[2];
  const goldPer = [5, 15, 40];
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < state.chests[i]; j++) {
      totalGold += goldPer[i] + Math.floor(Math.random() * goldPer[i]);
    }
    state.chests[i] = 0;
  }
  if (totalGold > 0) {
    state.gold += totalGold;
    floatTexts.push({ x: 200, y: 50, text: '+' + totalGold + '💰', color: '#FFD700', life: 1.5 });
    // Golden sparkle burst at cat
    for (let i = 0; i < Math.min(60, 10 + totalCount * 3); i++) {
      particles.push({
        x: 100, y: 80,
        vx: (Math.random()-0.5)*180, vy: -Math.random()*200 - 50,
        color: Math.random() < 0.5 ? '#FFD700' : '#ffff80',
        life: 0.8 + Math.random()*0.7,
        size: 4, glow: true,
        gravity: 200, drag: 0.97,
      });
    }
    saveState();
  }
  openModal('backpack');
}

function buyWeapon(i) {
  if (state.gold >= WEAPONS[i].cost && !state.weaponOwned[i]) {
    state.gold -= WEAPONS[i].cost; state.weaponOwned[i] = true; state.weapon = i; saveState(); openModal('shop');
  }
}
function equipWeapon(i) { state.weapon = i; saveState(); openModal('shop'); }
function buyOutfit(i) {
  if (state.gold >= OUTFITS[i].cost && !state.outfitOwned[i]) {
    state.gold -= OUTFITS[i].cost; state.outfitOwned[i] = true; state.outfit = i; saveState(); openModal('shop');
  }
}
function equipOutfit(i) { state.outfit = i; saveState(); openModal('shop'); }

function resetData() { state = defaultState(); monsters = []; particles = []; floatTexts = []; chestDrops = []; weatherDrops = []; comboCount = 0; comboTimer = 0; lastComboMilestone = 0; saveState(); }

// ============ UPDATE & RENDER ============
let lastTime = performance.now();

function update(dt) {
  if (modalOpen) return;

  // spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) { spawnTimer = 4; spawnMonster(); }

  // weather cycle
  weatherTimer -= dt;
  if (weatherTimer <= 0) {
    weatherTimer = 20 + Math.random() * 40;
    const r = Math.random();
    weatherMode = r < 0.6 ? 'clear' : (r < 0.85 ? 'rain' : 'snow');
    weatherDrops = [];
  }
  // spawn drops
  if (weatherMode === 'rain') {
    for (let i = 0; i < 3; i++) {
      weatherDrops.push({ x: Math.random()*500, y: -5, vx: -40, vy: 380, type: 'rain', life: 1.0 });
    }
  } else if (weatherMode === 'snow') {
    if (Math.random() < 0.5) {
      weatherDrops.push({ x: Math.random()*500, y: -5, vx: Math.sin(Date.now()*0.001)*15, vy: 40 + Math.random()*30, type: 'snow', life: 3.0 });
    }
  }
  for (const d of weatherDrops) {
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    if (d.type === 'snow') d.vx = Math.sin((Date.now() + d.y) * 0.002) * 15;
    d.life -= dt;
    if (d.y > 128) d.life = 0;
  }
  weatherDrops = weatherDrops.filter(d => d.life > 0);

  // cat dead
  if (catDead > 0) {
    catDead -= dt;
    if (catDead <= 0) { state.catHp = state.catMaxHp; saveState(); }
  }

  // attack anim
  if (attackAnim > 0) attackAnim -= dt;
  if (attackArc > 0) attackArc -= dt * 4;

  // combo timer (resets combo if no hit in 2s)
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; lastComboMilestone = 0; }
  }

  // cat flash
  if (catFlash > 0) catFlash -= dt;

  // monsters
  for (const m of monsters) {
    if (m.hp <= 0) continue;
    if (m.flash > 0) m.flash -= dt;
    if (m.x > 130) {
      m.x -= m.speed * dt;
    } else {
      m.atkTimer += dt;
      if (m.atkTimer >= 2) { m.atkTimer = 0; monsterAttack(m); }
    }
  }
  monsters = monsters.filter(m => m.hp > 0);

  // chest drops
  for (const c of chestDrops) {
    c.timer -= dt;
    if (c.timer <= 0 && !c.collected) {
      c.collected = true;
      state.chests[c.rarity]++;
      state.gold += c.gold;
      floatTexts.push({ x: c.x, y: c.y - 10, text: '+' + c.gold + '💰', color: '#FFD700', life: 1.0 });
      saveState();
    }
    if (c.collected || c.timer <= 0) {
      // fly toward cat
      const pullSpeed = 5 + Math.max(0, state.skills.luck) * 0.5;
      c.x += (80 - c.x) * dt * pullSpeed;
      c.y += (80 - c.y) * dt * pullSpeed;
    }
  }
  chestDrops = chestDrops.filter(c => !c.collected || Math.abs(c.x - 80) > 5);

  // particles (with gravity + drag)
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += (p.gravity || 0) * dt;
    p.vx *= p.drag !== undefined ? p.drag : 1;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  // float texts
  for (const f of floatTexts) { f.y -= 30 * dt; f.life -= dt; }
  floatTexts = floatTexts.filter(f => f.life > 0);
}

function render(time) {
  // clear to transparent
  ctx.clearRect(0, 0, 500, 136);

  // day/night factor (0=noon, 1=midnight)
  const nowHr = new Date().getHours() + new Date().getMinutes() / 60;
  // 6-18 is day, peak at 12; 18-6 is night, peak at 0
  const distFromNoon = Math.min(Math.abs(nowHr - 12), 24 - Math.abs(nowHr - 12));
  const nightF = Math.min(1, Math.max(0, (distFromNoon - 3) / 6));

  // stars (night only)
  if (nightF > 0.1) {
    for (const s of stars) {
      const bri = (0.3 + 0.7 * Math.abs(Math.sin(time * 0.001 + s.phase))) * nightF;
      ctx.fillStyle = `rgba(255,255,255,${bri})`;
      ctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.s), Math.ceil(s.s));
    }
  }

  // celestial body: moon at night, sun at day
  const celX = 440, celY = 24;
  if (nightF > 0.5) {
    // Moon
    ctx.save();
    ctx.globalAlpha = nightF;
    ctx.fillStyle = '#fffacd';
    ctx.beginPath(); ctx.arc(celX, celY, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(15,15,30,0.85)';
    ctx.beginPath(); ctx.arc(celX - 3, celY - 2, 9, 0, Math.PI*2); ctx.fill();
    // glow
    ctx.globalAlpha = nightF * 0.25;
    ctx.fillStyle = '#fffacd';
    ctx.beginPath(); ctx.arc(celX, celY, 16, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  } else if (nightF < 0.3) {
    // Sun
    ctx.save();
    ctx.globalAlpha = 1 - nightF;
    // Rays
    ctx.strokeStyle = '#ffd840';
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4 + time * 0.0005;
      ctx.beginPath();
      ctx.moveTo(celX + Math.cos(a) * 12, celY + Math.sin(a) * 12);
      ctx.lineTo(celX + Math.cos(a) * 16, celY + Math.sin(a) * 16);
      ctx.stroke();
    }
    ctx.fillStyle = '#ffe040';
    ctx.beginPath(); ctx.arc(celX, celY, 10, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = (1 - nightF) * 0.3;
    ctx.beginPath(); ctx.arc(celX, celY, 18, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // weather drops
  for (const d of weatherDrops) {
    if (d.type === 'rain') {
      ctx.strokeStyle = 'rgba(140,180,255,0.7)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.vx*0.015, d.y + d.vy*0.015);
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(d.x, d.y, 2, 2);
    }
  }

  // grass ground (tiled)
  if (IMG.ground && IMG.ground.complete) {
    for (let i = 0; i < 500; i += 64) {
      ctx.drawImage(IMG.ground, i, 120, 64, 16);
    }
  } else {
    ctx.fillStyle = '#1a5c1a';
    ctx.fillRect(0, 128, 500, 8);
  }

  // chest drops
  for (const c of chestDrops) {
    const cimg = c.rarity === 0 ? IMG.chestN : (c.rarity === 1 ? IMG.chestR : IMG.chestE);
    drawImg(cimg, c.x, c.y, 24, 24, false);
  }

  // monsters
  for (const m of monsters) {
    const t = MONSTER_TYPES[m.type];
    drawImg(IMG[t.img], m.x, m.y, t.size, t.size, m.flash > 0);
    if (m.elite) {
      // gold sparkle tint
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      ctx.globalAlpha = 0.35 + 0.15 * Math.sin(time * 0.008);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(m.x, m.y, t.size, t.size);
      ctx.restore();
    }
    // hp bar
    const w = t.size;
    const hpRatio = m.hp / m.maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(m.x, m.y - 5, w, 3);
    ctx.fillStyle = hpRatio > 0.5 ? '#4a4' : '#a44';
    ctx.fillRect(m.x, m.y - 5, w * hpRatio, 3);
  }

  // cat
  const CAT_SIZE = 52;
  const catX = 80, catBaseY = 136 - CAT_SIZE - 8;
  let catY = catBaseY;
  if (attackAnim > 0) catY -= 2;
  const catVisible = catDead > 0 ? (Math.floor(catDead * 6) % 2 === 0) : true;
  if (catVisible) {
    drawImg(IMG.cat, catX, catY, CAT_SIZE, CAT_SIZE, catFlash > 0);
    // outfit tint overlay
    if (state.outfit !== 0) {
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = state.outfit === 1 ? '#4466cc' : '#cc44ff';
      ctx.fillRect(catX, catY, CAT_SIZE, CAT_SIZE);
      ctx.restore();
    }
  }

  // cat hp bar
  const hpRatio = state.catHp / state.catMaxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(catX, catY - 7, CAT_SIZE, 4);
  ctx.fillStyle = hpRatio > 0.3 ? '#4c4' : '#c44';
  ctx.fillRect(catX, catY - 7, CAT_SIZE * hpRatio, 4);

  // weapon swing (rotating PNG during attack)
  if (attackArc > 0) {
    const wepKey = state.weapon === 0 ? 'swordWep' : (state.weapon === 1 ? 'hammerWep' : 'wandWep');
    const wepImg = IMG[wepKey];
    if (wepImg && wepImg.complete) {
      const pivotX = catX + CAT_SIZE - 4;
      const pivotY = catY + CAT_SIZE * 0.45;
      const swingProgress = 1 - attackArc; // 0→1 across swing
      const angle = -Math.PI * 0.7 + swingProgress * Math.PI * 1.1;
      ctx.save();
      ctx.translate(pivotX, pivotY);
      ctx.rotate(angle);
      const wSize = 28;
      ctx.drawImage(wepImg, 0, -wSize/2, wSize, wSize);
      ctx.restore();
      // Slash trail (white arc)
      ctx.strokeStyle = `rgba(255,255,255,${attackArc * 0.6})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pivotX, pivotY, 24, -Math.PI * 0.7, angle);
      ctx.stroke();
    }
  }

  // particles (size + glow)
  for (const p of particles) {
    const a = Math.min(1, p.life * 2);
    const sz = p.size || 3;
    if (p.glow) {
      ctx.globalAlpha = a * 0.4;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - sz, p.y - sz, sz * 3, sz * 3);
    }
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, sz, sz);
  }
  ctx.globalAlpha = 1;

  // float texts
  ctx.textAlign = 'center';
  for (const f of floatTexts) {
    const a = Math.min(1, f.life * 2);
    ctx.globalAlpha = a;
    ctx.fillStyle = f.color;
    let fontSize = 11;
    if (f.text.includes('LEVEL') || f.text.includes('BOSS') || f.text.includes('COMBO')) fontSize = 15;
    else if (f.text.startsWith('CRIT')) fontSize = 14;
    else if (f.text.startsWith('🏆')) fontSize = 14;
    ctx.font = 'bold ' + fontSize + 'px monospace';
    // text shadow for readability
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 3;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.textAlign = 'start';
}

function gameLoop(now) {
  try {
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    update(dt);
    render(now);
    // update stats
    const comboStr = comboCount >= 2 ? ` 🔥${comboCount}x${comboMultiplier()}` : '';
    if (!window._achTick) window._achTick = 0;
    window._achTick++;
    if (window._achTick % 60 === 0) checkAchievements();
    const xpNeeded = state.level * 15; const xpPct = Math.min(100, (state.xp / xpNeeded) * 100); document.getElementById('xpbar').style.width = xpPct + '%';
    document.getElementById('stats').textContent = `💰${state.gold} ⚔️${state.kills} Lv${state.level}${comboStr}`;
  } catch(e) { console.error(e); }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// ============ INPUT ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { if (modalOpen) closeModal(); return; }
  if (modalOpen) return;
  playerAttack();
});

canvas.addEventListener('click', () => {
  if (modalOpen) return;
  playerAttack();
});

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ============ TAURI ============
async function hideWindow() {
  if (window.__TAURI__) {
    await window.__TAURI__.window.getCurrentWindow().hide();
  }
}

if (window.__TAURI__) {
  const { listen } = window.__TAURI__.event;
  listen('open-backpack', () => openModal('backpack'));
  listen('open-shop', () => openModal('shop'));
  listen('reset-data', () => resetData());
  let lastGlobal = 0;
  window.inputHits = 0;
  listen('global-input', (e) => {
    window.inputHits = typeof e.payload === 'number' ? e.payload : (window.inputHits + 1);
    if (modalOpen) return;
    const now = Date.now();
    if (now - lastGlobal > 150) { lastGlobal = now; playerAttack(); }
  });
  listen('input-heartbeat', (e) => {
    if (typeof e.payload === 'number') window.inputHits = e.payload;
  });
}

// Accessibility permission
async function openAxSettings() {
  if (window.__TAURI__) {
    try { await window.__TAURI__.core.invoke('open_ax_settings'); }
    catch (e) { console.error('open_ax_settings failed', e); }
  }
}

if (window.__TAURI__) {
  const { listen: listenAx } = window.__TAURI__.event;
  listenAx('accessibility-needed', () => { document.getElementById('axwarn').style.display = 'block'; });
  listenAx('input-tap-failed', () => {
    const w = document.getElementById('axwarn');
    w.style.display = 'block';
  });
  listenAx('input-tap-ok', () => { document.getElementById('axwarn').style.display = 'none'; });
}
