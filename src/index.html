<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=500, height=160">
<title>邦德猫 v0.3.2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:500px; height:160px; overflow:hidden; background:transparent; font-family:'Segoe UI',sans-serif; user-select:none; }
#titlebar { border-radius: 8px 8px 0 0;
  height:24px; background:rgba(15,15,30,0.75); display:flex; align-items:center; padding:0 6px;
  cursor:default; border-bottom:1px solid #2a2a4a;
}
#titlebar .title { color:#f0a040; font-size:11px; font-weight:bold; white-space:nowrap; }
#titlebar .stats { color:#ccc; font-size:10px; margin-left:auto; white-space:nowrap; letter-spacing:0.5px; }
#titlebar .btns { margin-left:12px; display:flex; gap:2px; }
#titlebar .btns button {
  background:none; border:1px solid #333; color:#aaa; font-size:11px; width:22px; height:18px;
  cursor:pointer; border-radius:3px; display:flex; align-items:center; justify-content:center;
  padding:0; line-height:1;
}
#titlebar .btns button:hover { background:#333; color:#fff; border-color:#555; }
#titlebar .btns button:last-child:hover { background:#a33; }
canvas { display:block; }
#modal {
  display:none; position:fixed; top:0; left:0; width:500px; height:160px;
  background:rgba(0,0,0,0.85); z-index:100; flex-direction:column; align-items:center; justify-content:center;
}
#modal.open { display:flex; }
#modal .panel {
  background:#1a1a2e; border:2px solid #f0a040; border-radius:8px; padding:12px 16px;
  min-width:320px; max-width:460px; color:#eee; font-size:11px;
}
#modal .panel h3 { color:#f0a040; font-size:13px; margin-bottom:8px; text-align:center; }
#modal .panel .row { display:flex; justify-content:space-between; align-items:center; padding:3px 0; border-bottom:1px solid #222; }
#modal .panel .row:last-child { border:none; }
#modal .panel button {
  background:#f0a040; color:#000; border:none; padding:3px 10px; border-radius:4px;
  cursor:pointer; font-size:10px; font-weight:bold;
}
#modal .panel button:hover { background:#ffb860; }
#modal .panel button.owned { background:#555; color:#999; cursor:default; }
#modal .panel button.equipped { background:#4a4; color:#fff; cursor:default; }
#modal .close-hint { color:#666; font-size:9px; margin-top:6px; }
</style>
</head>
<body>
<div id="titlebar" data-tauri-drag-region>
  <span class="title" data-tauri-drag-region>邦德猫 v0.3.2</span>
  <span class="stats" id="stats" data-tauri-drag-region></span>
  <div class="btns">
    <button onclick="openModal('backpack')">📦</button>
    <button onclick="openModal('shop')">🛒</button>
    <button onclick="hideWindow()">✕</button>
  </div>
</div>
<canvas id="game" width="500" height="136"></canvas>
<div id="modal"><div class="panel" id="modalContent"></div><div class="close-hint">ESC 关闭</div></div>

<script>
// ============ SPRITES ============
const CAT = [
  '....OO......OO..',
  '...OSSO....OSSO.',
  '..OOOOOOOOOOOOOO',
  '..OOOOOOOOOOOOOO',
  '..OOKKKKKKKKKOO.',
  '..OOKWKKKKWKOO..',
  '..OOOOOPPOOOO...',
  '..OOOOOOOOOOOO..',
  '..OOOEEEEEEOOO..',
  '..OOOEEEEEEOOO..',
  '..OOOOOOOOOOOO..',
  '..OOOOOOOOOOOO..',
  '..OO..OOOO..OO..',
  '..OO..OOOO..OO..',
  '..PP...PP...PP..',
  '................',
];
const CAT_COLORS = {O:'#f0a040',S:'#d07010',K:'#222222',W:'#88aaff',P:'#ffb090',E:'#ffe0a0'};

const SLIME = [
  '..........',
  '..GGGGGG..',
  '.GGGGGGGG.',
  'GGWGGGGWGG',
  'GGGGGGGGGG',
  'GGGGGGGGGG',
  'GLGGGGGGGG',
  '.GGGGGGGG.',
  '..GGGGGG..',
  '..........',
];
const SLIME_COLORS = {G:'#44cc44',W:'#ffffff',L:'#88ff88'};

const BAT = [
  '..P......P..',
  '.PP......PP.',
  'PPP..PP..PPP',
  'PPPPPPPPPPPP',
  '.PPPRPPPPPP.',
  '..PPPPPPPP..',
  '...PPPPPP...',
  '....P..P....',
  '............',
  '............',
];
const BAT_COLORS = {P:'#9944cc',R:'#ff4444'};

const SKULL = [
  '..WWWWWW..',
  '.WWWWWWWW.',
  'WWBWWWWBWW',
  'WWWWWWWWWW',
  'WWWWWWWWWW',
  '.WWWWWWWW.',
  '..WBWBWW..',
  '...WWWW...',
  '..WWWWWW..',
  '..W.WW.W..',
  '..W.WW.W..',
  '..W.WW.W..',
];
const SKULL_COLORS = {W:'#e8e8e8',B:'#222222'};

const CHEST_NORMAL = [
  '........',
  '.BBBBBB.',
  'BBBYBBBB',
  'BBBBBBBB',
  'BBBYBBBB',
  'BBBBBBBB',
  '.BBBBBB.',
  '........',
];
const CHEST_RARE = [
  '........',
  '.CCCCCC.',
  'CCCWCCCC',
  'CCCCCCCC',
  'CCCWCCCC',
  'CCCCCCCC',
  '.CCCCCC.',
  '........',
];
const CHEST_EPIC = [
  '........',
  '.PPPPPP.',
  'PPPWPPPP',
  'PPPPPPPP',
  'PPPWPPPP',
  'PPPPPPPP',
  '.PPPPPP.',
  '........',
];
const CHEST_COLORS_N = {B:'#8B4513',Y:'#FFD700'};
const CHEST_COLORS_R = {C:'#4488ff',W:'#ffffff'};
const CHEST_COLORS_E = {P:'#aa44ff',W:'#ffffff'};

// ============ DRAW SPRITE ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function drawSprite(sprite, colors, x, y, scale, flash) {
  for (let r = 0; r < sprite.length; r++) {
    for (let c = 0; c < sprite[r].length; c++) {
      const ch = sprite[r][c];
      if (ch === '.') continue;
      ctx.fillStyle = flash ? '#ffffff' : (colors[ch] || '#ff00ff');
      ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
    }
  }
}

// ============ GAME STATE ============
const SAVE_KEY = 'bondcat_v3';
let state = loadState();

function defaultState() {
  return {
    gold: 0, kills: 0, level: 1, xp: 0,
    catHp: 100, catMaxHp: 100,
    weapon: 0, outfit: 0,
    chests: [0, 0, 0],
    weaponOwned: [true, false, false],
    outfitOwned: [true, false, false],
  };
}
function loadState() {
  try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); return s && s.gold !== undefined ? s : defaultState(); }
  catch(e) { return defaultState(); }
}
function saveState() { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }

const WEAPONS = [{name:'木剑',dmg:1,cost:0},{name:'铁锤',dmg:3,cost:500},{name:'魔杖',dmg:6,cost:2000}];
const OUTFITS = [{name:'普通',cost:0},{name:'骑士',cost:1000},{name:'魔法',cost:3000}];

// ============ ENTITIES ============
let monsters = [];
let particles = [];
let floatTexts = [];
let chestDrops = [];
let attackAnim = 0;
let attackArc = 0;
let catFlash = 0;
let catDead = 0;
let spawnTimer = 0;
let modalOpen = false;
let stars = [];

for (let i = 0; i < 40; i++) {
  stars.push({ x: Math.random() * 500, y: Math.random() * 100, s: Math.random() * 1.5 + 0.5, phase: Math.random() * Math.PI * 2 });
}

const MONSTER_TYPES = [
  { name:'史莱姆', sprite:SLIME, colors:SLIME_COLORS, hp:3, scale:3, xpVal:2, goldMin:3, goldMax:8 },
  { name:'蝙蝠', sprite:BAT, colors:BAT_COLORS, hp:5, scale:3, xpVal:4, goldMin:5, goldMax:12 },
  { name:'骷髅', sprite:SKULL, colors:SKULL_COLORS, hp:8, scale:3, xpVal:7, goldMin:8, goldMax:20 },
];

function spawnMonster() {
  if (monsters.length >= 4) return;
  const lvl = Math.min(2, Math.floor(state.level / 3));
  const typeIdx = Math.random() < 0.5 ? 0 : (Math.random() < 0.6 ? Math.min(1,lvl) : Math.min(2,lvl));
  const t = MONSTER_TYPES[typeIdx];
  const hpMult = 1 + (state.level - 1) * 0.3;
  monsters.push({
    type: typeIdx, x: 350 + Math.random() * 100, y: 136 - t.sprite.length * t.scale - 8,
    hp: Math.ceil(t.hp * hpMult), maxHp: Math.ceil(t.hp * hpMult),
    speed: 25 + Math.random() * 10, flash: 0, atkTimer: 0,
  });
}

// ============ ATTACK ============
function playerAttack() {
  if (catDead > 0) return;
  attackAnim = 0.3;
  attackArc = 1.0;
  const dmg = WEAPONS[state.weapon].dmg + Math.floor(state.level * 0.5);
  let hit = false;
  for (const m of monsters) {
    if (m.x < 200) {
      m.hp -= dmg;
      m.flash = 0.15;
      hit = true;
      floatTexts.push({ x: m.x + 10, y: m.y - 5, text: '-' + dmg, color: '#ffffff', life: 0.8 });
      if (m.hp <= 0) {
        killMonster(m);
      }
      break;
    }
  }
  if (!hit) {
    for (const m of monsters) {
      if (m.x < 300) {
        m.hp -= dmg;
        m.flash = 0.15;
        floatTexts.push({ x: m.x + 10, y: m.y - 5, text: '-' + dmg, color: '#ffffff', life: 0.8 });
        if (m.hp <= 0) killMonster(m);
        break;
      }
    }
  }
}

function killMonster(m) {
  const t = MONSTER_TYPES[m.type];
  state.kills++;
  state.xp += t.xpVal;
  const xpNeeded = state.level * 15;
  if (state.xp >= xpNeeded) { state.level++; state.xp -= xpNeeded; state.catMaxHp += 10; state.catHp = state.catMaxHp;
    floatTexts.push({ x: 80, y: 20, text: 'LEVEL UP!', color: '#ffff00', life: 1.5 });
  }
  // particles
  for (let i = 0; i < 12; i++) {
    particles.push({ x: m.x + 15, y: m.y + 15, vx: (Math.random()-0.5)*120, vy: (Math.random()-0.5)*120,
      color: t.colors[Object.keys(t.colors)[0]], life: 0.6 + Math.random()*0.3 });
  }
  // chest drop 80%
  if (Math.random() < 0.8) {
    const r = Math.random();
    const rarity = r < 0.6 ? 0 : (r < 0.9 ? 1 : 2);
    const gold = t.goldMin + Math.floor(Math.random() * (t.goldMax - t.goldMin + 1));
    chestDrops.push({ x: m.x, y: m.y, rarity, gold, timer: 2.0, collected: false });
  }
  saveState();
}

function monsterAttack(m) {
  if (catDead > 0) return;
  const dmg = 3 + m.type * 2 + Math.floor(state.level * 0.5);
  state.catHp -= dmg;
  catFlash = 0.2;
  floatTexts.push({ x: 80, y: 40, text: '-' + dmg, color: '#ff4444', life: 0.8 });
  if (state.catHp <= 0) {
    state.catHp = 0;
    catDead = 3.0;
    const lost = Math.floor(state.gold * 0.2);
    state.gold -= lost;
    if (lost > 0) floatTexts.push({ x: 80, y: 30, text: '-' + lost + '💰', color: '#ff6666', life: 1.2 });
  }
  saveState();
}

// ============ MODAL ============
function openModal(type) {
  modalOpen = true;
  const el = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  el.classList.add('open');
  if (type === 'backpack') {
    const names = ['普通宝箱🟫','稀有宝箱🔵','史诗宝箱🟣'];
    let total = state.chests[0] + state.chests[1] + state.chests[2];
    let html = '<h3>📦 背包</h3>';
    for (let i = 0; i < 3; i++) html += `<div class="row"><span>${names[i]}</span><span>x${state.chests[i]}</span></div>`;
    html += `<div style="text-align:center;margin-top:8px"><button onclick="openAllChests()" ${total===0?'class="owned"':''}>一键全开 (${total})</button></div>`;
    content.innerHTML = html;
  } else if (type === 'shop') {
    let html = '<h3>🛒 商城</h3>';
    html += '<div style="margin-bottom:6px;color:#f0a040;font-size:10px">💰 ' + state.gold + ' 金币</div>';
    html += '<div style="font-size:10px;color:#888;margin-bottom:4px">⚔️ 武器</div>';
    for (let i = 0; i < WEAPONS.length; i++) {
      const w = WEAPONS[i];
      const owned = state.weaponOwned[i];
      const equipped = state.weapon === i;
      let btn = '';
      if (equipped) btn = '<button class="equipped">装备中</button>';
      else if (owned) btn = `<button onclick="equipWeapon(${i})">装备</button>`;
      else btn = `<button onclick="buyWeapon(${i})">${w.cost}💰</button>`;
      html += `<div class="row"><span>${w.name} (DMG+${w.dmg})</span>${btn}</div>`;
    }
    html += '<div style="font-size:10px;color:#888;margin:4px 0">🎨 装扮</div>';
    for (let i = 0; i < OUTFITS.length; i++) {
      const o = OUTFITS[i];
      const owned = state.outfitOwned[i];
      const equipped = state.outfit === i;
      let btn = '';
      if (equipped) btn = '<button class="equipped">穿着中</button>';
      else if (owned) btn = `<button onclick="equipOutfit(${i})">穿上</button>`;
      else btn = `<button onclick="buyOutfit(${i})">${o.cost}💰</button>`;
      html += `<div class="row"><span>${o.name}</span>${btn}</div>`;
    }
    content.innerHTML = html;
  }
}

function closeModal() { modalOpen = false; document.getElementById('modal').classList.remove('open'); }

function openAllChests() {
  let totalGold = 0;
  const goldPer = [5, 15, 40];
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < state.chests[i]; j++) {
      totalGold += goldPer[i] + Math.floor(Math.random() * goldPer[i]);
    }
    state.chests[i] = 0;
  }
  if (totalGold > 0) {
    state.gold += totalGold;
    floatTexts.push({ x: 200, y: 50, text: '+' + totalGold + '💰', color: '#FFD700', life: 1.5 });
    saveState();
  }
  openModal('backpack');
}

function buyWeapon(i) {
  if (state.gold >= WEAPONS[i].cost && !state.weaponOwned[i]) {
    state.gold -= WEAPONS[i].cost; state.weaponOwned[i] = true; state.weapon = i; saveState(); openModal('shop');
  }
}
function equipWeapon(i) { state.weapon = i; saveState(); openModal('shop'); }
function buyOutfit(i) {
  if (state.gold >= OUTFITS[i].cost && !state.outfitOwned[i]) {
    state.gold -= OUTFITS[i].cost; state.outfitOwned[i] = true; state.outfit = i; saveState(); openModal('shop');
  }
}
function equipOutfit(i) { state.outfit = i; saveState(); openModal('shop'); }

function resetData() { state = defaultState(); monsters = []; particles = []; floatTexts = []; chestDrops = []; saveState(); }

// ============ UPDATE & RENDER ============
let lastTime = performance.now();

function update(dt) {
  if (modalOpen) return;

  // spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) { spawnTimer = 4; spawnMonster(); }

  // cat dead
  if (catDead > 0) {
    catDead -= dt;
    if (catDead <= 0) { state.catHp = state.catMaxHp; saveState(); }
  }

  // attack anim
  if (attackAnim > 0) attackAnim -= dt;
  if (attackArc > 0) attackArc -= dt * 4;

  // cat flash
  if (catFlash > 0) catFlash -= dt;

  // monsters
  for (const m of monsters) {
    if (m.hp <= 0) continue;
    if (m.flash > 0) m.flash -= dt;
    if (m.x > 130) {
      m.x -= m.speed * dt;
    } else {
      m.atkTimer += dt;
      if (m.atkTimer >= 2) { m.atkTimer = 0; monsterAttack(m); }
    }
  }
  monsters = monsters.filter(m => m.hp > 0);

  // chest drops
  for (const c of chestDrops) {
    c.timer -= dt;
    if (c.timer <= 0 && !c.collected) {
      c.collected = true;
      state.chests[c.rarity]++;
      state.gold += c.gold;
      floatTexts.push({ x: c.x, y: c.y - 10, text: '+' + c.gold + '💰', color: '#FFD700', life: 1.0 });
      saveState();
    }
    if (c.collected || c.timer <= 0) {
      // fly toward cat
      c.x += (80 - c.x) * dt * 5;
      c.y += (80 - c.y) * dt * 5;
    }
  }
  chestDrops = chestDrops.filter(c => !c.collected || Math.abs(c.x - 80) > 5);

  // particles
  for (const p of particles) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  // float texts
  for (const f of floatTexts) { f.y -= 30 * dt; f.life -= dt; }
  floatTexts = floatTexts.filter(f => f.life > 0);
}

function render(time) {
  // clear to transparent
  ctx.clearRect(0, 0, 500, 136);

  // stars
  for (const s of stars) {
    const bri = 0.3 + 0.7 * Math.abs(Math.sin(time * 0.001 + s.phase));
    ctx.fillStyle = `rgba(255,255,255,${bri})`;
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.s), Math.ceil(s.s));
  }

  // grass
  ctx.fillStyle = '#1a5c1a';
  ctx.fillRect(0, 128, 500, 8);
  for (let i = 0; i < 500; i += 6) {
    ctx.fillStyle = i % 12 < 6 ? '#2a7a2a' : '#1a6a1a';
    ctx.fillRect(i, 126, 4, 2);
  }

  // chest drops
  for (const c of chestDrops) {
    const sp = c.rarity === 0 ? CHEST_NORMAL : (c.rarity === 1 ? CHEST_RARE : CHEST_EPIC);
    const co = c.rarity === 0 ? CHEST_COLORS_N : (c.rarity === 1 ? CHEST_COLORS_R : CHEST_COLORS_E);
    drawSprite(sp, co, c.x, c.y, 2, false);
  }

  // monsters
  for (const m of monsters) {
    const t = MONSTER_TYPES[m.type];
    drawSprite(t.sprite, t.colors, m.x, m.y, t.scale, m.flash > 0);
    // hp bar
    const w = t.sprite[0].length * t.scale;
    const hpRatio = m.hp / m.maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(m.x, m.y - 5, w, 3);
    ctx.fillStyle = hpRatio > 0.5 ? '#4a4' : '#a44';
    ctx.fillRect(m.x, m.y - 5, w * hpRatio, 3);
  }

  // cat
  const catX = 80, catBaseY = 136 - 16 * 3 - 8;
  let catY = catBaseY;
  if (attackAnim > 0) catY -= 2; // slight jump
  const catVisible = catDead > 0 ? (Math.floor(catDead * 6) % 2 === 0) : true;
  if (catVisible) {
    // outfit tint overlay
    let catColors = {...CAT_COLORS};
    if (state.outfit === 1) { catColors.O = '#8888cc'; catColors.S = '#6666aa'; } // knight: blue-ish
    if (state.outfit === 2) { catColors.O = '#cc44ff'; catColors.S = '#aa22dd'; } // magic: purple
    drawSprite(CAT, catColors, catX, catY, 3, catFlash > 0);
  }

  // cat hp bar
  const hpRatio = state.catHp / state.catMaxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(catX, catY - 7, 48, 4);
  ctx.fillStyle = hpRatio > 0.3 ? '#4c4' : '#c44';
  ctx.fillRect(catX, catY - 7, 48 * hpRatio, 4);

  // weapon swing arc
  if (attackArc > 0) {
    ctx.strokeStyle = `rgba(255,255,255,${attackArc})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    const arcX = catX + 48 + 10;
    const arcY = catY + 24;
    ctx.arc(arcX, arcY, 20, -Math.PI * 0.6, Math.PI * 0.3);
    ctx.stroke();
    // weapon specific
    if (state.weapon >= 1) {
      ctx.strokeStyle = state.weapon === 2 ? `rgba(170,68,255,${attackArc})` : `rgba(200,200,200,${attackArc})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(arcX, arcY, 25, -Math.PI * 0.4, Math.PI * 0.1);
      ctx.stroke();
    }
  }

  // particles
  for (const p of particles) {
    const a = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a;
    ctx.fillRect(p.x, p.y, 3, 3);
  }
  ctx.globalAlpha = 1;

  // float texts
  ctx.textAlign = 'center';
  for (const f of floatTexts) {
    const a = Math.min(1, f.life * 2);
    ctx.globalAlpha = a;
    ctx.fillStyle = f.color;
    ctx.font = f.text.includes('LEVEL') ? 'bold 14px monospace' : 'bold 11px monospace';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'start';
}

function gameLoop(now) {
  try {
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    update(dt);
    render(now);
    // update stats
    document.getElementById('stats').textContent = `💰${state.gold} ⚔️${state.kills} Lv${state.level}`;
  } catch(e) { console.error(e); }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// ============ INPUT ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { if (modalOpen) closeModal(); return; }
  if (modalOpen) return;
  playerAttack();
});

canvas.addEventListener('click', () => {
  if (modalOpen) return;
  playerAttack();
});

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ============ TAURI ============
async function hideWindow() {
  if (window.__TAURI__) {
    await window.__TAURI__.window.getCurrentWindow().hide();
  }
}

if (window.__TAURI__) {
  const { listen } = window.__TAURI__.event;
  listen('open-backpack', () => openModal('backpack'));
  listen('open-shop', () => openModal('shop'));
  listen('reset-data', () => resetData());
  let lastGlobal = 0;
  listen('global-input', () => {
    if (modalOpen) return;
    const now = Date.now();
    if (now - lastGlobal > 300) { lastGlobal = now; playerAttack(); }
  });
}
</script>
</body>
</html>
