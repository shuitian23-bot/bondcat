<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=500, height=160">
<title>邦德猫</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:500px; height:160px; overflow:hidden; background:transparent; font-family:'Segoe UI',sans-serif; user-select:none; }
#titlebar { border-radius: 8px 8px 0 0;
  height:24px; background:rgba(15,15,30,0.75); display:flex; align-items:center; padding:0 6px;
  cursor:default; border-bottom:1px solid #2a2a4a;
}
#titlebar .title { color:#f0a040; font-size:11px; font-weight:bold; white-space:nowrap; }
#titlebar .stats { color:#ccc; font-size:10px; margin-left:auto; white-space:nowrap; letter-spacing:0.5px; }
#titlebar .btns { margin-left:12px; display:flex; gap:2px; }
#titlebar .btns button {
  background:none; border:1px solid #333; color:#aaa; font-size:11px; width:22px; height:18px;
  cursor:pointer; border-radius:3px; display:flex; align-items:center; justify-content:center;
  padding:0; line-height:1;
}
#titlebar .btns button:hover { background:#333; color:#fff; border-color:#555; }
#titlebar .btns button:last-child:hover { background:#a33; }
canvas { display:block; }
#modal {
  display:none; position:fixed; top:0; left:0; width:500px; height:160px;
  background:rgba(0,0,0,0.85); z-index:100; flex-direction:column; align-items:center; justify-content:center;
}
#modal.open { display:flex; }
#modal .panel {
  background:#1a1a2e; border:2px solid #f0a040; border-radius:8px; padding:12px 16px;
  min-width:320px; max-width:460px; max-height:130px; overflow-y:auto; color:#eee; font-size:11px;
}
#modal .panel h3 { color:#f0a040; font-size:13px; margin-bottom:8px; text-align:center; }
#modal .panel .row { display:flex; justify-content:space-between; align-items:center; padding:3px 0; border-bottom:1px solid #222; }
#modal .panel .row:last-child { border:none; }
#modal .panel button {
  background:#f0a040; color:#000; border:none; padding:3px 10px; border-radius:4px;
  cursor:pointer; font-size:10px; font-weight:bold;
}
#modal .panel button:hover { background:#ffb860; }
#modal .panel button.owned { background:#555; color:#999; cursor:default; }
#modal .panel button.equipped { background:#4a4; color:#fff; cursor:default; }
#modal .close-hint { color:#666; font-size:9px; margin-top:6px; }
#modal .panel::-webkit-scrollbar { width:5px; }
#modal .panel::-webkit-scrollbar-thumb { background:#555; border-radius:3px; }
#modal .panel h3 { border-bottom:1px solid #333; padding-bottom:4px; }
</style>
</head>
<body>
<div id="titlebar" data-tauri-drag-region>
  <span class="title" data-tauri-drag-region id="appTitle">邦德猫</span>
  <span class="stats" id="stats" data-tauri-drag-region></span>
  <div class="btns">
    <button onclick="openModal('paperdoll')">👤</button>
    <button onclick="openModal('backpack')">📦</button>
    <button onclick="openModal('shop')">🛒</button>
    <button onclick="openModal('skills')">🌟</button>
    <button onclick="openModal('prestige')">★</button>
    <button onclick="openModal('achievements')">🏆</button>
    <button onclick="hideWindow()">✕</button>
  </div>
</div>
<canvas id="game" width="500" height="136"></canvas>
<div id="xpbar" style="position:absolute;top:24px;left:0;width:0;height:2px;background:linear-gradient(90deg,#f0a040,#ffd880);pointer-events:none;z-index:50;transition:width 0.2s;"></div>
<div id="axwarn" style="display:none;position:fixed;top:24px;left:0;width:500px;background:#cc3300;color:#fff;font-size:10px;padding:4px 8px;z-index:200;text-align:center;">
  ⚠️ 需要辅助功能权限 <button onclick="openAxSettings()" style="background:#fff;color:#c30;border:none;padding:1px 6px;border-radius:3px;font-size:9px;cursor:pointer;margin-left:4px;">打开设置</button>
  <span style="font-size:8px;display:block;margin-top:2px;">授权后需重启App</span>
</div>

<div id="modal"><div class="panel" id="modalContent"></div><div class="close-hint">ESC 关闭</div></div>

<script>
// Inject app version from Tauri at startup (avoid hardcoded version drift)
(async () => {
  try {
    const v = await window.__TAURI__.app.getVersion();
    document.title = "邦德猫 v" + v;
    const el = document.getElementById("appTitle");
    if (el) el.textContent = "邦德猫 v" + v;
  } catch (e) { console.warn("version inject failed", e); }
})();
</script>
<script>
// ============ IMAGE ASSETS ============
const IMG = {};
const IMG_SOURCES = {
  cat: 'assets/cat.png',
  catKnight: 'assets/cat_knight.png',
  catMage: 'assets/cat_mage.png',
  catRogue: 'assets/cat_rogue.png',
  slime: 'assets/slime.png',
  bat: 'assets/bat.png',
  skull: 'assets/skull.png',
  goblin: 'assets/goblin.png',
  dragon: 'assets/dragon_boss.png',
  skeletonKing: 'assets/skeleton_king.png',
  shadowBlade: 'assets/shadow_blade.png',
  elementalLich: 'assets/elemental_lich.png',
  chestN: 'assets/chest_normal.png',
  chestR: 'assets/chest_rare.png',
  chestE: 'assets/chest_epic.png',
  ground: 'assets/ground.png',
  swordWep: 'assets/weapon_sword.png',
  hammerWep: 'assets/weapon_hammer.png',
  wandWep: 'assets/weapon_wand.png',
};
let IMG_LOADED = 0;
const IMG_TOTAL = Object.keys(IMG_SOURCES).length;
for (const [k, src] of Object.entries(IMG_SOURCES)) {
  const im = new Image();
  im.onload = () => { IMG_LOADED++; };
  im.onerror = () => { console.error('img failed', src); IMG_LOADED++; };
  im.src = src;
  IMG[k] = im;
}
// Particle colors per monster type (since no more sprite colors)
const MONSTER_PARTICLE_COLOR = { slime:'#44cc44', bat:'#9944cc', skull:'#e8e8e8', goblin:'#66aa44', dragon:'#cc2222', skeletonKing:'#ffff88', shadowBlade:'#aa44ff', elementalLich:'#44aaff' };

// ============ DRAW HELPER ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function drawImg(img, x, y, w, h, flash) {
  if (!img || !img.complete) return;
  ctx.drawImage(img, x, y, w, h);
  if (flash) {
    // White tint overlay for hit feedback
    ctx.save();
    ctx.globalCompositeOperation = 'source-atop';
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y, w, h);
    ctx.restore();
  }
}

// ============ GAME STATE ============
const SAVE_KEY = 'bondcat_v5';
let state = loadState();
recomputeMaxHp();

function defaultState() {
  return {
    soul: 0,
    prestigeCount: 0,
    prestigeBuffs: { atkStart: 0, goldRate: 0, critStart: 0, hpStart: 0 },
    pets: [],
    pendingEggs: 0,
    classId: null,
    chapterBossPending: 0,
    gold: 0, kills: 0, level: 1, xp: 0,
    catHp: 100, catMaxHp: 100,
    outfit: 0, outfitOwned: [true, false, false, false],
    chests: [0, 0, 0],
    equipment: {
      head: null, body: null, accessory: null,
      weapon: { id: 1, slot: 'weapon', name: '木剑', icon: 'swordWep', dmg: 2, hp: 0, rarityIdx: 0, upgradeLevel: 0, affixes: [] },
    },
    inventory: [],
    nextItemId: 2,
    skills: { attack: 0, vitality: 0, greed: 0, luck: 0 },
    achievements: [],
    bossKills: 0,
    maxCombo: 0,
  };
}
function loadState() {
  try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if (!s || s.gold === undefined) return defaultState(); if (!s.skills) s.skills = { attack:0, vitality:0, greed:0, luck:0 }; if (s.skills.luck === undefined) s.skills.luck = 0; if (!s.achievements) s.achievements = []; if (s.bossKills === undefined) s.bossKills = 0; if (s.maxCombo === undefined) s.maxCombo = 0; if (s.chapterBossPending === undefined) s.chapterBossPending = 0; if (s.classId === undefined) s.classId = null; if (!s.pets) s.pets = []; if (s.pendingEggs === undefined) s.pendingEggs = 0; if (s.soul === undefined) s.soul = 0; if (s.prestigeCount === undefined) s.prestigeCount = 0; if (!s.prestigeBuffs) s.prestigeBuffs = { atkStart: 0, goldRate: 0, critStart: 0, hpStart: 0 }; if (!s.outfitOwned || s.outfitOwned.length < 4) s.outfitOwned = [true, s.outfitOwned && s.outfitOwned[1] || false, s.outfitOwned && s.outfitOwned[2] || false, false];
    if (!s.equipment) s.equipment = { head: null, body: null, weapon: null, accessory: null };
    if (!s.inventory) s.inventory = [];
    if (!s.nextItemId) s.nextItemId = 1;
    if (!s.equipment.weapon && s.inventory.length === 0) {
      s.equipment.weapon = { id: s.nextItemId++, slot: 'weapon', name: '木剑', icon: 'swordWep', dmg: 2, hp: 0, rarityIdx: 0, upgradeLevel: 0, affixes: [] };
    }
    return s; }
  catch(e) { return defaultState(); }
}
function recomputeMaxHp() {
  const _cls = currentClass(); const base = Math.floor((100 + (state.level - 1) * 10 + state.skills.vitality * 20) * (_cls ? _cls.hpMult : 1));
  const equipHp = sumEquipStat(itemTotalHp);
  state.catMaxHp = Math.floor(base + equipHp);
  if (state.catHp > state.catMaxHp) state.catHp = state.catMaxHp;
}
function saveState() { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }

// Equipment system
const GEAR_BASES = {
  head: [
    { name: '布帽', dmg: 0, hp: 5, icon: '🧢' },
    { name: '皮盔', dmg: 0, hp: 12, icon: '🎩' },
    { name: '铁盔', dmg: 0, hp: 25, icon: '⛑️' },
  ],
  body: [
    { name: '布衣', dmg: 0, hp: 8, icon: '👕' },
    { name: '皮甲', dmg: 0, hp: 18, icon: '🧥' },
    { name: '板甲', dmg: 0, hp: 35, icon: '🛡️' },
  ],
  weapon: [
    { name: '木剑', dmg: 2, hp: 0, icon: 'swordWep' },
    { name: '铁锤', dmg: 5, hp: 0, icon: 'hammerWep' },
    { name: '魔杖', dmg: 9, hp: 0, icon: 'wandWep' },
  ],
  accessory: [
    { name: '幸运符', dmg: 0, hp: 0, icon: '🍀' },
    { name: '利爪项链', dmg: 1, hp: 0, icon: '💎' },
    { name: '魔力戒指', dmg: 0, hp: 15, icon: '💍' },
  ],
};
const AFFIX_POOL = [
  { key: 'critBonus', label: '+暴击', roll: () => (2 + Math.floor(Math.random()*5)) }, // 2-6%
  { key: 'atkBonus', label: '+攻', roll: () => (1 + Math.floor(Math.random()*3)) },
  { key: 'hpBonus', label: '+HP', roll: () => (5 + Math.floor(Math.random()*15)) },
  { key: 'lifesteal', label: '+吸血', roll: () => (1 + Math.floor(Math.random()*3)) }, // 1-3%
  { key: 'gold', label: '+金币', roll: () => (5 + Math.floor(Math.random()*15)) }, // %
];
const RARITY = [
  { name: '普通', color: '#aaaaaa', affixCount: 0 },
  { name: '精良', color: '#44dd44', affixCount: 1 },
  { name: '稀有', color: '#4488ff', affixCount: 2 },
  { name: '史诗', color: '#bb44ff', affixCount: 3 },
  { name: '传说', color: '#ff8800', affixCount: 4 },
];
function genItem(slot, forcedRarity) {
  const pool = GEAR_BASES[slot];
  const base = pool[Math.floor(Math.random() * pool.length)];
  const rarityIdx = forcedRarity !== undefined ? forcedRarity : Math.floor(Math.random() * RARITY.length);
  const r = RARITY[rarityIdx];
  const affixes = [];
  const available = [...AFFIX_POOL];
  for (let i = 0; i < r.affixCount && available.length; i++) {
    const idx = Math.floor(Math.random() * available.length);
    const a = available.splice(idx, 1)[0];
    affixes.push({ key: a.key, label: a.label, value: a.roll() });
  }
  return {
    id: state.nextItemId++,
    slot, name: base.name, icon: base.icon,
    dmg: base.dmg, hp: base.hp,
    rarityIdx, upgradeLevel: 0, affixes,
  };
}
function itemTotalDmg(it) {
  if (!it) return 0;
  const base = it.dmg * (1 + it.upgradeLevel * 0.2);
  const affix = it.affixes.filter(a => a.key === 'atkBonus').reduce((s,a)=>s+a.value, 0);
  return base + affix;
}
function itemTotalHp(it) {
  if (!it) return 0;
  const base = it.hp * (1 + it.upgradeLevel * 0.2);
  const affix = it.affixes.filter(a => a.key === 'hpBonus').reduce((s,a)=>s+a.value, 0);
  return base + affix;
}
function sumEquipStat(fn) {
  return Object.values(state.equipment).reduce((s, it) => s + fn(it), 0);
}
function upgradeCost(item) {
  return Math.ceil(40 * Math.pow(item.upgradeLevel + 1, 2) * (1 + item.rarityIdx * 0.3));
}
function sellPrice(item) {
  return Math.ceil(15 * Math.pow(1 + item.rarityIdx, 1.3) * (1 + item.upgradeLevel * 0.5));
}
function findItemById(id) {
  for (const slot of Object.keys(state.equipment)) {
    const it = state.equipment[slot];
    if (it && it.id === id) return { item: it, loc: 'equipped', slot };
  }
  const idx = state.inventory.findIndex(it => it.id === id);
  if (idx >= 0) return { item: state.inventory[idx], loc: 'inv', idx };
  return null;
}
function equipItem(id) {
  const found = findItemById(id);
  if (!found || found.loc !== 'inv') return;
  const item = found.item;
  const current = state.equipment[item.slot];
  state.equipment[item.slot] = item;
  state.inventory.splice(found.idx, 1);
  if (current) state.inventory.push(current);
  recomputeMaxHp();
  saveState();
  if (modalOpen) openModal('backpack');
}
function unequipItem(slot) {
  const item = state.equipment[slot];
  if (!item) return;
  state.inventory.push(item);
  state.equipment[slot] = null;
  recomputeMaxHp();
  saveState();
  if (modalOpen) openModal('backpack');
}
function upgradeItem(id) {
  const found = findItemById(id);
  if (!found) return;
  const it = found.item;
  if (it.upgradeLevel >= 10) return;
  const cost = upgradeCost(it);
  if (state.gold < cost) return;
  state.gold -= cost;
  it.upgradeLevel++;
  if (found.loc === 'equipped') recomputeMaxHp();
  floatTexts.push({ x: 200, y: 40, text: '+1 ' + it.name + ' Lv' + it.upgradeLevel, color: '#ffd700', life: 1.2 });
  saveState();
  if (modalOpen) openModal('backpack');
}
function sellItem(id) {
  const found = findItemById(id);
  if (!found || found.loc !== 'inv') return;
  const price = sellPrice(found.item);
  state.gold += price;
  state.inventory.splice(found.idx, 1);
  floatTexts.push({ x: 200, y: 40, text: '+' + price + '💰 (卖)', color: '#ffd700', life: 1.0 });
  saveState();
  if (modalOpen) openModal('backpack');
}
// 装备合成: 3 件同品质同槽位 -> 1 件品质+1 (最高到传说)
function mergeSlotRarity(slot, rarityIdx) {
  if (rarityIdx >= RARITY.length - 1) return;
  const matches = state.inventory.filter(it => it.slot === slot && it.rarityIdx === rarityIdx);
  if (matches.length < 3) return;
  // remove first 3
  const ids = matches.slice(0, 3).map(it => it.id);
  state.inventory = state.inventory.filter(it => !ids.includes(it.id));
  const newItem = genItem(slot, rarityIdx + 1);
  state.inventory.push(newItem);
  floatTexts.push({ x: 200, y: 30, text: '合成成功! ' + RARITY[rarityIdx+1].name + newItem.name, color: RARITY[rarityIdx+1].color, life: 2.0 });
  saveState();
  if (modalOpen) openModal('backpack');
}
// 装备重铸: 花金币重随机词缀, 保持品质和基础属性
// 宠物系统
const PET_TYPES = [
  { id:'slimePet',  name:'小史莱姆', img:'slime',  color:'#44cc44', atkBonus:2, critBonus:0 },
  { id:'batPet',    name:'小蝙蝠',   img:'bat',    color:'#9944cc', atkBonus:3, critBonus:0.02 },
  { id:'skullPet',  name:'小骷髅',   img:'skull',  color:'#e8e8e8', atkBonus:4, critBonus:0.03 },
  { id:'goblinPet', name:'小哥布林', img:'goblin', color:'#66aa44', atkBonus:6, critBonus:0.02 },
  { id:'dragonPet', name:'小赤龙',   img:'dragon', color:'#cc2222', atkBonus:12, critBonus:0.05 },
];
function hatchEgg() {
  if (state.pendingEggs <= 0) return;
  state.pendingEggs--;
  // 等级越高, 抽到高级宠物概率越大
  const lv = state.level;
  const weights = [Math.max(1, 20 - lv), Math.max(1, 15 - lv), Math.max(1, 10 - lv * 0.5), Math.max(1, 5), Math.max(0.5, lv * 0.2)];
  const totalW = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * totalW, idx = 0;
  for (let i = 0; i < weights.length; i++) { r -= weights[i]; if (r <= 0) { idx = i; break; } }
  const petT = PET_TYPES[idx];
  const pet = { id: state.nextItemId++, typeId: petT.id };
  state.pets.push(pet);
  floatTexts.push({ x: 200, y: 30, text: '🐾 孵出 ' + petT.name + '!', color: petT.color, life: 2.5 });
  saveState();
  if (modalOpen) openModal('backpack');
}
function totalPetAtkBonus() {
  let sum = 0;
  for (const p of state.pets) {
    const t = PET_TYPES.find(x => x.id === p.typeId);
    if (t) sum += t.atkBonus;
  }
  return sum;
}
function totalPetCritBonus() {
  let sum = 0;
  for (const p of state.pets) {
    const t = PET_TYPES.find(x => x.id === p.typeId);
    if (t) sum += t.critBonus;
  }
  return sum;
}

function rerollCost(it) { return 200 * (it.rarityIdx + 1) * (it.rarityIdx + 1); }
function rerollItem(id) {
  const found = findItemById(id);
  if (!found) return;
  const it = found.item;
  const r = RARITY[it.rarityIdx];
  if (r.affixCount === 0) {
    floatTexts.push({ x: 200, y: 40, text: '普通装备无词缀', color: '#888', life: 1.2 });
    return;
  }
  const cost = rerollCost(it);
  if (state.gold < cost) return;
  state.gold -= cost;
  // 重新 roll 词缀 (从 AFFIX_POOL)
  const affixes = [];
  const available = AFFIX_POOL.slice();
  for (let i = 0; i < r.affixCount && available.length; i++) {
    const idx = Math.floor(Math.random() * available.length);
    const a = available.splice(idx, 1)[0];
    affixes.push({ key: a.key, label: a.label, value: a.roll() });
  }
  it.affixes = affixes;
  floatTexts.push({ x: 200, y: 40, text: '♻ 重铸完成', color: r.color, life: 1.5 });
  saveState();
  if (modalOpen) openModal('backpack');
}
function itemStatSummary(it) {
  const parts = [];
  const d = itemTotalDmg(it); if (d > 0) parts.push('攻+' + d);
  const hp = itemTotalHp(it); if (hp > 0) parts.push('HP+' + Math.floor(hp));
  for (const a of it.affixes) {
    if (a.key === 'atkBonus' || a.key === 'hpBonus') continue;
    parts.push(a.label + a.value + (['critBonus','lifesteal','gold'].includes(a.key) ? '%' : ''));
  }
  return parts.join(' ');
}
// Replace old WEAPONS/OUTFITS (kept minimal for outfit color system)
const OUTFITS = [
  { name:'普通', cost:0,    img:'cat',       color:'#f0a040', bonus:null },
  { name:'骑士', cost:1000, img:'catKnight', color:'#cccccc', bonus:{key:'hpMult', value:1.05, desc:'+5% HP'} },
  { name:'法师', cost:3000, img:'catMage',   color:'#4488dd', bonus:{key:'critDmgMult', value:1.05, desc:'+5% 暴击伤害'} },
  { name:'刺客', cost:3000, img:'catRogue',  color:'#bb44ff', bonus:{key:'critRateAdd', value:0.03, desc:'+3% 暴击率'} },
];

// ============ ENTITIES ============
let monsters = [];
let particles = [];
let floatTexts = [];
let chestDrops = [];
let attackAnim = 0;
let attackArc = 0;
let catFlash = 0;
let comboCount = 0;
let comboTimer = 0;
let lastComboMilestone = 0;
let catDead = 0;
let spawnTimer = 0;
let modalOpen = false;
let stars = [];

for (let i = 0; i < 40; i++) {
  stars.push({ x: Math.random() * 500, y: Math.random() * 100, s: Math.random() * 1.5 + 0.5, phase: Math.random() * Math.PI * 2 });
}
let weatherMode = 'clear'; // clear|rain|snow
let weatherTimer = 30;
let weatherDrops = [];

const MONSTER_TYPES = [
  { name:'史莱姆', img:'slime', size:40, hp:3, xpVal:2, goldMin:3, goldMax:8, minLv:1, isBoss:false },
  { name:'蝙蝠', img:'bat', size:40, hp:5, xpVal:4, goldMin:5, goldMax:12, minLv:2, isBoss:false },
  { name:'骷髅', img:'skull', size:44, hp:8, xpVal:7, goldMin:8, goldMax:20, minLv:4, isBoss:false },
  { name:'哥布林', img:'goblin', size:48, hp:16, xpVal:15, goldMin:20, goldMax:50, minLv:6, isBoss:false },
  { name:'赤龙王', img:'dragon', size:64, hp:120, xpVal:100, goldMin:250, goldMax:600, minLv:10, isBoss:true },
  { name:'骸骨王', img:'skeletonKing', size:64, hp:240, xpVal:150, goldMin:400, goldMax:800, minLv:15, isBoss:true },
  { name:'影刺客', img:'shadowBlade', size:60, hp:160, xpVal:180, goldMin:500, goldMax:1000, minLv:20, isBoss:true },
  { name:'元素巫妖', img:'elementalLich', size:64, hp:320, xpVal:250, goldMin:700, goldMax:1400, minLv:25, isBoss:true },
];

// 章节主题 (每 10 级 1 章, 循环使用)
const CHAPTERS = [
  { name: '翠绿草原', skyTint: null, groundTint: null },
  { name: '炽热沙漠', skyTint: 'rgba(255,180,60,0.18)', groundTint: 'rgba(220,160,80,0.35)' },
  { name: '凛冬雪原', skyTint: 'rgba(180,220,255,0.22)', groundTint: 'rgba(230,240,255,0.45)' },
  { name: '熔岩地狱', skyTint: 'rgba(255,60,30,0.20)', groundTint: 'rgba(180,50,30,0.40)' },
  { name: '暗影秘境', skyTint: 'rgba(90,40,120,0.25)', groundTint: 'rgba(60,40,80,0.50)' },
];
function currentChapter() {
  const idx = Math.max(0, Math.floor((state.level - 1) / 10)) % CHAPTERS.length;
  return CHAPTERS[idx];
}

// 职业系统
const CLASSES = {
  warrior: { id:'warrior', name:'战士', icon:'⚔', desc:'+20% 最大HP', color:'#cc6644', hpMult:1.20, critDmgMult:1.0, critRateAdd:0 },
  mage:    { id:'mage',    name:'法师', icon:'✦', desc:'+20% 暴击伤害', color:'#4488dd', hpMult:1.0, critDmgMult:1.20, critRateAdd:0 },
  rogue:   { id:'rogue',   name:'刺客', icon:'☠', desc:'+30% 暴击率', color:'#bb44ff', hpMult:1.0, critDmgMult:1.0, critRateAdd:0.30 },
};
function currentClass() {
  return CLASSES[state.classId] || null;
}

function pickMonsterType() {
  const available = [];
  for (let i = 0; i < MONSTER_TYPES.length; i++) {
    const t = MONSTER_TYPES[i];
    if (state.level < t.minLv) continue;
    // Boss has low base weight
    if (t.isBoss) { available.push({ i, w: 1 }); continue; }
    // Recent tiers weighted higher
    const tierAge = state.level - t.minLv;
    const w = Math.max(1, 10 - tierAge);
    available.push({ i, w });
  }
  const total = available.reduce((s, x) => s + x.w, 0);
  let r = Math.random() * total;
  for (const x of available) { r -= x.w; if (r <= 0) return x.i; }
  return available[0].i;
}

function spawnMonster() {
  if (monsters.length >= 4) return;
  let typeIdx = pickMonsterType();
  let isChapterBoss = false;
  if (state.chapterBossPending) {
    // 强制出当前等级可用的最高阶 boss
    for (let i = MONSTER_TYPES.length - 1; i >= 0; i--) {
      if (MONSTER_TYPES[i].isBoss && state.level >= MONSTER_TYPES[i].minLv) { typeIdx = i; isChapterBoss = true; break; }
    }
    state.chapterBossPending = 0;
  }
  // 同屏只允许 1 只 boss; 若已存在 boss 且抽到 boss, 重抽; 仍是 boss 则降级为最高阶普通怪
  const bossAlive = monsters.some(m => MONSTER_TYPES[m.type].isBoss);
  if (bossAlive && MONSTER_TYPES[typeIdx].isBoss) {
    typeIdx = pickMonsterType();
    if (MONSTER_TYPES[typeIdx].isBoss) {
      for (let i = MONSTER_TYPES.length - 1; i >= 0; i--) {
        if (!MONSTER_TYPES[i].isBoss && state.level >= MONSTER_TYPES[i].minLv) { typeIdx = i; break; }
      }
    }
  }
  const t = MONSTER_TYPES[typeIdx];
  const hpMult = 1 + (state.level - 1) * 0.3;
  const isElite = !t.isBoss && Math.random() < 0.1;
  const eliteHp = isElite ? 2 : 1;
  const finalHp = Math.ceil(t.hp * hpMult * eliteHp);
  monsters.push({
    type: typeIdx, x: 360 + Math.random() * 100, y: 136 - t.size - 8,
    hp: finalHp, maxHp: finalHp, elite: isElite,
    speed: (t.img==='skeletonKing'?30: t.img==='shadowBlade'?22: t.img==='elementalLich'?8: t.isBoss?12: (25 + Math.random() * 10)), flash: 0, atkTimer: 0, dodgeTimer: 0, frozenTimer: 0,
    chapterBoss: isChapterBoss,
  });
  if (t.isBoss) {
    const warnText = isChapterBoss ? '★ 章节 BOSS 降临!' : '⚠ BOSS 来袭!';
    const warnColor = isChapterBoss ? '#ffd700' : '#ff4040';
    floatTexts.push({ x: 250, y: 30, text: warnText, color: warnColor, life: 2.5 });
  } else if (isElite) {
    floatTexts.push({ x: 250, y: 30, text: '✨ 精英怪!', color: '#ffd700', life: 1.5 });
  }
}

// ============ ATTACK ============
function comboMultiplier() {
  if (comboCount >= 30) return 4;
  if (comboCount >= 20) return 3;
  if (comboCount >= 10) return 2;
  if (comboCount >= 5) return 1.5;
  return 1;
}

function playerAttack() {
  if (catDead > 0) return;
  attackAnim = 0.3;
  attackArc = 1.0;
  const mult = comboMultiplier();
  const atkBuff = 1 + (state.skills.attack * 0.1);
  const wepDmg = sumEquipStat(itemTotalDmg); const fistDmg = wepDmg > 0 ? 0 : 1; const prestigeAtk = state.prestigeBuffs.atkStart || 0; const base = (wepDmg + fistDmg + Math.floor(state.level * 0.5) + totalPetAtkBonus() + prestigeAtk) * atkBuff;
  const critFromGear = sumEquipStat(it => (it ? it.affixes.filter(a=>a.key==='critBonus').reduce((s,a)=>s+a.value*0.01,0) : 0));
  const _cls = currentClass();
  const _skinBonusRate = OUTFITS[state.outfit] && OUTFITS[state.outfit].bonus;
  const outfitCritRate = (_skinBonusRate && _skinBonusRate.key === 'critRateAdd') ? _skinBonusRate.value : 0;
  let critChance = 0.05 + (state.skills.luck * 0.02) + critFromGear + (_cls ? _cls.critRateAdd : 0) + outfitCritRate + totalPetCritBonus() + (state.prestigeBuffs.critStart || 0) * 0.01;
  // 刺客被动: 连击 >=5 时暴击率 ×2
  if (_cls && _cls.id === 'rogue' && comboCount >= 5) critChance *= 2;
  const isCrit = Math.random() < critChance;
  const _skinBonus = OUTFITS[state.outfit] && OUTFITS[state.outfit].bonus;
  const outfitCritDmg = (_skinBonus && _skinBonus.key === 'critDmgMult') ? _skinBonus.value : 1.0;
  const critDmgMult = (_cls ? (2 * _cls.critDmgMult) : 2) * outfitCritDmg;
  const dmg = Math.ceil(base * mult * (isCrit ? critDmgMult : 1));
  let hit = false, target = null;
  for (const m of monsters) { if (m.x < 200) { target = m; break; } }
  if (!target) for (const m of monsters) { if (m.x < 300) { target = m; break; } }
  if (target) {
    const _tt = MONSTER_TYPES[target.type];
    if (_tt.img === 'shadowBlade' && Math.random() < 0.30) {
      floatTexts.push({ x: target.x + 10, y: target.y - 5, text: 'MISS', color: '#888888', life: 0.7 });
      return;
    }
    target.hp -= dmg;
    target.flash = 0.15;
    hit = true;
    // 法师被动: 暴击时冰冻减速目标 50% 持续 1.5s
    const _mageC = currentClass();
    if (_mageC && _mageC.id === 'mage' && isCrit) {
      target.frozenTimer = 1.5;
      floatTexts.push({ x: target.x + 10, y: target.y - 18, text: 'FROZEN', color: '#88ddff', life: 0.7 });
    }
    const hitColor = isCrit ? '#ff8040' : (mult >= 2 ? '#ffff40' : (mult >= 1.5 ? '#80ffff' : '#ffffff'));
    floatTexts.push({ x: target.x + 10, y: target.y - 5, text: (isCrit ? 'CRIT -' : '-') + dmg, color: hitColor, life: 0.8 });
    if (isCrit) {
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: target.x + target.size/2 || target.x + 15, y: target.y + 15,
          vx: (Math.random()-0.5)*160, vy: -Math.random()*160,
          color: '#ff8040', life: 0.6,
          size: 3, glow: true, gravity: 150, drag: 0.95,
        });
      }
    }
    if (target.hp <= 0) killMonster(target);
    // Lifesteal affix
    const lifestealPct = sumEquipStat(it => (it ? it.affixes.filter(a => a.key === 'lifesteal').reduce((s, a) => s + a.value, 0) : 0));
    if (lifestealPct > 0 && state.catHp < state.catMaxHp) {
      const heal = Math.ceil(dmg * lifestealPct * 0.01);
      state.catHp = Math.min(state.catMaxHp, state.catHp + heal);
      if (heal > 0) floatTexts.push({ x: 100, y: 55, text: '+' + heal, color: '#44ff88', life: 0.7 });
    }
    comboCount++;
    comboTimer = 2.0;
    if (comboCount > state.maxCombo) state.maxCombo = comboCount;
    const milestones = [5,10,20,30];
    for (const ms of milestones) {
      if (comboCount === ms && lastComboMilestone < ms) {
        lastComboMilestone = ms;
        floatTexts.push({ x: 250, y: 50, text: 'COMBO x' + ms + '!', color: '#ffff00', life: 1.5 });
        break;
      }
    }
  }
}

function killMonster(m) {
  const t = MONSTER_TYPES[m.type];
  state.kills++;
  state.xp += t.xpVal;
  const xpNeeded = state.level * 15;
  if (state.xp >= xpNeeded) {
    state.level++; state.xp -= xpNeeded; state.catMaxHp += 10; state.catHp = state.catMaxHp;
    floatTexts.push({ x: 80, y: 20, text: 'LEVEL UP!', color: '#ffff00', life: 1.5 });
    // 每 10 级触发章节 boss 必现
    if (state.level % 10 === 0) {
      state.chapterBossPending = 1;
      const nextCh = CHAPTERS[Math.floor(state.level / 10) % CHAPTERS.length];
      floatTexts.push({ x: 250, y: 25, text: '★ 进入 ' + nextCh.name, color: '#ffd700', life: 2.5 });
    }
  }
  // particles (boss = big explosion)
  const partCount = t.isBoss ? 40 : 14;
  const partSpeed = t.isBoss ? 220 : 120;
  for (let i = 0; i < partCount; i++) {
    particles.push({
      x: m.x + t.size/2, y: m.y + t.size/2,
      vx: (Math.random()-0.5)*partSpeed, vy: (Math.random()-0.5)*partSpeed,
      color: MONSTER_PARTICLE_COLOR[t.img] || '#ffffff',
      life: 0.6 + Math.random()*0.5,
      size: t.isBoss ? 5 : 3,
      glow: t.isBoss,
      gravity: 120, drag: 0.98,
    });
  }
  if (t.isBoss) {
    floatTexts.push({ x: 250, y: 40, text: '💥 BOSS 已斩!', color: '#ffff40', life: 2.0 });
  }
  // 宠物蛋掉落 (boss 20%, 其他 5%)
  const eggChance = t.isBoss ? 0.20 : 0.05;
  if (Math.random() < eggChance) {
    state.pendingEggs++;
    floatTexts.push({ x: m.x, y: m.y - 15, text: '🥚 +1 蛋', color: '#ffeedd', life: 1.8 });
  }
  // chest drop 80%
  if (Math.random() < 0.7) {
    const r = Math.random();
    const rarity = r < 0.6 ? 0 : (r < 0.9 ? 1 : 2);
    const greedBuff = 1 + (state.skills.greed * 0.1) + (state.prestigeBuffs.goldRate || 0) * 0.05; const gold = Math.ceil((t.goldMin + Math.floor(Math.random() * (t.goldMax - t.goldMin + 1))) * greedBuff);
    chestDrops.push({ x: m.x, y: m.y, rarity, gold: m.elite ? gold * 3 : gold, timer: 2.0, collected: false });
  }
  // Item drop
  const dropChance = t.isBoss ? 1.0 : (m.elite ? 0.5 : 0.22);
  if (Math.random() < dropChance) {
    const slots = ['head', 'body', 'weapon', 'accessory'];
    const slot = slots[Math.floor(Math.random() * slots.length)];
    const lv = state.level;
    const weights = m.chapterBoss ? [0, 0, 0, 5, 8] : (t.isBoss ? [1, 2, 3, 5, 8] : [10, 6, Math.max(1, lv - 1), Math.max(0, lv - 4), Math.max(0, lv - 9)]);
    const totalW = weights.reduce((s, w) => s + w, 0);
    let rr = Math.random() * totalW, rIdx = 0;
    for (let i = 0; i < weights.length; i++) { rr -= weights[i]; if (rr <= 0) { rIdx = i; break; } }
    const item = genItem(slot, rIdx);
    state.inventory.push(item);
    floatTexts.push({ x: m.x, y: m.y - 10, text: '📦 ' + RARITY[rIdx].name + item.name, color: RARITY[rIdx].color, life: 1.8 });
  }
  saveState();
}

function monsterAttack(m) {
  if (catDead > 0) return;
  // 战士被动: 20% 概率格挡免伤
  const _passC = currentClass();
  if (_passC && _passC.id === 'warrior' && Math.random() < 0.20) {
    catFlash = 0.15;
    floatTexts.push({ x: 80, y: 30, text: 'BLOCK!', color: '#cc6644', life: 0.8 });
    return;
  }
  const t = MONSTER_TYPES[m.type];
  let dmg;
  if (t.img === 'elementalLich') dmg = 16 + Math.floor(state.level * 1.0);
  else if (t.img === 'skeletonKing') dmg = 8 + Math.floor(state.level * 0.7);
  else if (t.img === 'shadowBlade') dmg = 6 + Math.floor(state.level * 0.6);
  else dmg = t.isBoss ? (10 + Math.floor(state.level * 0.8)) : (3 + m.type * 2 + Math.floor(state.level * 0.5));
  state.catHp -= dmg;
  catFlash = 0.2;
  floatTexts.push({ x: 80, y: 40, text: '-' + dmg, color: '#ff4444', life: 0.8 });
  if (state.catHp <= 0) {
    state.catHp = 0;
    catDead = 3.0;
    const lost = Math.floor(state.gold * 0.2);
    state.gold -= lost;
    if (lost > 0) floatTexts.push({ x: 80, y: 30, text: '-' + lost + '💰', color: '#ff6666', life: 1.2 });
  }
  saveState();
}

function compareItem(it) {
  const cur = state.equipment[it.slot];
  if (!cur) return { totalDelta: 999, parts: [] }; // empty slot always better
  const parts = [];
  const dmgA = itemTotalDmg(cur), dmgB = itemTotalDmg(it);
  const hpA = itemTotalHp(cur), hpB = itemTotalHp(it);
  if (dmgB !== dmgA) parts.push({ k: '攻', d: +(dmgB - dmgA).toFixed(1) });
  if (hpB !== hpA) parts.push({ k: 'HP', d: Math.floor(hpB - hpA) });
  // Affix diff
  const affixKeys = ['critBonus', 'lifesteal', 'gold'];
  for (const ak of affixKeys) {
    const va = cur.affixes.filter(a => a.key === ak).reduce((s, a) => s + a.value, 0);
    const vb = it.affixes.filter(a => a.key === ak).reduce((s, a) => s + a.value, 0);
    if (va !== vb) {
      const label = { critBonus: '暴击', lifesteal: '吸血', gold: '金币' }[ak];
      parts.push({ k: label, d: vb - va, pct: true });
    }
  }
  const total = parts.reduce((s, p) => s + p.d, 0);
  return { totalDelta: total, parts };
}

function renderCompareHtml(cmp) {
  if (cmp.parts.length === 0) return '';
  return '<span style="font-size:8px;margin-left:4px">' + cmp.parts.map(p => {
    const col = p.d > 0 ? '#44ff66' : '#ff4466';
    const sign = p.d > 0 ? '+' : '';
    const suffix = p.pct ? '%' : '';
    return `<span style="color:${col}">${p.k}${sign}${p.d}${suffix}</span>`;
  }).join(' ') + '</span>';
}

// ============ MODAL ============
function pickClass(id) {
  state.classId = id;
  const cls = CLASSES[id];
  const newMax = Math.floor((100 + (state.level - 1) * 10 + state.skills.vitality * 20) * (cls ? cls.hpMult : 1));
  state.catMaxHp = newMax;
  state.catHp = newMax;
  saveState();
  closeModal();
  floatTexts.push({ x: 250, y: 30, text: '选择 ' + cls.icon + cls.name, color: cls.color, life: 2.5 });
}

function openModal(type) {
  modalOpen = true;
  const el = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  el.classList.add('open');
  if (type === 'class') {
    let html = '<h3>选择你的职业</h3><div style="font-size:10px;color:#aaa;text-align:center;margin-bottom:8px">首次进入不可取消; 影响基础属性</div>';
    for (const k of Object.keys(CLASSES)) {
      const c = CLASSES[k];
      html += `<div class="row"><span><b style="color:${c.color}">${c.icon} ${c.name}</b><br><span style="font-size:9px;color:#aaa">${c.desc}</span></span><button onclick="pickClass('${k}')">选</button></div>`;
    }
    content.innerHTML = html;
    return;
  }
  if (type === 'backpack') {
    let totalC = state.chests[0] + state.chests[1] + state.chests[2];
    let html = '<h3>🎒 装备 (金币 ' + state.gold + ')</h3>';
    // 宠物区
    if (state.pendingEggs > 0 || state.pets.length > 0) {
      html += '<div style="font-size:9px;color:#ffeedd;margin:3px 0">🐾 宠物 (+' + totalPetAtkBonus() + ' 攻, +' + (totalPetCritBonus()*100).toFixed(0) + '% 暴)</div>';
      if (state.pendingEggs > 0) {
        html += `<div class="row"><span>🥚 ${state.pendingEggs} 枚未孵化蛋</span><button onclick="hatchEgg()">孵化</button></div>`;
      }
      if (state.pets.length > 0) {
        let petIcons = state.pets.map(p => { const t = PET_TYPES.find(x => x.id === p.typeId); return t ? `<span style="color:${t.color}" title="${t.name}">${t.name[0]}</span>` : ''; }).join(' ');
        html += `<div style="font-size:9px;color:#aaa;padding:2px 4px;border:1px solid #333;border-radius:3px;margin-bottom:4px">${petIcons}</div>`;
      }
    }
    // Equipped row
    const slotLabels = { head: '🎩头', body: '🧥身', weapon: '⚔️武', accessory: '💍饰' };
    html += '<div style="display:flex;gap:3px;margin-bottom:4px;font-size:10px">';
    for (const sk of ['head','body','weapon','accessory']) {
      const it = state.equipment[sk];
      if (it) {
        const rc = RARITY[it.rarityIdx].color;
        const upg = it.upgradeLevel > 0 ? '+' + it.upgradeLevel : '';
        html += `<div style="flex:1;padding:3px;border:1px solid ${rc};border-radius:3px;cursor:pointer" onclick="unequipItem('${sk}')" title="卸下"><span style="color:${rc}">${slotLabels[sk]}</span> ${it.name}${upg}</div>`;
      } else {
        html += `<div style="flex:1;padding:3px;border:1px dashed #333;border-radius:3px;color:#555">${slotLabels[sk]} —</div>`;
      }
    }
    html += '</div>';
    // 合成快捷 — 按 slot+rarity 聚合, 3 件可合成就显示
    {
      const groups = {};
      for (const it of state.inventory) {
        const k = it.slot + '_' + it.rarityIdx;
        groups[k] = groups[k] || { slot: it.slot, rarityIdx: it.rarityIdx, count: 0 };
        groups[k].count++;
      }
      const mergeable = Object.values(groups).filter(g => g.count >= 3 && g.rarityIdx < RARITY.length - 1);
      if (mergeable.length > 0) {
        html += '<div style="font-size:9px;color:#ffd700;margin:2px 0">⚗ 合成 (3件合1件升品质)</div>';
        for (const g of mergeable) {
          const rc = RARITY[g.rarityIdx].color;
          const next = RARITY[g.rarityIdx+1];
          const slotLbl = {head:'头',body:'身',weapon:'武',accessory:'饰'}[g.slot];
          html += `<div class="row" style="padding:2px 0"><span style="font-size:10px">${slotLbl} ×3 <span style="color:${rc}">${RARITY[g.rarityIdx].name}</span> → <span style="color:${next.color}">${next.name}</span> (${g.count} 可用)</span><button style="font-size:9px;padding:1px 5px;background:#ffb040" onclick="mergeSlotRarity('${g.slot}',${g.rarityIdx})">合</button></div>`;
        }
      }
    }
    // Chest quick-open
    if (totalC > 0) {
      html += `<div style="text-align:center;margin:4px 0"><button onclick="openAllChests()">🗝️ 开箱 (${totalC})</button></div>`;
    }
    // Inventory list
    if (state.inventory.length === 0) {
      html += '<div style="color:#666;font-size:10px;text-align:center;margin-top:6px">背包空 — 击杀怪物掉落装备</div>';
    } else {
      // Sort by rarity desc
      const sorted = state.inventory.slice().sort((a,b) => { const ca = compareItem(a).totalDelta; const cb = compareItem(b).totalDelta; if (ca !== cb) return cb - ca; return b.rarityIdx - a.rarityIdx; });
      for (const it of sorted) {
        const rc = RARITY[it.rarityIdx].color;
        const upg = it.upgradeLevel > 0 ? ' +' + it.upgradeLevel : '';
        const stats = itemStatSummary(it);
        const upCost = it.upgradeLevel >= 10 ? 'MAX' : (upgradeCost(it) + '💰');
        const cmp = compareItem(it);
        const cmpHtml = renderCompareHtml(cmp);
        html += `<div class="row" style="border-left:3px solid ${rc};padding-left:6px">
          <span><b style="color:${rc}">${slotLabels[it.slot]} ${it.name}${upg}</b>${cmpHtml}<br><span style="font-size:9px;color:#aaa">${stats}</span></span>
          <span style="display:flex;flex-direction:column;gap:1px">
            <button style="font-size:9px;padding:1px 5px" onclick="equipItem(${it.id})">装</button>
            <button style="font-size:9px;padding:1px 5px" onclick="upgradeItem(${it.id})" title="升级">⬆${upCost}</button>
            <button style="font-size:9px;padding:1px 5px;background:#6a4" onclick="rerollItem(${it.id})" title="重铸词缀">♻${rerollCost(it)}💰</button>
            <button style="font-size:9px;padding:1px 5px;background:#888" onclick="sellItem(${it.id})">卖${sellPrice(it)}💰</button>
          </span>
        </div>`;
      }
    }
    content.innerHTML = html;
  } else if (type === 'prestige') {
    let html = '<h3>★ 转生殿堂</h3>';
    html += '<div style="font-size:10px;color:#aaa;margin-bottom:4px">Lv50+ 可转生, 重置等级保留 50% 金币, 获得灵魂点 (永久加成)</div>';
    html += '<div style="font-size:10px;color:#ffd700;margin:4px 0">灵魂点: ' + state.soul + ' | 转生次数: ' + state.prestigeCount + '</div>';
    if (canPrestige()) {
      html += `<div class="row" style="background:#2a1a2e;padding:4px;border-radius:4px"><span><b style="color:#ffd700">★ 立即转生</b><br><span style="font-size:9px;color:#aaa">获得 +${prestigeGain()} 灵魂点</span></span><button onclick="doPrestige()" style="background:#bb44ff">转生</button></div>`;
    } else {
      html += `<div style="font-size:10px;color:#888;margin:4px 0">距离转生: Lv${state.level} / Lv50</div>`;
    }
    html += '<div style="font-size:10px;color:#888;margin:6px 0 2px 0">永久加成 (花灵魂点):</div>';
    for (const def of PRESTIGE_BUFFS) {
      const cur = state.prestigeBuffs[def.key] || 0;
      const affordable = state.soul >= def.costPer;
      const maxed = cur >= def.maxLv;
      let btn = maxed ? '<button class="owned">满</button>' : `<button onclick="buyPrestigeBuff('${def.key}')" ${affordable?'':'style="background:#555;color:#999"'}>${def.costPer}魂</button>`;
      html += `<div class="row"><span><b>${def.name}</b> Lv${cur}/${def.maxLv}<br><span style="font-size:9px;color:#aaa">${def.desc}</span></span>${btn}</div>`;
    }
    content.innerHTML = html;
    return;
  } else if (type === 'shop') {
    let html = '<h3>🛒 商城 (💰 ' + state.gold + ')</h3>';
    html += '<div style="font-size:10px;color:#aaa;margin:2px 0">🎨 猫咪装扮 — 解锁后点预览图切换</div>';
    for (let i = 0; i < OUTFITS.length; i++) {
      const o = OUTFITS[i];
      const owned = state.outfitOwned[i];
      const equipped = state.outfit === i;
      const bonusTxt = o.bonus ? o.bonus.desc : '（无加成）';
      let btn = '';
      if (equipped) btn = '<button class="equipped">穿着中</button>';
      else if (owned) btn = `<button onclick="equipOutfit(${i})">穿上</button>`;
      else {
        const affordable = state.gold >= o.cost;
        btn = `<button onclick="buyOutfit(${i})" ${affordable?'':'style="background:#555;color:#999"'}>${o.cost}💰</button>`;
      }
      const imgSrc = 'assets/' + (o.img === 'cat' ? 'cat.png' : (o.img === 'catKnight' ? 'cat_knight.png' : (o.img === 'catMage' ? 'cat_mage.png' : 'cat_rogue.png')));
      html += `<div class="row" style="border-left:3px solid ${o.color};padding-left:6px">
        <span style="display:flex;align-items:center;gap:6px">
          <img src="${imgSrc}" style="width:28px;height:28px;image-rendering:pixelated"/>
          <span><b style="color:${o.color}">${o.name}</b><br><span style="font-size:9px;color:#aaa">${bonusTxt}</span></span>
        </span>${btn}</div>`;
    }
    content.innerHTML = html;
  }
}

const ACHIEVEMENTS = [
  { id:'first_blood', name:'首杀', desc:'击败第一只怪物', check: s => s.kills >= 1, reward: 10 },
  { id:'slayer_50', name:'猎人', desc:'累计击杀 50', check: s => s.kills >= 50, reward: 100 },
  { id:'slayer_500', name:'屠戮者', desc:'累计击杀 500', check: s => s.kills >= 500, reward: 1000 },
  { id:'rich', name:'小康', desc:'持有 1000 金币', check: s => s.gold >= 1000, reward: 200 },
  { id:'tycoon', name:'巨贾', desc:'持有 10000 金币', check: s => s.gold >= 10000, reward: 2000 },
  { id:'level_5', name:'学徒', desc:'达到 5 级', check: s => s.level >= 5, reward: 50 },
  { id:'level_15', name:'大师', desc:'达到 15 级', check: s => s.level >= 15, reward: 500 },
  { id:'combo_10', name:'连击手', desc:'连击 10', check: s => s.maxCombo >= 10, reward: 100 },
  { id:'combo_30', name:'机枪手', desc:'连击 30', check: s => s.maxCombo >= 30, reward: 500 },
  { id:'boss_slayer', name:'屠龙者', desc:'首次击杀 BOSS', check: s => s.bossKills >= 1, reward: 1000 },
];

function checkAchievements() {
  let unlocked = false;
  for (const a of ACHIEVEMENTS) {
    if (state.achievements.includes(a.id)) continue;
    if (a.check(state)) {
      state.achievements.push(a.id);
      state.gold += a.reward;
      floatTexts.push({ x: 250, y: 30, text: '🏆 ' + a.name, color: '#ffd700', life: 2.5 });
      floatTexts.push({ x: 250, y: 50, text: '+' + a.reward + '💰', color: '#ffd700', life: 2.5 });
      for (let i = 0; i < 30; i++) {
        particles.push({
          x: 250, y: 40,
          vx: (Math.random()-0.5)*200, vy: -Math.random()*180 - 40,
          color: '#ffd700', life: 1.0 + Math.random()*0.5,
          size: 4, glow: true, gravity: 160, drag: 0.97,
        });
      }
      unlocked = true;
    }
  }
  if (unlocked) saveState();
}

function skillCost(level) { return 50 * (level + 1) * (level + 1); }

function buySkill(key) {
  const cur = state.skills[key];
  if (cur >= 10) return;
  const cost = skillCost(cur);
  if (state.gold < cost) return;
  state.gold -= cost;
  state.skills[key] = cur + 1;
  if (key === 'vitality') { state.catMaxHp += 20; state.catHp = Math.min(state.catMaxHp, state.catHp + 20); }
  saveState();
  openModal('skills');
}

function closeModal() { modalOpen = false; document.getElementById('modal').classList.remove('open'); }

function openAllChests() {
  let totalGold = 0;
  let totalCount = state.chests[0] + state.chests[1] + state.chests[2];
  const goldPer = [5, 15, 40];
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < state.chests[i]; j++) {
      totalGold += goldPer[i] + Math.floor(Math.random() * goldPer[i]);
    }
    state.chests[i] = 0;
  }
  if (totalGold > 0) {
    state.gold += totalGold;
    floatTexts.push({ x: 200, y: 50, text: '+' + totalGold + '💰', color: '#FFD700', life: 1.5 });
    // Golden sparkle burst at cat
    for (let i = 0; i < Math.min(60, 10 + totalCount * 3); i++) {
      particles.push({
        x: 100, y: 80,
        vx: (Math.random()-0.5)*180, vy: -Math.random()*200 - 50,
        color: Math.random() < 0.5 ? '#FFD700' : '#ffff80',
        life: 0.8 + Math.random()*0.7,
        size: 4, glow: true,
        gravity: 200, drag: 0.97,
      });
    }
    saveState();
  }
  openModal('backpack');
}


function applyOutfitBonus() {
  // recompute catMaxHp (class + skills + outfit-hp-mult)
  const _cls = currentClass();
  const _skin = OUTFITS[state.outfit];
  const outfitHpMult = (_skin && _skin.bonus && _skin.bonus.key === 'hpMult') ? _skin.bonus.value : 1.0;
  const newMax = Math.floor((100 + (state.level - 1) * 10 + state.skills.vitality * 20) * (_cls ? _cls.hpMult : 1) * outfitHpMult);
  state.catMaxHp = newMax;
  if (state.catHp > newMax) state.catHp = newMax;
}
function buyOutfit(i) {
  if (state.gold >= OUTFITS[i].cost && !state.outfitOwned[i]) {
    state.gold -= OUTFITS[i].cost; state.outfitOwned[i] = true; state.outfit = i;
    applyOutfitBonus();
    saveState(); openModal('shop');
  }
}
function equipOutfit(i) {
  state.outfit = i;
  applyOutfitBonus();
  saveState();
  openModal('shop');
}

// 转生系统
function canPrestige() { return state.level >= 50; }
function prestigeGain() {
  // 灵魂点 = floor(level / 10) + prestigeCount * 2
  return Math.floor(state.level / 10) + state.prestigeCount * 2;
}
function doPrestige() {
  if (!canPrestige()) return;
  const gain = prestigeGain();
  const keepGold = Math.floor(state.gold * 0.5);
  // 保留: classId, soul, prestigeCount, prestigeBuffs, outfitOwned, outfit
  const keep = {
    classId: state.classId,
    soul: state.soul + gain,
    prestigeCount: state.prestigeCount + 1,
    prestigeBuffs: state.prestigeBuffs,
    outfitOwned: state.outfitOwned,
    outfit: state.outfit,
  };
  state = defaultState();
  Object.assign(state, keep);
  state.gold = keepGold;
  // 应用 prestigeBuffs 到初始状态
  applyPrestigeStart();
  saveState();
  floatTexts.push({ x: 200, y: 30, text: '★ 转生 +' + gain + ' 灵魂', color: '#ffd700', life: 3.0 });
  closeModal();
}
function applyPrestigeStart() {
  const b = state.prestigeBuffs;
  // 重算 catMaxHp (加上 hpStart buff)
  const _cls = currentClass();
  const _skin = OUTFITS[state.outfit];
  const outfitHpMult = (_skin && _skin.bonus && _skin.bonus.key === 'hpMult') ? _skin.bonus.value : 1.0;
  const newMax = Math.floor((100 + b.hpStart * 20) * (_cls ? _cls.hpMult : 1) * outfitHpMult);
  state.catMaxHp = newMax;
  state.catHp = newMax;
}
// 购买 prestige buff (花灵魂点)
const PRESTIGE_BUFFS = [
  { key: 'atkStart',  name: '初始攻击', desc: '+1 起始攻击/级', costPer: 1, maxLv: 10 },
  { key: 'goldRate',  name: '金币倍率', desc: '+5% 金币掉落/级', costPer: 1, maxLv: 10 },
  { key: 'critStart', name: '初始暴击', desc: '+1% 起始暴击率/级', costPer: 2, maxLv: 10 },
  { key: 'hpStart',   name: '初始HP', desc: '+20 起始最大HP/级', costPer: 1, maxLv: 10 },
];
function buyPrestigeBuff(k) {
  const def = PRESTIGE_BUFFS.find(x => x.key === k);
  if (!def) return;
  const cur = state.prestigeBuffs[k] || 0;
  if (cur >= def.maxLv) return;
  if (state.soul < def.costPer) return;
  state.soul -= def.costPer;
  state.prestigeBuffs[k] = cur + 1;
  applyPrestigeStart();
  saveState();
  openModal('prestige');
}

function resetData() { state = defaultState(); monsters = []; particles = []; floatTexts = []; chestDrops = []; weatherDrops = []; comboCount = 0; comboTimer = 0; lastComboMilestone = 0; saveState(); }

// ============ UPDATE & RENDER ============
let lastTime = performance.now();

function update(dt) {
  if (modalOpen) return;

  // spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) { spawnTimer = 4; spawnMonster(); }

  // weather cycle
  weatherTimer -= dt;
  if (weatherTimer <= 0) {
    weatherTimer = 20 + Math.random() * 40;
    const r = Math.random();
    weatherMode = r < 0.6 ? 'clear' : (r < 0.85 ? 'rain' : 'snow');
    weatherDrops = [];
  }
  // spawn drops
  if (weatherMode === 'rain') {
    for (let i = 0; i < 3; i++) {
      weatherDrops.push({ x: Math.random()*500, y: -5, vx: -40, vy: 380, type: 'rain', life: 1.0 });
    }
  } else if (weatherMode === 'snow') {
    if (Math.random() < 0.5) {
      weatherDrops.push({ x: Math.random()*500, y: -5, vx: Math.sin(Date.now()*0.001)*15, vy: 40 + Math.random()*30, type: 'snow', life: 3.0 });
    }
  }
  for (const d of weatherDrops) {
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    if (d.type === 'snow') d.vx = Math.sin((Date.now() + d.y) * 0.002) * 15;
    d.life -= dt;
    if (d.y > 128) d.life = 0;
  }
  weatherDrops = weatherDrops.filter(d => d.life > 0);

  // cat dead
  if (catDead > 0) {
    catDead -= dt;
    if (catDead <= 0) { state.catHp = state.catMaxHp; saveState(); }
  }

  // attack anim
  if (attackAnim > 0) attackAnim -= dt;
  if (attackArc > 0) attackArc -= dt * 4;

  // combo timer (resets combo if no hit in 2s)
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; lastComboMilestone = 0; }
  }

  // cat flash
  if (catFlash > 0) catFlash -= dt;

  // monsters
  for (const m of monsters) {
    if (m.hp <= 0) continue;
    if (m.flash > 0) m.flash -= dt;
    if (m.frozenTimer > 0) m.frozenTimer -= dt;
    const _mt = MONSTER_TYPES[m.type];
    const isRanged = _mt.img === 'elementalLich';
    const atkRange = isRanged ? 350 : 130;
    const atkCd = isRanged ? 3 : (_mt.img === 'shadowBlade' ? 1.2 : 2);
    const speedMult = (m.frozenTimer > 0) ? 0.5 : 1.0;
    if (m.x > atkRange) {
      m.x -= m.speed * speedMult * dt;
    } else {
      m.atkTimer += dt;
      if (m.atkTimer >= atkCd) { m.atkTimer = 0; monsterAttack(m); }
    }
  }
  monsters = monsters.filter(m => m.hp > 0);

  // chest drops
  for (const c of chestDrops) {
    c.timer -= dt;
    if (c.timer <= 0 && !c.collected) {
      c.collected = true;
      state.chests[c.rarity]++;
      const goldPct = sumEquipStat(it => (it ? it.affixes.filter(a => a.key === 'gold').reduce((s, a) => s + a.value, 0) : 0));
      const finalGold = Math.ceil(c.gold * (1 + goldPct * 0.01));
      state.gold += finalGold;
      floatTexts.push({ x: c.x, y: c.y - 10, text: '+' + finalGold + '💰', color: '#FFD700', life: 1.0 });
      saveState();
    }
    if (c.collected || c.timer <= 0) {
      // fly toward cat
      const pullSpeed = 5 + Math.max(0, state.skills.luck) * 0.5;
      c.x += (80 - c.x) * dt * pullSpeed;
      c.y += (80 - c.y) * dt * pullSpeed;
    }
  }
  chestDrops = chestDrops.filter(c => !c.collected || Math.abs(c.x - 80) > 5);

  // particles (with gravity + drag)
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += (p.gravity || 0) * dt;
    p.vx *= p.drag !== undefined ? p.drag : 1;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  // float texts
  for (const f of floatTexts) { f.y -= 30 * dt; f.life -= dt; }
  floatTexts = floatTexts.filter(f => f.life > 0);
}

function render(time) {
  // clear to transparent
  ctx.clearRect(0, 0, 500, 136);

  // 章节主题天空底色
  {
    const _ch = currentChapter();
    if (_ch.skyTint) {
      ctx.save();
      ctx.fillStyle = _ch.skyTint;
      ctx.fillRect(0, 0, 500, 120);
      ctx.restore();
    }
  }

  // day/night factor (0=noon, 1=midnight)
  const nowHr = new Date().getHours() + new Date().getMinutes() / 60;
  // 6-18 is day, peak at 12; 18-6 is night, peak at 0
  const distFromNoon = Math.min(Math.abs(nowHr - 12), 24 - Math.abs(nowHr - 12));
  const nightF = Math.min(1, Math.max(0, (distFromNoon - 3) / 6));

  // stars (night only)
  if (nightF > 0.1) {
    for (const s of stars) {
      const bri = (0.3 + 0.7 * Math.abs(Math.sin(time * 0.001 + s.phase))) * nightF;
      ctx.fillStyle = `rgba(255,255,255,${bri})`;
      ctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.s), Math.ceil(s.s));
    }
  }

  // celestial body: moon at night, sun at day
  const celX = 440, celY = 24;
  if (nightF > 0.5) {
    // Moon
    ctx.save();
    ctx.globalAlpha = nightF;
    ctx.fillStyle = '#fffacd';
    ctx.beginPath(); ctx.arc(celX, celY, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(15,15,30,0.85)';
    ctx.beginPath(); ctx.arc(celX - 3, celY - 2, 9, 0, Math.PI*2); ctx.fill();
    // glow
    ctx.globalAlpha = nightF * 0.25;
    ctx.fillStyle = '#fffacd';
    ctx.beginPath(); ctx.arc(celX, celY, 16, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  } else if (nightF < 0.3) {
    // Sun
    ctx.save();
    ctx.globalAlpha = 1 - nightF;
    // Rays
    ctx.strokeStyle = '#ffd840';
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4 + time * 0.0005;
      ctx.beginPath();
      ctx.moveTo(celX + Math.cos(a) * 12, celY + Math.sin(a) * 12);
      ctx.lineTo(celX + Math.cos(a) * 16, celY + Math.sin(a) * 16);
      ctx.stroke();
    }
    ctx.fillStyle = '#ffe040';
    ctx.beginPath(); ctx.arc(celX, celY, 10, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = (1 - nightF) * 0.3;
    ctx.beginPath(); ctx.arc(celX, celY, 18, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // weather drops
  for (const d of weatherDrops) {
    if (d.type === 'rain') {
      ctx.strokeStyle = 'rgba(140,180,255,0.7)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.vx*0.015, d.y + d.vy*0.015);
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(d.x, d.y, 2, 2);
    }
  }

  // grass ground (tiled)
  if (IMG.ground && IMG.ground.complete) {
    for (let i = 0; i < 500; i += 64) {
      ctx.drawImage(IMG.ground, i, 120, 64, 16);
    }
  } else {
    ctx.fillStyle = '#1a5c1a';
    ctx.fillRect(0, 128, 500, 8);
  }
  // 章节主题地面着色
  {
    const _ch = currentChapter();
    if (_ch.groundTint) {
      ctx.save();
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = _ch.groundTint;
      ctx.fillRect(0, 120, 500, 16);
      ctx.restore();
    }
  }

  // chest drops
  for (const c of chestDrops) {
    const cimg = c.rarity === 0 ? IMG.chestN : (c.rarity === 1 ? IMG.chestR : IMG.chestE);
    drawImg(cimg, c.x, c.y, 24, 24, false);
  }

  // monsters
  for (const m of monsters) {
    const t = MONSTER_TYPES[m.type];
    drawImg(IMG[t.img], m.x, m.y, t.size, t.size, m.flash > 0);
    if (m.elite) {
      // gold sparkle tint
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      ctx.globalAlpha = 0.35 + 0.15 * Math.sin(time * 0.008);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(m.x, m.y, t.size, t.size);
      ctx.restore();
    }
    // hp bar
    const w = t.size;
    const hpRatio = m.hp / m.maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(m.x, m.y - 5, w, 3);
    ctx.fillStyle = hpRatio > 0.5 ? '#4a4' : '#a44';
    ctx.fillRect(m.x, m.y - 5, w * hpRatio, 3);
  }

  // cat
  const CAT_SIZE = 52;
  const catX = 80, catBaseY = 136 - CAT_SIZE - 8;
  let catY = catBaseY;
  if (attackAnim > 0) catY -= 2;
  const catVisible = catDead > 0 ? (Math.floor(catDead * 6) % 2 === 0) : true;
  if (catVisible) {
    const _skin = OUTFITS[state.outfit] || OUTFITS[0];
    const _skinImg = IMG[_skin.img] || IMG.cat;
    drawImg(_skinImg, catX, catY, CAT_SIZE, CAT_SIZE, catFlash > 0);
    // 宠物: 猫后方 一字排开 tiny 16x16
    for (let i = 0; i < Math.min(state.pets.length, 5); i++) {
      const pt = PET_TYPES.find(x => x.id === state.pets[i].typeId);
      if (!pt) continue;
      const petImg = IMG[pt.img];
      if (!petImg) continue;
      const px = catX - 20 - i * 18;
      const py = catBaseY + CAT_SIZE - 18;
      drawImg(petImg, px, py, 16, 16, false);
    }
    // outfit tint overlay
    if (state.outfit !== 0) {
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = state.outfit === 1 ? '#4466cc' : '#cc44ff';
      ctx.fillRect(catX, catY, CAT_SIZE, CAT_SIZE);
      ctx.restore();
    }
  }

  // cat hp bar
  const hpRatio = state.catHp / state.catMaxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(catX, catY - 7, CAT_SIZE, 4);
  ctx.fillStyle = hpRatio > 0.3 ? '#4c4' : '#c44';
  ctx.fillRect(catX, catY - 7, CAT_SIZE * hpRatio, 4);

  // weapon swing (rotating PNG during attack)
  if (attackArc > 0) {
    const wep = state.equipment.weapon; const wepKey = wep ? wep.icon : 'swordWep'; const wepImg = IMG[wepKey];
    if (wep && wepImg && wepImg.complete) {
      const pivotX = catX + CAT_SIZE - 4;
      const pivotY = catY + CAT_SIZE * 0.45;
      const swingProgress = 1 - attackArc; // 0→1 across swing
      const angle = -Math.PI * 0.3 + swingProgress * Math.PI * 0.8;
      ctx.save();
      ctx.translate(pivotX, pivotY);
      ctx.rotate(angle);
      const wSize = 22;
      ctx.drawImage(wepImg, 0, -wSize/2, wSize, wSize);
      ctx.restore();
      // Slash trail (white arc)
      ctx.strokeStyle = `rgba(255,255,255,${attackArc * 0.6})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pivotX, pivotY, 18, -Math.PI * 0.3, angle);
      ctx.stroke();
    }
  }

  // particles (size + glow)
  for (const p of particles) {
    const a = Math.min(1, p.life * 2);
    const sz = p.size || 3;
    if (p.glow) {
      ctx.globalAlpha = a * 0.4;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - sz, p.y - sz, sz * 3, sz * 3);
    }
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, sz, sz);
  }
  ctx.globalAlpha = 1;

  // float texts
  ctx.textAlign = 'center';
  for (const f of floatTexts) {
    const a = Math.min(1, f.life * 2);
    ctx.globalAlpha = a;
    ctx.fillStyle = f.color;
    let fontSize = 11;
    if (f.text.includes('LEVEL') || f.text.includes('BOSS') || f.text.includes('COMBO')) fontSize = 15;
    else if (f.text.startsWith('CRIT')) fontSize = 14;
    else if (f.text.startsWith('🏆')) fontSize = 14;
    ctx.font = 'bold ' + fontSize + 'px monospace';
    // text shadow for readability
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 3;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.textAlign = 'start';
}

function gameLoop(now) {
  try {
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    update(dt);
    render(now);
    // update stats
    const comboStr = comboCount >= 2 ? ` 🔥${comboCount}x${comboMultiplier()}` : '';
    if (!window._achTick) window._achTick = 0;
    window._achTick++;
    if (window._achTick % 60 === 0) checkAchievements();
    const xpNeeded = state.level * 15; const xpPct = Math.min(100, (state.xp / xpNeeded) * 100); document.getElementById('xpbar').style.width = xpPct + '%';
    document.getElementById('stats').textContent = `[${currentChapter().name}] 💰${state.gold} ⚔️${state.kills} Lv${state.level}${comboStr}`;
  } catch(e) { console.error(e); }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// ============ INPUT ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { if (modalOpen) closeModal(); return; }
  if (modalOpen) return;
  playerAttack();
});

canvas.addEventListener('click', () => {
  if (modalOpen) return;
  playerAttack();
});

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ============ TAURI ============
async function hideWindow() {
  if (window.__TAURI__) {
    await window.__TAURI__.window.getCurrentWindow().hide();
  }
}

if (window.__TAURI__) {
  const { listen } = window.__TAURI__.event;
  listen('open-backpack', () => openModal('backpack'));
  listen('open-shop', () => openModal('shop'));
  listen('reset-data', () => resetData());
  let lastGlobal = 0;
  window.keyHits = 0;
  window.mouseHits = 0;
  window.tapStatus = 'pending';
  listen('global-input', (e) => {
    // counter updated via heartbeat
    if (modalOpen) return;
    const now = Date.now();
    if (now - lastGlobal > 150) { lastGlobal = now; playerAttack(); }
  });
  listen('input-heartbeat', (e) => {
    if (e.payload && typeof e.payload === 'object') { window.keyHits = e.payload.k || 0; window.mouseHits = e.payload.m || 0; }
  });
}

// Accessibility permission
async function openAxSettings() {
  if (window.__TAURI__) {
    try { await window.__TAURI__.core.invoke('open_ax_settings'); }
    catch (e) { console.error('open_ax_settings failed', e); }
  }
}

if (window.__TAURI__) {
  const { listen: listenAx } = window.__TAURI__.event;
  listenAx('accessibility-needed', () => { document.getElementById('axwarn').style.display = 'block'; window.tapStatus = 'pending'; });
  listenAx('input-tap-failed', () => { window.tapStatus = 'fail';
    const w = document.getElementById('axwarn');
    w.style.display = 'block';
  });
  listenAx('input-tap-ok', () => { document.getElementById('axwarn').style.display = 'none'; window.tapStatus = 'ok'; });
}
</script>

  setTimeout(() => {
    if (!state.classId) {
      try { openModal('class'); } catch (e) { console.warn('class modal failed', e); }
    }
  }, 600);
});
</script>
