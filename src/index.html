<!DOCTYPE html>

<script>
'use strict';
// ============================================================
// BondCat v0.2.0 — Tauri v2 Desktop Floating Game
// ============================================================

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 600, H = 200;
ctx.imageSmoothingEnabled = false;

// ---- Save / Load -------------------------------------------
const SAVE_KEY = 'bondcat_v2';
function defaultData() {
  return { coins: 0, kills: 0, level: 1, xp: 0, weapon: 0, skin: 0, chests: [0,0,0], catHp: 100, catMaxHp: 100 };
}
function loadData() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return defaultData();
    const d = JSON.parse(raw);
    if (!d || typeof d !== 'object') return defaultData();
    const def = defaultData();
    for (const k of Object.keys(def)) {
      if (d[k] === null || d[k] === undefined) d[k] = def[k];
    }
    if (!Array.isArray(d.chests) || d.chests.length !== 3) d.chests = [0,0,0];
    for (let i = 0; i < 3; i++) d.chests[i] = d.chests[i] || 0;
    d.coins = d.coins || 0;
    d.kills = d.kills || 0;
    d.level = d.level || 1;
    d.xp = d.xp || 0;
    d.catHp = d.catHp || 100;
    d.catMaxHp = d.catMaxHp || 100;
    return d;
  } catch(e) { return defaultData(); }
}
function saveData() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(game)); } catch(e){} }

let game = loadData();

// ---- Sprites -----------------------------------------------

const CAT_SPRITE = [

  'OOKKKKKKKKKWKOO.',
  'OOKWKKKKKKKKOO..',

];

// --- Slime (12x12) ---
const SLIME_SPRITE = [

  '..GGGGGGGG..',

  'GGWGGGGGWGGG',

];
const SLIME_COLORS = { G:'#44dd44', W:'#ffffff', B:'#111111', M:'#228822' };

// --- Bat (12x12) ---
const BAT_SPRITE = [
  'P..........P',
  'PP........PP',
  'PPP..PP..PPP',
  'PPPPPPPPPPP.',
  '.PPWPPPPWPP.',
  '.PPBPPMPPBP.',
  '..PPPPPPPP..',
  '..PPPPPPPP..',
  '...PP..PP...',
  '..P......P..',
  '............',
  '............',
];

// --- Skeleton (12x12) ---
const SKULL_SPRITE = [
  '....WWWW....',
  '..WWWWWWWW..',
  '.WWWWWWWWWW.',
  'WWWBWWWWBWWW',
  'WWWBWWWWBWWW',

  '..WWWGGWWW..',
  '...WGWGWW...',
  '....WWWW....',

  '....WWWW....',
  '....W..W....',
];
const SKULL_COLORS = { W:'#e8e8e8', B:'#111111', G:'#888888' };

const MONSTER_TYPES = [
  { name:'slime', sprite:SLIME_SPRITE, colors:SLIME_COLORS, hp:30, xp:10, speed:28 },
  { name:'bat',   sprite:BAT_SPRITE,   colors:BAT_COLORS,   hp:20, xp:15, speed:35 },
  { name:'skull', sprite:SKULL_SPRITE,  colors:SKULL_COLORS,  hp:50, xp:25, speed:25 },
];

// ---- Chest sprite (8x8) ---
const CHEST_SPRITE = [
  '.BBBBBB.',
  'BCCCCCB.',
  'BCCCCCB.',
  'BBYYYBB.',
  'BCCCCCB.',
  'BCCCCCB.',
  'BCCCCCB.',
  '.BBBBBB.',
];
const CHEST_COLORS_NORMAL = { B:'#5a3a1a', C:'#a07040', Y:'#ffd700' };
const CHEST_COLORS_RARE   = { B:'#1a3a6a', C:'#4080c0', Y:'#88ccff' };
const CHEST_COLORS_EPIC   = { B:'#4a1a6a', C:'#9040c0', Y:'#dd88ff' };

function drawSprite(x, y, sprite, colorMap, scale) {
  ctx.save();
  for (let row = 0; row < sprite.length; row++) {
    for (let col = 0; col < sprite[row].length; col++) {
      const c = sprite[row][col];
      if (c !== '.' && colorMap[c]) {
        ctx.fillStyle = colorMap[c];
        ctx.fillRect(x + col * scale, y + row * scale, scale, scale);
      }
    }
  }
  ctx.restore();
}

// ---- Game State --------------------------------------------
const CAT_X = 80;
const CAT_SCALE = 3;
const CAT_W = 16 * CAT_SCALE;
const CAT_H = 16 * CAT_SCALE;
const GROUND_Y = H - 8;
const CAT_Y = GROUND_Y - CAT_H;

let monsters = [];
let chestDrops = [];
let effects = [];
let lastSpawn = 0;
let modalOpen = null; // null | 'backpack' | 'shop'
let catDead = false;
let catDeadTimer = 0;
let catHitFlash = 0;
let attackArc = 0;
let stars = [];
let lastTime = 0;
let saveTimer = 0;

// Generate stars
for (let i = 0; i < 30; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * (H - 40), size: Math.random() * 1.5 + 0.5, blink: Math.random() * Math.PI * 2 });
}

// ---- Weapons -----------------------------------------------
const WEAPONS = [
  { name: '木剑',   atk: 10, price: 0 },
  { name: '铁剑',   atk: 18, price: 50 },
  { name: '火焰剑', atk: 30, price: 150 },
  { name: '雷霆剑', atk: 50, price: 400 },
];

const SKINS = [
  { name: '默认',   price: 0 },
  { name: '黑猫',   price: 100 },
  { name: '白猫',   price: 200 },
];

function getAtk() {
  const w = game.weapon || 0;
  return (WEAPONS[w] ? WEAPONS[w].atk : 10) + (game.level || 1) * 2;
}

function xpToLevel(lv) { return lv * 30; }

function addXp(amount) {
  game.xp = (game.xp || 0) + amount;
  while (game.xp >= xpToLevel(game.level)) {
    game.xp -= xpToLevel(game.level);
    game.level++;
    game.catMaxHp = 100 + (game.level - 1) * 10;
    game.catHp = game.catMaxHp;
  }
}

// ---- Drawing -----------------------------------------------
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBackground(t) {
  ctx.save();
  // Rounded clip for entire canvas
  roundRect(0, 0, W, H, 12);
  ctx.clip();
  // No background - fully transparent (only sprites visible)
  // Stars
  for (const s of stars) {
    const alpha = 0.4 + 0.4 * Math.sin(t * 1.5 + s.blink);
    ctx.fillStyle = `rgba(255,255,220,${alpha.toFixed(2)})`;
    ctx.fillRect(Math.round(s.x), Math.round(s.y), Math.ceil(s.size), Math.ceil(s.size));
  }
  // Ground / grass
  ctx.fillStyle = '#2a5a2a';
  ctx.fillRect(0, GROUND_Y, W, 8);
  // Grass blades
  ctx.fillStyle = '#3a7a3a';
  for (let x = 0; x < W; x += 6) {
    ctx.fillRect(x, GROUND_Y - 2, 2, 4);
  }
  ctx.fillStyle = '#4a9a4a';
  for (let x = 3; x < W; x += 10) {
    ctx.fillRect(x, GROUND_Y - 3, 1, 3);
  }
  ctx.restore();
}

function drawCat(t) {
  ctx.save();
  if (catDead) {
    // Flicker effect
    const flicker = Math.sin(t * 12) > 0 ? 0.3 : 0.7;
    ctx.globalAlpha = flicker;
    drawSprite(CAT_X, CAT_Y, CAT_DEAD_SPRITE, CAT_COLORS, CAT_SCALE);
  } else {
    if (catHitFlash > 0) {
      ctx.globalAlpha = Math.sin(catHitFlash * 15) > 0 ? 0.5 : 1.0;
    }
    // Idle bounce
    const bounce = Math.sin(t * 3) * 2;
    drawSprite(CAT_X, CAT_Y + bounce, CAT_SPRITE, CAT_COLORS, CAT_SCALE);
  }
  // HP bar
  ctx.globalAlpha = 1;
  const hpRatio = Math.max(0, (game.catHp || 0)) / (game.catMaxHp || 100);
  const barW = 40, barH = 4;
  const barX = CAT_X + (CAT_W - barW) / 2;
  const barY = CAT_Y - 8;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = hpRatio > 0.5 ? '#44dd44' : hpRatio > 0.25 ? '#dddd44' : '#dd4444';
  ctx.fillRect(barX, barY, barW * hpRatio, barH);
  ctx.restore();
}

function drawMonsters(t) {
  ctx.save();
  for (const m of monsters) {
    const bounce = Math.sin(t * 4 + m.id) * 2;
    const my = GROUND_Y - m.type.sprite.length * 3;
    if (m.hitFlash > 0) {
      ctx.globalAlpha = 0.5;
    } else {
      ctx.globalAlpha = 1;
    }
    drawSprite(m.x, my + bounce, m.type.sprite, m.type.colors, 3);
    // HP bar
    ctx.globalAlpha = 1;
    const hpRatio = m.hp / m.type.hp;
    ctx.fillStyle = '#333';
    ctx.fillRect(m.x + 4, my - 6, 28, 3);
    ctx.fillStyle = '#dd4444';
    ctx.fillRect(m.x + 4, my - 6, 28 * hpRatio, 3);
  }
  ctx.restore();
}

function drawChests(t) {
  ctx.save();
  for (const c of chestDrops) {
    const colors = c.rarity === 2 ? CHEST_COLORS_EPIC : c.rarity === 1 ? CHEST_COLORS_RARE : CHEST_COLORS_NORMAL;
    const floatY = Math.sin(t * 3 + c.x) * 3;
    drawSprite(c.x, c.y + floatY, CHEST_SPRITE, colors, 3);
  }
  ctx.restore();
}

function drawEffects(t) {
  ctx.save();
  for (const e of effects) {
    if (e.type === 'slash') {
      ctx.globalAlpha = e.life;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      const startAngle = -Math.PI * 0.4;
      const endAngle = Math.PI * 0.4;
      const progress = 1 - e.life;
      const currentEnd = startAngle + (endAngle - startAngle) * progress;
      ctx.arc(e.x, e.y, 30, startAngle, currentEnd);
      ctx.stroke();
      // Inner glow
      ctx.strokeStyle = 'rgba(255,200,100,0.5)';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(e.x, e.y, 28, startAngle, currentEnd);
      ctx.stroke();
    } else if (e.type === 'text') {
      ctx.globalAlpha = e.life;
      ctx.font = 'bold 12px monospace';
      ctx.fillStyle = e.color || '#ffdd44';
      ctx.fillText(e.text, e.x, e.y);
    }
  }
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  // Background panel
  roundRect(6, 6, 170, 22, 6);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();
  ctx.font = '11px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('\u{1F4B0}' + (game.coins || 0), 12, 21);
  ctx.fillStyle = '#ff6666';
  ctx.fillText('\u{2694}\uFE0F' + (game.kills || 0), 65, 21);
  ctx.fillStyle = '#88ccff';
  ctx.fillText('Lv' + (game.level || 1), 118, 21);
  // XP bar
  const xpRatio = (game.xp || 0) / xpToLevel(game.level || 1);
  ctx.fillStyle = '#333';
  ctx.fillRect(148, 12, 20, 6);
  ctx.fillStyle = '#44aaff';
  ctx.fillRect(148, 12, 20 * xpRatio, 6);
  ctx.restore();
}

function drawModal() {
  ctx.save();
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  // Panel
  const px = 80, py = 20, pw = W - 160, ph = H - 40;
  roundRect(px, py, pw, ph, 10);
  ctx.fillStyle = 'rgba(20,20,40,0.95)';
  ctx.fill();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#ffffff';

  if (modalOpen === 'backpack') {
    ctx.fillText('--- 背包 ---', px + pw/2 - 50, py + 24);
    ctx.font = '11px monospace';
    const labels = ['普通', '稀有', '史诗'];
    const colors = ['#a07040', '#4080c0', '#9040c0'];
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = colors[i];
      ctx.fillText(labels[i] + ' x' + (game.chests[i] || 0), px + 20, py + 50 + i * 18);
    }
    // Open all button
    const total = (game.chests[0]||0) + (game.chests[1]||0) + (game.chests[2]||0);
    const btnX = px + pw - 110, btnY = py + 50, btnW = 90, btnH = 28;
    roundRect(btnX, btnY, btnW, btnH, 5);
    ctx.fillStyle = total > 0 ? '#44aa44' : '#555555';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '11px monospace';
    ctx.fillText('全部打开', btnX + 14, btnY + 18);
    // Store button bounds for click detection
    modalBtns = [{ x:btnX, y:btnY, w:btnW, h:btnH, action:'openAllChests' }];
    // Close hint
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('ESC 关闭', px + pw/2 - 28, py + ph - 8);
  } else if (modalOpen === 'shop') {
    ctx.fillText('--- 商城 ---', px + pw/2 - 50, py + 24);
    ctx.font = '10px monospace';
    modalBtns = [];
    // Weapons
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('武器:', px + 15, py + 44);
    for (let i = 0; i < WEAPONS.length; i++) {
      const wp = WEAPONS[i];
      const iy = py + 56 + i * 16;
      const owned = i <= (game.weapon || 0);
      const equipped = i === (game.weapon || 0);
      ctx.fillStyle = equipped ? '#44ff44' : owned ? '#888' : '#ccc';
      ctx.fillText(wp.name + ' ATK:' + wp.atk, px + 20, iy);
      if (!owned) {
        const bx = px + pw - 80, bw = 60, bh = 14;
        roundRect(bx, iy - 11, bw, bh, 3);
        ctx.fillStyle = game.coins >= wp.price ? '#cc8800' : '#444';
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillText(wp.price + '金', bx + 8, iy);
        modalBtns.push({ x:bx, y:iy-11, w:bw, h:bh, action:'buyWeapon', idx:i });
      } else if (equipped) {
        ctx.fillStyle = '#44ff44';
        ctx.fillText('[装备中]', px + pw - 80, iy);
      }
    }
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('ESC 关闭', px + pw/2 - 28, py + ph - 8);
  }
  ctx.restore();
}

let modalBtns = [];

// ---- Game Logic --------------------------------------------
let monsterIdCounter = 0;

function spawnMonster() {
  if (monsters.length >= 4) return;
  const type = MONSTER_TYPES[Math.floor(Math.random() * MONSTER_TYPES.length)];
  const x = 400 + Math.random() * 150;
  monsters.push({
    id: monsterIdCounter++,
    type: type,
    x: x,
    hp: type.hp,
    atkTimer: 0,
    hitFlash: 0,
  });
}

function playerAttack() {
  if (catDead || modalOpen) return;
  attackArc = 0.2;
  effects.push({ type:'slash', x: CAT_X + CAT_W + 10, y: GROUND_Y - 20, life: 1.0 });
  const atk = getAtk();
  for (const m of monsters) {
    if (m.x - CAT_X - CAT_W < 100 && m.x > CAT_X) {
      m.hp -= atk;
      m.hitFlash = 0.15;
      effects.push({ type:'text', x: m.x + 10, y: GROUND_Y - 50, text: '-' + atk, color:'#ffdd44', life:1.0 });
    }
  }
}

function openAllChests() {
  let totalCoins = 0;
  const rewards = [5, 15, 40]; // coins per chest type
  for (let i = 0; i < 3; i++) {
    totalCoins += (game.chests[i] || 0) * rewards[i];
    game.chests[i] = 0;
  }
  if (totalCoins > 0) {
    game.coins += totalCoins;
    effects.push({ type:'text', x: W/2 - 30, y: H/2, text: '+' + totalCoins + ' 金币!', color:'#ffd700', life: 1.5 });
  }
}

function openModal(name) {
  modalOpen = name;
  modalBtns = [];
}
function closeModal() {
  modalOpen = null;
  modalBtns = [];
}

function resetData() {
  game = defaultData();
  monsters = [];
  chestDrops = [];
  effects = [];
  catDead = false;
  catDeadTimer = 0;
  saveData();
}

function handleModalClick(mx, my) {
  for (const btn of modalBtns) {
    if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
      if (btn.action === 'openAllChests') {
        openAllChests();
      } else if (btn.action === 'buyWeapon') {
        const wp = WEAPONS[btn.idx];
        if (wp && game.coins >= wp.price && btn.idx > (game.weapon || 0)) {
          game.coins -= wp.price;
          game.weapon = btn.idx;
        }
      }
      return true;
    }
  }
  return false;
}

// ---- Input -------------------------------------------------
canvas.addEventListener('mousedown', async (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Top 30px = drag zone
  if (my < 30 && !modalOpen) {
    if (window.__TAURI__) {
      try {
        const { getCurrentWindow } = window.__TAURI__.window;
        await getCurrentWindow().startDragging();
      } catch(err) {}
    }
    return;
  }

  if (modalOpen) {
    handleModalClick(mx, my);
    return;
  }

  playerAttack();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalOpen) {
    closeModal();
    return;
  }
  if (!modalOpen) {
    playerAttack();
  }
});

// ---- Tauri Events ------------------------------------------
(async function initTauri() {
  if (window.__TAURI__) {
    try {
      const { listen } = window.__TAURI__.event;
      await listen('open-backpack', () => openModal('backpack'));
      await listen('open-shop', () => openModal('shop'));
      await listen('reset-data', () => resetData());
      // Global keyboard/mouse input from Rust
      let lastGlobalAttack = 0;
      await listen('global-input', () => {
        if (modalOpen) return;
        const now = Date.now();
        if (now - lastGlobalAttack > 300) { // 300ms throttle
          lastGlobalAttack = now;
          playerAttack();
        }
      });
    } catch(err) { console.warn('Tauri event init failed:', err); }
  }
})();

// ---- Main Loop ---------------------------------------------
function update(dt, t) {
  if (catDead) {
    catDeadTimer -= dt;
    if (catDeadTimer <= 0) {
      catDead = false;
      game.catHp = game.catMaxHp;
    }
    // Monsters idle during death
  } else {
    // Monster movement & attack
    for (const m of monsters) {
      const dist = m.x - CAT_X - CAT_W;
      if (dist > 10) {
        m.x -= m.type.speed * dt;
      } else {
        // Attack cat
        m.atkTimer += dt;
        if (m.atkTimer >= 2) {
          m.atkTimer = 0;
          game.catHp = Math.max(0, (game.catHp || 0) - 10);
          catHitFlash = 0.3;
          effects.push({ type:'text', x: CAT_X + 20, y: CAT_Y - 10, text: '-10', color:'#ff4444', life:0.8 });
          if (game.catHp <= 0) {
            catDead = true;
            catDeadTimer = 3;
          }
        }
      }
      if (m.hitFlash > 0) m.hitFlash -= dt;
    }
  }

  // Remove dead monsters
  for (let i = monsters.length - 1; i >= 0; i--) {
    if (monsters[i].hp <= 0) {
      const m = monsters[i];
      game.kills++;
      addXp(m.type.xp);
      // Drop chest
      if (Math.random() < 0.8) {
        const rarity = Math.random() < 0.05 ? 2 : Math.random() < 0.2 ? 1 : 0;
        chestDrops.push({ x: m.x, y: GROUND_Y - 36, rarity, timer: 2.0 });
      }
      effects.push({ type:'text', x: m.x, y: GROUND_Y - 55, text: '+' + m.type.xp + 'xp', color:'#88ccff', life:1.0 });
      monsters.splice(i, 1);
    }
  }

  // Monster spawn
  lastSpawn += dt;
  if (lastSpawn >= 4 && monsters.length < 4) {
    spawnMonster();
    lastSpawn = 0;
  }

  // Chest collection
  for (let i = chestDrops.length - 1; i >= 0; i--) {
    const c = chestDrops[i];
    c.timer -= dt;
    if (c.timer <= 0) {
      // Fly toward cat
      const dx = CAT_X - c.x;
      const dy = CAT_Y - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 20) {
        game.chests[c.rarity] = (game.chests[c.rarity] || 0) + 1;
        const names = ['+普通宝箱', '+稀有宝箱', '+史诗宝箱'];
        const clrs = ['#a07040', '#4080c0', '#9040c0'];
        effects.push({ type:'text', x: CAT_X, y: CAT_Y - 15, text: names[c.rarity], color: clrs[c.rarity], life:1.0 });
        chestDrops.splice(i, 1);
      } else {
        c.x += (dx / dist) * 200 * dt;
        c.y += (dy / dist) * 200 * dt;
      }
    }
  }

  // Effects decay
  for (let i = effects.length - 1; i >= 0; i--) {
    const e = effects[i];
    e.life -= dt * 2;
    if (e.type === 'text') e.y -= 20 * dt;
    if (e.life <= 0) effects.splice(i, 1);
  }

  // Attack arc decay
  if (attackArc > 0) attackArc -= dt;
  if (catHitFlash > 0) catHitFlash -= dt;

  // Save periodically
  saveTimer += dt;
  if (saveTimer >= 5) {
    saveTimer = 0;
    saveData();
  }
}

function render(t) {
  ctx.clearRect(0, 0, W, H);
  drawBackground(t);
  drawChests(t);
  drawMonsters(t);
  drawCat(t);
  drawEffects(t);
  drawHUD();
  if (modalOpen) drawModal();
}

function gameLoop(timestamp) {
  try {
    const t = timestamp / 1000;
    const dt = lastTime ? Math.min(t - lastTime, 0.1) : 0.016;
    lastTime = t;
    update(dt, t);
    render(t);
  } catch(e) {
    console.error('Game loop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// ---- Start -------------------------------------------------
requestAnimationFrame(gameLoop);
// Spawn first monster quickly
setTimeout(() => { if (monsters.length === 0) spawnMonster(); }, 1000);

</script>
