<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=500, height=300">
<title>BondCat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 500px; height: 300px;
  overflow: hidden;
  background: #1a1a2e;
  font-family: 'Courier New', monospace;
  user-select: none;
}
#titlebar {
  width: 500px; height: 24px;
  background: rgba(10, 10, 30, 0.85);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 8px;
  font-size: 11px; color: #aab;
  cursor: grab;
  z-index: 100;
  position: relative;
}
#titlebar .left { font-weight: bold; color: #f0a040; }
#titlebar .center { display: flex; gap: 12px; color: #ddc; font-size: 10px; }
#titlebar .center span { white-space: nowrap; }
#titlebar .right { display: flex; gap: 4px; }
#titlebar .right button {
  width: 16px; height: 16px; border: none; border-radius: 3px;
  font-size: 10px; cursor: pointer; line-height: 16px; text-align: center;
  background: rgba(255,255,255,0.1); color: #aab;
}
#titlebar .right button:hover { background: rgba(255,255,255,0.25); }
#titlebar .right .close:hover { background: #e04040; color: #fff; }
canvas {
  display: block; width: 500px; height: 276px;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
/* Modal overlay */
#modal-overlay {
  display: none; position: absolute; top: 24px; left: 0;
  width: 500px; height: 276px; z-index: 50;
  background: rgba(0,0,0,0.7);
  justify-content: center; align-items: center;
}
#modal-overlay.active { display: flex; }
#modal-box {
  background: #22223a; border: 2px solid #555;
  border-radius: 8px; padding: 16px; min-width: 320px;
  color: #ddc; font-size: 12px;
}
#modal-box h3 { color: #f0a040; margin-bottom: 10px; font-size: 14px; }
#modal-box .row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
#modal-box .row span { font-size: 11px; }
#modal-box button.action {
  background: #f0a040; color: #1a1a2e; border: none; border-radius: 4px;
  padding: 3px 10px; cursor: pointer; font-size: 11px; font-weight: bold;
}
#modal-box button.action:hover { background: #ffc060; }
#modal-box button.action:disabled { background: #666; color: #999; cursor: default; }
#modal-box .section { margin-top: 10px; border-top: 1px solid #444; padding-top: 8px; }
#modal-box .close-hint { text-align: center; margin-top: 10px; color: #777; font-size: 10px; }
</style>
</head>
<body>
<!-- Title bar with drag region -->
<div id="titlebar" data-tauri-drag-region>
  <div class="left" data-tauri-drag-region>邦德猫</div>
  <div class="center" data-tauri-drag-region>
    <span id="hud-coins">0</span>
    <span id="hud-kills">0</span>
    <span id="hud-level">Lv 1</span>
  </div>
  <div class="right">
    <button title="背包" onclick="openModal('backpack')">🎒</button>
    <button title="商城" onclick="openModal('shop')">🛒</button>
    <button class="min" title="最小化" onclick="minimizeWindow()">─</button>
    <button class="close" title="关闭" onclick="hideWindow()">✕</button>
  </div>
</div>

<canvas id="game" width="500" height="276"></canvas>

<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal-box"></div>
</div>

<script>
// ==================== DATA ====================
const SAVE_KEY = 'bondcat_save';
let data = loadData();

function defaultData() {
  return {
    coins: 0, kills: 0, level: 1, xp: 0,
    weapon: 0, skin: 0,
    chests: [0, 0, 0], // normal, rare, epic
    catHp: 100, catMaxHp: 100
  };
}
function loadData() {
  try {
    const s = localStorage.getItem(SAVE_KEY);
    if (s) { const d = JSON.parse(s); return { ...defaultData(), ...d }; }
  } catch(e) {}
  return defaultData();
}
function saveData() { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); }

// ==================== GAME STATE ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 500, H = 276;
const GROUND_Y = H - 10;
const CAT_X = 100; // cat fixed x position
const CAT_SIZE = 48; // 16x16 scaled 3x
const MON_SIZE = 36; // 12x12 scaled 3x

const WEAPONS = [
  { name: '木剑', cost: 0, dmg: 1, color: '#c8a050' },
  { name: '铁锤', cost: 500, dmg: 3, color: '#b0b0c0' },
  { name: '魔杖', cost: 2000, dmg: 6, color: '#a060f0' }
];
const SKINS = [
  { name: '普通', cost: 0 },
  { name: '骑士', cost: 1000 },
  { name: '魔法', cost: 3000 }
];

let monsters = [];
let chestDrops = []; // { x, y, type, timer, flying, alpha }
let floatTexts = []; // { x, y, text, color, vy, alpha, timer }
let attackAnim = 0; // > 0 means cat is attacking
let catHurtAnim = 0;
let catDeadTimer = 0;
let stars = [];
let frameCount = 0;
let spawnTimer = 0;
const SPAWN_INTERVAL = 4.0;
const MAX_MONSTERS = 4;

// Generate stars
for (let i = 0; i < 30; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * (GROUND_Y - 40),
    brightness: Math.random(),
    speed: 0.5 + Math.random() * 2
  });
}

// Monster types
const MON_TYPES = [
  { name: 'slime', hp: 3, speed: 25, color: '#40d060', xpReward: 2 },
  { name: 'bat', hp: 5, speed: 35, color: '#a050d0', xpReward: 4 },
  { name: 'skeleton', hp: 8, speed: 20, color: '#e0d8c0', xpReward: 7 }
];

// ==================== SPAWN ====================
function spawnMonster() {
  if (monsters.length >= MAX_MONSTERS) return;
  if (catDeadTimer > 0) return;
  const typeIdx = Math.random() < 0.5 ? 0 : (Math.random() < 0.6 ? 1 : 2);
  const mt = MON_TYPES[typeIdx];
  const levelBonus = Math.floor(data.level / 3);
  monsters.push({
    type: typeIdx,
    x: 380 + Math.random() * 100, // 380~480, within view
    hp: mt.hp + levelBonus,
    maxHp: mt.hp + levelBonus,
    speed: mt.speed,
    hurtAnim: 0,
    attackCooldown: 0,
    alive: true
  });
}

// ==================== ATTACK (player) ====================
function playerAttack() {
  if (catDeadTimer > 0) return;
  if (attackAnim > 0) return; // already attacking
  attackAnim = 0.25; // 0.25 sec animation

  const wpn = WEAPONS[data.weapon];
  const dmg = wpn.dmg + Math.floor(data.level / 2);
  const attackRange = 80;

  let hit = false;
  for (const m of monsters) {
    if (!m.alive) continue;
    if (m.x - CAT_X < attackRange && m.x > CAT_X - 10) {
      m.hp -= dmg;
      m.hurtAnim = 0.1;
      hit = true;
      floatTexts.push({
        x: m.x, y: GROUND_Y - MON_SIZE - 20,
        text: '-' + dmg, color: '#fff',
        vy: -80, alpha: 1.0, timer: 0.8
      });
      if (m.hp <= 0) {
        killMonster(m);
      }
    }
  }
  // Screen shake feel: slight cat lunge handled in draw
}

function killMonster(m) {
  m.alive = false;
  const mt = MON_TYPES[m.type];
  data.kills++;
  data.xp += mt.xpReward;

  // Level up check
  const xpNeeded = data.level * 10;
  if (data.xp >= xpNeeded) {
    data.xp -= xpNeeded;
    data.level++;
    data.catMaxHp = 100 + (data.level - 1) * 10;
    data.catHp = data.catMaxHp;
    floatTexts.push({
      x: CAT_X, y: GROUND_Y - CAT_SIZE - 40,
      text: 'LEVEL UP!', color: '#ffe040',
      vy: -60, alpha: 1.0, timer: 1.2
    });
  }

  // Death particles (handled in draw via floatTexts)
  for (let i = 0; i < 6; i++) {
    floatTexts.push({
      x: m.x + Math.random() * 20 - 10,
      y: GROUND_Y - MON_SIZE / 2 + Math.random() * 20 - 10,
      text: '✦', color: mt.color,
      vy: -40 - Math.random() * 60,
      alpha: 1.0, timer: 0.5 + Math.random() * 0.3
    });
  }

  // Chest drop (80%)
  if (Math.random() < 0.8) {
    const r = Math.random();
    const chestType = r < 0.6 ? 0 : (r < 0.9 ? 1 : 2);
    chestDrops.push({
      x: m.x, y: GROUND_Y - 20,
      type: chestType, timer: 2.0, flying: false, alpha: 1.0
    });
  }

  // Gold from kill
  const gold = [3, 6, 12][m.type] + data.level;
  data.coins += gold;
  floatTexts.push({
    x: m.x, y: GROUND_Y - MON_SIZE - 5,
    text: '+' + gold + ' 金', color: '#ffd700',
    vy: -50, alpha: 1.0, timer: 1.0
  });

  saveData();
}

// ==================== MONSTER ATTACK ====================
function monsterAttack(m, dt) {
  if (!m.alive || catDeadTimer > 0) return;
  m.attackCooldown -= dt;
  if (m.attackCooldown <= 0) {
    m.attackCooldown = 2.0;
    const monDmg = [2, 3, 5][m.type] + Math.floor(data.level / 4);
    data.catHp -= monDmg;
    catHurtAnim = 0.3;
    floatTexts.push({
      x: CAT_X, y: GROUND_Y - CAT_SIZE - 20,
      text: '-' + monDmg, color: '#ff4040',
      vy: -70, alpha: 1.0, timer: 0.8
    });
    if (data.catHp <= 0) {
      catDie();
    }
  }
}

function catDie() {
  catDeadTimer = 3.0;
  data.catHp = 0;
  const lost = Math.floor(data.coins * 0.2);
  data.coins = Math.max(0, data.coins - lost);
  if (lost > 0) {
    floatTexts.push({
      x: CAT_X, y: GROUND_Y - CAT_SIZE - 40,
      text: '-' + lost + ' 金', color: '#ff6060',
      vy: -50, alpha: 1.0, timer: 1.5
    });
  }
  saveData();
}

// ==================== UPDATE ====================
let lastTime = performance.now();

function update() {
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  frameCount++;

  // Cat dead timer
  if (catDeadTimer > 0) {
    catDeadTimer -= dt;
    if (catDeadTimer <= 0) {
      catDeadTimer = 0;
      data.catHp = data.catMaxHp;
      saveData();
    }
  }

  // Spawn
  spawnTimer += dt;
  if (spawnTimer >= SPAWN_INTERVAL) {
    spawnTimer = 0;
    spawnMonster();
  }

  // Attack animation
  if (attackAnim > 0) attackAnim = Math.max(0, attackAnim - dt);
  if (catHurtAnim > 0) catHurtAnim = Math.max(0, catHurtAnim - dt);

  // Monsters
  for (let i = monsters.length - 1; i >= 0; i--) {
    const m = monsters[i];
    if (!m.alive) { monsters.splice(i, 1); continue; }
    if (m.hurtAnim > 0) m.hurtAnim = Math.max(0, m.hurtAnim - dt);

    // Move toward cat
    const dist = m.x - CAT_X;
    if (dist > 45) {
      m.x -= m.speed * dt;
    } else {
      // In range, attack
      monsterAttack(m, dt);
    }

    // Off screen left? remove
    if (m.x < -50) { monsters.splice(i, 1); }
  }

  // Chest drops
  for (let i = chestDrops.length - 1; i >= 0; i--) {
    const c = chestDrops[i];
    c.timer -= dt;
    if (c.timer <= 0 && !c.flying) {
      c.flying = true;
    }
    if (c.flying) {
      // Fly toward cat
      const dx = CAT_X - c.x;
      const dy = (GROUND_Y - CAT_SIZE / 2) - c.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 10) {
        // Collected
        data.chests[c.type]++;
        const chestGold = [5, 15, 50][c.type];
        data.coins += chestGold;
        const chestNames = ['普通', '稀有', '史诗'];
        const chestColors = ['#c8a050', '#4080ff', '#a040f0'];
        floatTexts.push({
          x: CAT_X, y: GROUND_Y - CAT_SIZE - 30,
          text: chestNames[c.type] + '宝箱 +' + chestGold,
          color: chestColors[c.type],
          vy: -50, alpha: 1.0, timer: 1.2
        });
        chestDrops.splice(i, 1);
        saveData();
        continue;
      }
      const spd = 200;
      c.x += (dx / d) * spd * dt;
      c.y += (dy / d) * spd * dt;
    }
  }

  // Float texts
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.timer -= dt;
    f.y += f.vy * dt;
    f.vy *= 0.95;
    f.alpha = Math.max(0, f.timer / 0.8);
    if (f.timer <= 0) { floatTexts.splice(i, 1); }
  }

  // Stars twinkle
  for (const s of stars) {
    s.brightness = 0.3 + 0.7 * Math.abs(Math.sin(frameCount * 0.02 * s.speed));
  }

  // Update HUD
  document.getElementById('hud-coins').textContent = '💰 ' + data.coins;
  document.getElementById('hud-kills').textContent = '⚔️ ' + data.kills;
  document.getElementById('hud-level').textContent = 'Lv ' + data.level;
}

// ==================== DRAW ====================
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Sky background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(0.7, '#1a1a2e');
  grad.addColorStop(1, '#1a2a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    const a = s.brightness;
    ctx.fillStyle = `rgba(255,255,220,${a})`;
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), 2, 2);
  }

  // Ground (pixel grass)
  ctx.fillStyle = '#2a5a20';
  ctx.fillRect(0, GROUND_Y, W, 10);
  ctx.fillStyle = '#3a7a30';
  for (let x = 0; x < W; x += 4) {
    const h = 2 + (((x * 7 + 13) % 5));
    ctx.fillRect(x, GROUND_Y - h + 2, 2, h);
  }

  // Chest drops
  for (const c of chestDrops) {
    drawChest(c);
  }

  // Monsters
  for (const m of monsters) {
    drawMonster(m);
  }

  // Cat
  drawCat();

  // Float texts
  ctx.textAlign = 'center';
  for (const f of floatTexts) {
    ctx.globalAlpha = Math.min(1, f.alpha);
    ctx.font = 'bold 12px Courier New';
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ==================== DRAW CAT ====================
function drawCat() {
  const cx = CAT_X;
  const cy = GROUND_Y - CAT_SIZE;
  const s = 3; // scale

  ctx.save();

  // Cat dead
  if (catDeadTimer > 0) {
    ctx.globalAlpha = 0.4 + 0.3 * Math.sin(frameCount * 0.15);
    ctx.translate(cx + CAT_SIZE / 2, cy + CAT_SIZE);
    ctx.rotate(Math.PI / 2);
    ctx.translate(-(cx + CAT_SIZE / 2), -(cy + CAT_SIZE));
  }

  // Hurt flash
  if (catHurtAnim > 0 && Math.floor(catHurtAnim * 20) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }

  // Attack lunge
  let lungeX = 0;
  if (attackAnim > 0) {
    lungeX = Math.sin(attackAnim / 0.25 * Math.PI) * 8;
  }

  // Breathing
  const breathe = Math.sin(frameCount * 0.05) * 1;

  const bx = cx + lungeX;
  const by = cy + breathe;

  // Body (orange)
  const px = (x, y, c) => { ctx.fillStyle = c; ctx.fillRect(bx + x * s, by + y * s, s, s); };

  // Orange cat sprite 16x16
  // Ears
  px(4, 0, '#e08020'); px(5, 0, '#e08020');
  px(10, 0, '#e08020'); px(11, 0, '#e08020');
  px(3, 1, '#e08020'); px(4, 1, '#f0a040'); px(5, 1, '#e08020');
  px(10, 1, '#e08020'); px(11, 1, '#f0a040'); px(12, 1, '#e08020');

  // Head
  for (let x = 3; x <= 12; x++) px(x, 2, '#f0a040');
  for (let x = 2; x <= 13; x++) px(x, 3, '#f0a040');
  for (let x = 2; x <= 13; x++) px(x, 4, '#f0a040');

  // Sunglasses
  px(3, 4, '#222'); px(4, 4, '#111'); px(5, 4, '#111'); px(6, 4, '#222');
  px(7, 4, '#333');
  px(8, 4, '#222'); px(9, 4, '#111'); px(10, 4, '#111'); px(11, 4, '#222');

  // Nose + mouth
  for (let x = 2; x <= 13; x++) px(x, 5, '#f0a040');
  px(7, 5, '#ff8080'); px(8, 5, '#ff8080'); // nose
  for (let x = 3; x <= 12; x++) px(x, 6, '#f0a040');
  px(6, 6, '#333'); px(9, 6, '#333'); // mouth corners

  // Stripes on head
  px(5, 2, '#d07010'); px(7, 2, '#d07010'); px(9, 2, '#d07010');
  px(5, 3, '#d07010'); px(10, 3, '#d07010');

  // Body
  for (let y = 7; y <= 12; y++) {
    for (let x = 3; x <= 12; x++) {
      px(x, y, '#f0a040');
    }
  }
  // Belly
  for (let y = 8; y <= 11; y++) {
    for (let x = 6; x <= 9; x++) {
      px(x, y, '#ffe0a0');
    }
  }
  // Stripes on body
  px(4, 8, '#d07010'); px(11, 8, '#d07010');
  px(4, 10, '#d07010'); px(11, 10, '#d07010');

  // Legs
  for (let x = 3; x <= 5; x++) { px(x, 13, '#f0a040'); px(x, 14, '#f0a040'); px(x, 15, '#e08020'); }
  for (let x = 10; x <= 12; x++) { px(x, 13, '#f0a040'); px(x, 14, '#f0a040'); px(x, 15, '#e08020'); }

  // Skin overlay
  if (data.skin === 1) {
    // Knight helmet
    for (let x = 3; x <= 12; x++) px(x, 0, '#808090');
    for (let x = 2; x <= 13; x++) px(x, 1, '#909098');
    px(7, 0, '#c0c0d0'); px(8, 0, '#c0c0d0');
  } else if (data.skin === 2) {
    // Magic hat
    px(7, -3, '#6020c0'); px(8, -3, '#6020c0');
    for (let x = 5; x <= 10; x++) px(x, -2, '#7030d0');
    for (let x = 4; x <= 11; x++) px(x, -1, '#8040e0');
    for (let x = 2; x <= 13; x++) px(x, 0, '#5020a0');
    // Star on hat
    px(7, -2, '#ffe040'); px(8, -2, '#ffe040');
  }

  // Weapon attack animation
  if (attackAnim > 0) {
    const wpn = WEAPONS[data.weapon];
    const swing = Math.sin(attackAnim / 0.25 * Math.PI);
    ctx.save();
    ctx.translate(bx + 14 * s, by + 6 * s);
    ctx.rotate(-swing * 1.2);

    // Weapon
    ctx.fillStyle = wpn.color;
    if (data.weapon === 0) {
      // Wood sword
      ctx.fillRect(0, -2, 20, 4);
      ctx.fillRect(18, -4, 4, 8);
    } else if (data.weapon === 1) {
      // Iron hammer
      ctx.fillRect(0, -2, 16, 4);
      ctx.fillRect(14, -6, 10, 12);
      ctx.fillStyle = '#808090';
      ctx.fillRect(16, -5, 6, 10);
    } else {
      // Magic wand
      ctx.fillRect(0, -1, 18, 3);
      ctx.fillStyle = '#e0c0ff';
      ctx.beginPath();
      ctx.arc(20, 0, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Sword arc / slash effect
    ctx.strokeStyle = 'rgba(255,255,255,' + swing * 0.8 + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(10, 0, 25 + swing * 15, -0.8, 0.8);
    ctx.stroke();

    ctx.restore();
  }

  ctx.restore();

  // HP bar above cat
  if (catDeadTimer <= 0) {
    const hpRatio = data.catHp / data.catMaxHp;
    const barW = 40;
    const barH = 4;
    const barX = cx + (CAT_SIZE - barW) / 2;
    const barY = cy - 10 + breathe;
    ctx.fillStyle = '#400';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = hpRatio > 0.3 ? '#40d040' : '#ff4040';
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(barX, barY, barW, barH);
  } else {
    // Dead text
    ctx.fillStyle = '#ff4040';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('💀 ' + Math.ceil(catDeadTimer) + 's', cx + CAT_SIZE / 2, cy - 10);
  }
}

// ==================== DRAW MONSTER ====================
function drawMonster(m) {
  const mt = MON_TYPES[m.type];
  const mx = Math.floor(m.x);
  const my = GROUND_Y - MON_SIZE;
  const s = 3;

  ctx.save();

  // Hurt flash white
  const useWhite = m.hurtAnim > 0;

  const px = (x, y, c) => {
    ctx.fillStyle = useWhite ? '#fff' : c;
    ctx.fillRect(mx + x * s, my + y * s, s, s);
  };

  if (m.type === 0) {
    // Slime - green blob
    const bounce = Math.sin(frameCount * 0.08) * 1;
    ctx.save();
    ctx.translate(0, bounce);

    for (let x = 3; x <= 8; x++) px(x, 2, '#30a050');
    for (let x = 2; x <= 9; x++) px(x, 3, '#40d060');
    for (let x = 1; x <= 10; x++) px(x, 4, '#40d060');
    for (let x = 1; x <= 10; x++) px(x, 5, '#40d060');
    for (let x = 1; x <= 10; x++) px(x, 6, '#30b050');
    for (let x = 1; x <= 10; x++) px(x, 7, '#30a050');
    for (let x = 2; x <= 9; x++) px(x, 8, '#30a050');
    for (let x = 2; x <= 9; x++) px(x, 9, '#209040');
    for (let x = 3; x <= 8; x++) px(x, 10, '#209040');
    for (let x = 4; x <= 7; x++) px(x, 11, '#209040');
    // Eyes
    px(4, 4, '#fff'); px(5, 4, '#111');
    px(7, 4, '#fff'); px(8, 4, '#111');
    // Highlight
    px(3, 3, '#80ff90');
    // Mouth
    px(5, 6, '#206030'); px(6, 6, '#206030');

    ctx.restore();
  } else if (m.type === 1) {
    // Bat - purple with wings
    const wingFlap = Math.sin(frameCount * 0.15) * 2;

    // Body
    for (let x = 4; x <= 7; x++) px(x, 3, '#8040b0');
    for (let x = 3; x <= 8; x++) px(x, 4, '#a050d0');
    for (let x = 3; x <= 8; x++) px(x, 5, '#a050d0');
    for (let x = 3; x <= 8; x++) px(x, 6, '#9040c0');
    for (let x = 4; x <= 7; x++) px(x, 7, '#8040b0');
    // Eyes (red)
    px(4, 4, '#ff3030'); px(7, 4, '#ff3030');
    // Fangs
    px(5, 7, '#fff'); px(6, 7, '#fff');
    // Left wing
    const wy = Math.floor(wingFlap);
    px(0, 3 + wy, '#9040c0'); px(1, 3 + wy, '#a050d0'); px(2, 4 + wy, '#a050d0');
    px(0, 4 + wy, '#8040b0'); px(1, 4 + wy, '#9040c0');
    px(0, 5 + wy, '#7030a0');
    // Right wing
    px(11, 3 + wy, '#9040c0'); px(10, 3 + wy, '#a050d0'); px(9, 4 + wy, '#a050d0');
    px(11, 4 + wy, '#8040b0'); px(10, 4 + wy, '#9040c0');
    px(11, 5 + wy, '#7030a0');
  } else {
    // Skeleton - white bones
    // Skull
    for (let x = 3; x <= 8; x++) px(x, 1, '#e0d8c0');
    for (let x = 2; x <= 9; x++) px(x, 2, '#f0e8d0');
    for (let x = 2; x <= 9; x++) px(x, 3, '#f0e8d0');
    for (let x = 2; x <= 9; x++) px(x, 4, '#e0d8c0');
    for (let x = 3; x <= 8; x++) px(x, 5, '#d0c8b0');
    // Eye sockets
    px(3, 3, '#222'); px(4, 3, '#222');
    px(7, 3, '#222'); px(8, 3, '#222');
    // Nose
    px(5, 4, '#222'); px(6, 4, '#222');
    // Teeth
    px(4, 5, '#fff'); px(5, 5, '#222'); px(6, 5, '#fff'); px(7, 5, '#222');
    // Spine
    for (let y = 6; y <= 9; y++) { px(5, y, '#d0c8b0'); px(6, y, '#d0c8b0'); }
    // Ribs
    px(3, 7, '#c8c0a8'); px(4, 7, '#d0c8b0'); px(7, 7, '#d0c8b0'); px(8, 7, '#c8c0a8');
    px(3, 8, '#c8c0a8'); px(4, 8, '#d0c8b0'); px(7, 8, '#d0c8b0'); px(8, 8, '#c8c0a8');
    // Legs
    px(4, 10, '#d0c8b0'); px(5, 10, '#d0c8b0');
    px(7, 10, '#d0c8b0'); px(8, 10, '#d0c8b0');
    px(4, 11, '#c8c0a8'); px(7, 11, '#c8c0a8');
  }

  ctx.restore();

  // HP bar
  if (m.alive) {
    const hpRatio = m.hp / m.maxHp;
    const barW = 30;
    const barH = 3;
    const barX = mx + (MON_SIZE - barW) / 2;
    const barY = my - 6;
    ctx.fillStyle = '#400';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = '#e04040';
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
  }
}

// ==================== DRAW CHEST ====================
function drawChest(c) {
  const colors = ['#c8a050', '#4080ff', '#a040f0'];
  const highlights = ['#ffe080', '#80c0ff', '#d080ff'];
  const glow = 0.5 + 0.5 * Math.sin(frameCount * 0.1);

  ctx.save();
  ctx.globalAlpha = c.flying ? Math.max(0.3, 1 - c.timer) : 1;

  // Glow
  ctx.fillStyle = `rgba(${c.type === 0 ? '200,160,80' : c.type === 1 ? '64,128,255' : '160,64,240'},${glow * 0.3})`;
  ctx.fillRect(c.x - 10, c.y - 10, 20, 16);

  // Chest body
  ctx.fillStyle = colors[c.type];
  ctx.fillRect(c.x - 6, c.y - 4, 12, 8);
  ctx.fillStyle = highlights[c.type];
  ctx.fillRect(c.x - 5, c.y - 3, 10, 2);
  // Lock
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(c.x - 1, c.y, 2, 3);

  ctx.restore();
}

// ==================== INPUT ====================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
    return;
  }
  // Any other key = attack
  if (!document.getElementById('modal-overlay').classList.contains('active')) {
    playerAttack();
  }
});

canvas.addEventListener('click', (e) => {
  if (!document.getElementById('modal-overlay').classList.contains('active')) {
    playerAttack();
  }
});

// Keep focus
canvas.setAttribute('tabindex', '0');
canvas.focus();
window.addEventListener('blur', () => {
  setTimeout(() => canvas.focus(), 100);
});

// ==================== MODAL ====================
function openModal(type) {
  const overlay = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  overlay.classList.add('active');

  if (type === 'backpack') {
    const chestNames = ['普通宝箱', '稀有宝箱', '史诗宝箱'];
    const chestColors = ['#c8a050', '#4080ff', '#a040f0'];
    const chestGold = [10, 30, 100];
    let html = '<h3>🎒 背包</h3>';
    let totalChests = 0;
    for (let i = 0; i < 3; i++) {
      totalChests += data.chests[i];
      html += `<div class="row">
        <span style="color:${chestColors[i]}">${chestNames[i]}: ${data.chests[i]}</span>
      </div>`;
    }
    html += `<div class="section">
      <button class="action" ${totalChests === 0 ? 'disabled' : ''} onclick="openAllChests()">一键全开</button>
    </div>`;
    html += '<div class="close-hint">按 ESC 关闭</div>';
    box.innerHTML = html;
  } else if (type === 'shop') {
    let html = '<h3>🛒 商城</h3>';
    html += '<div style="font-weight:bold;color:#ddc;margin-bottom:4px">武器</div>';
    for (let i = 0; i < WEAPONS.length; i++) {
      const w = WEAPONS[i];
      const owned = data.weapon >= i;
      const equipped = data.weapon === i;
      const canBuy = !owned && data.coins >= w.cost;
      html += `<div class="row">
        <span style="color:${w.color}">⚔ ${w.name} (伤害+${w.dmg}) ${w.cost > 0 ? w.cost + '金' : '免费'}</span>
        <button class="action" ${equipped ? 'disabled' : (canBuy || owned) ? '' : 'disabled'}
          onclick="${owned ? `equipWeapon(${i})` : `buyWeapon(${i})`}">
          ${equipped ? '已装备' : owned ? '装备' : canBuy ? '购买' : '金币不足'}
        </button>
      </div>`;
    }
    html += '<div class="section" style="font-weight:bold;color:#ddc;margin-bottom:4px">装扮</div>';
    for (let i = 0; i < SKINS.length; i++) {
      const s = SKINS[i];
      const owned = data.skin >= i || s.cost === 0;
      const equipped = data.skin === i;
      const canBuy = !owned && data.coins >= s.cost;
      html += `<div class="row">
        <span>👤 ${s.name} ${s.cost > 0 ? s.cost + '金' : '免费'}</span>
        <button class="action" ${equipped ? 'disabled' : (canBuy || owned) ? '' : 'disabled'}
          onclick="${owned ? `equipSkin(${i})` : `buySkin(${i})`}">
          ${equipped ? '已装备' : owned ? '装备' : canBuy ? '购买' : '金币不足'}
        </button>
      </div>`;
    }
    html += '<div class="close-hint">按 ESC 关闭</div>';
    box.innerHTML = html;
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  canvas.focus();
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function openAllChests() {
  let totalGold = 0;
  const chestGold = [10, 30, 100];
  for (let i = 0; i < 3; i++) {
    totalGold += data.chests[i] * chestGold[i];
    data.chests[i] = 0;
  }
  data.coins += totalGold;
  saveData();
  if (totalGold > 0) {
    floatTexts.push({
      x: CAT_X, y: GROUND_Y - CAT_SIZE - 30,
      text: '+' + totalGold + ' 金', color: '#ffd700',
      vy: -60, alpha: 1.0, timer: 1.5
    });
  }
  closeModal();
}

function buyWeapon(i) {
  if (data.coins >= WEAPONS[i].cost) {
    data.coins -= WEAPONS[i].cost;
    data.weapon = i;
    saveData();
    openModal('shop');
  }
}
function equipWeapon(i) { data.weapon = i; saveData(); openModal('shop'); }
function buySkin(i) {
  if (data.coins >= SKINS[i].cost) {
    data.coins -= SKINS[i].cost;
    data.skin = i;
    saveData();
    openModal('shop');
  }
}
function equipSkin(i) { data.skin = i; saveData(); openModal('shop'); }

// ==================== TAURI INTEGRATION ====================
async function hideWindow() {
  if (window.__TAURI__) {
    const { getCurrentWindow } = window.__TAURI__.window;
    await getCurrentWindow().hide();
  } else {
    window.close();
  }
}

async function minimizeWindow() {
  if (window.__TAURI__) {
    const { getCurrentWindow } = window.__TAURI__.window;
    await getCurrentWindow().minimize();
  }
}

function resetData() {
  data = defaultData();
  saveData();
  monsters = [];
  chestDrops = [];
  floatTexts = [];
  catDeadTimer = 0;
}

// Listen for Tauri events
if (window.__TAURI__) {
  const { listen } = window.__TAURI__.event;
  listen('open-backpack', () => { openModal('backpack'); });
  listen('open-shop', () => { openModal('shop'); });
  listen('reset-data', () => { resetData(); });
}

// ==================== GAME LOOP ====================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Spawn first monster quickly
setTimeout(() => spawnMonster(), 1000);
gameLoop();
</script>
