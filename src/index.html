<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=500, height=160">
<title>BondCat</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:500px; height:160px; overflow:hidden; background:transparent; font-family:'Segoe UI',sans-serif; user-select:none; }
#titlebar { border-radius: 8px 8px 0 0;
  height:24px; background:rgba(15,15,30,0.75); display:flex; align-items:center; padding:0 6px;
  cursor:default; border-bottom:1px solid #2a2a4a;
}
#titlebar .title { color:#f0a040; font-size:11px; font-weight:bold; white-space:nowrap; }
#titlebar .stats { color:#ccc; font-size:10px; margin-left:auto; white-space:nowrap; letter-spacing:0.5px; }
#titlebar .btns { margin-left:12px; display:flex; gap:2px; }
#titlebar .btns button {
  background:none; border:1px solid #333; color:#aaa; font-size:11px; width:22px; height:18px;
  cursor:pointer; border-radius:3px; display:flex; align-items:center; justify-content:center;
  padding:0; line-height:1;
}
#titlebar .btns button:hover { background:#333; color:#fff; border-color:#555; }
#titlebar .btns button:last-child:hover { background:#a33; }
canvas { display:block; }
#modal {
  display:none; position:fixed; top:0; left:0; width:500px; height:160px;
  background:rgba(0,0,0,0.85); z-index:100; flex-direction:column; align-items:center; justify-content:center;
}
#modal.open { display:flex; }
#modal .panel {
  background:#1a1a2e; border:2px solid #f0a040; border-radius:8px; padding:12px 16px;
  min-width:320px; max-width:460px; max-height:130px; overflow-y:auto; color:#eee; font-size:11px;
}
#modal .panel h3 { color:#f0a040; font-size:13px; margin-bottom:8px; text-align:center; }
#modal .panel .row { display:flex; justify-content:space-between; align-items:center; padding:3px 0; border-bottom:1px solid #222; }
#modal .panel .row:last-child { border:none; }
#modal .panel button {
  background:#f0a040; color:#000; border:none; padding:3px 10px; border-radius:4px;
  cursor:pointer; font-size:10px; font-weight:bold;
}
#modal .panel button:hover { background:#ffb860; }
#modal .panel button.owned { background:#555; color:#999; cursor:default; }
#modal .panel button.equipped { background:#4a4; color:#fff; cursor:default; }
#modal .close-hint { color:#666; font-size:9px; margin-top:6px; }
#modal .panel::-webkit-scrollbar { width:5px; }
#modal .panel::-webkit-scrollbar-thumb { background:#555; border-radius:3px; }
#modal .panel h3 { border-bottom:1px solid #333; padding-bottom:4px; }
</style>
</head>
<body>
<div id="titlebar" data-tauri-drag-region>

  <span class="stats" id="stats" data-tauri-drag-region></span>
  <div class="btns">
    <button onclick="openModal('paperdoll')">👤</button>
    <button onclick="openModal('backpack')">📦</button>
    <button onclick="openModal('shop')">🛒</button>
    <button onclick="openModal('skills')">🌟</button>
    <button onclick="openModal('prestige')">★</button>
    <button onclick="openModal('achievements')">🏆</button>
    <button id="langBtn" onclick="toggleLanguage()">中</button>
    <button onclick="hideWindow()">✕</button>
  </div>
</div>
<canvas id="game" width="500" height="136"></canvas>
<div id="xpbar" style="position:absolute;top:24px;left:0;width:0;height:2px;background:linear-gradient(90deg,#f0a040,#ffd880);pointer-events:none;z-index:50;transition:width 0.2s;"></div>
<div id="axwarn" style="display:none;position:fixed;top:24px;left:0;width:500px;background:#cc3300;color:#fff;font-size:10px;padding:4px 8px;z-index:200;text-align:center;">

</div>

};

function tx(zh) {
  if (!zh || currentLang === 'zh') return zh;
  return TEXT_EN[zh] || zh;
}
function choose(zh, en) { return currentLang === 'zh' ? zh : en; }
function appTitleText() { return appVersion ? `${TEXT.appName()} v${appVersion}` : TEXT.appName(); }
function setText(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}
function setTitle(id, value) {
  const el = document.getElementById(id);
  if (el) el.title = value;
}
function setAppVersion(v) {
  appVersion = v || '';
  document.title = appTitleText();
  setText('appTitle', appTitleText());
}
function applyStaticI18n() {
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : 'en';
  document.title = appTitleText();
  setText('appTitle', appTitleText());
  setText('axTitle', choose('需要辅助功能权限', 'Accessibility permission required'));

}

  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem(LANG_KEY, currentLang);
  applyStaticI18n();
  if (typeof modalOpen !== 'undefined' && modalOpen && typeof openModal === 'function' && activeModalType) {
    openModal(activeModalType);
  }
}
applyStaticI18n();

// Inject app version from Tauri at startup (avoid hardcoded version drift)
(async () => {

    const v = await window.__TAURI__.app.getVersion();
    setAppVersion(v);
  } catch (e) { console.warn("version inject failed", e); }
})();

<script>
// ============ IMAGE ASSETS ============
const IMG = {};
const IMG_SOURCES = {
  cat: 'assets/cat.png',
  catKnight: 'assets/cat_knight.png',
  catMage: 'assets/cat_mage.png',
  catRogue: 'assets/cat_rogue.png',
  slime: 'assets/slime.png',
  bat: 'assets/bat.png',
  skull: 'assets/skull.png',
  goblin: 'assets/goblin.png',
  dragon: 'assets/dragon_boss.png',
  skeletonKing: 'assets/skeleton_king.png',
  shadowBlade: 'assets/shadow_blade.png',
  elementalLich: 'assets/elemental_lich.png',
  chestN: 'assets/chest_normal.png',
  chestR: 'assets/chest_rare.png',
  chestE: 'assets/chest_epic.png',
  ground: 'assets/ground.png',
  swordWep: 'assets/weapon_sword.png',
  hammerWep: 'assets/weapon_hammer.png',
  wandWep: 'assets/weapon_wand.png',
};
let IMG_LOADED = 0;
const IMG_TOTAL = Object.keys(IMG_SOURCES).length;
for (const [k, src] of Object.entries(IMG_SOURCES)) {
  const im = new Image();
  im.onload = () => { IMG_LOADED++; };
  im.onerror = () => { console.error('img failed', src); IMG_LOADED++; };
  im.src = src;
  IMG[k] = im;
}
// Particle colors per monster type (since no more sprite colors)
const MONSTER_PARTICLE_COLOR = { slime:'#44cc44', bat:'#9944cc', skull:'#e8e8e8', goblin:'#66aa44', dragon:'#cc2222', skeletonKing:'#ffff88', shadowBlade:'#aa44ff', elementalLich:'#44aaff' };

// ============ DRAW HELPER ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function drawImg(img, x, y, w, h, flash) {
  if (!img || !img.complete) return;
  ctx.drawImage(img, x, y, w, h);
  if (flash) {
    // White tint overlay for hit feedback
    ctx.save();
    ctx.globalCompositeOperation = 'source-atop';
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y, w, h);
    ctx.restore();
  }
}

// ============ GAME STATE ============
const SAVE_KEY = 'bondcat_v5';
let state = loadState();
recomputeMaxHp();

function defaultState() {
  return {
    soul: 0,
    prestigeCount: 0,
    prestigeBuffs: { atkStart: 0, goldRate: 0, critStart: 0, hpStart: 0 },
    pets: [],
    pendingEggs: 0,
    classId: null,
    chapterBossPending: 0,
    gold: 0, kills: 0, level: 1, xp: 0,
    catHp: 100, catMaxHp: 100,
    outfit: 0, outfitOwned: [true, false, false, false],
    chests: [0, 0, 0],
    equipment: {
      head: null, body: null, accessory: null,
      weapon: { id: 1, slot: 'weapon', name: '木剑', icon: 'swordWep', dmg: 2, hp: 0, rarityIdx: 0, upgradeLevel: 0, affixes: [] },
    },
    inventory: [],
    nextItemId: 2,
    skills: { attack: 0, vitality: 0, greed: 0, luck: 0 },
    achievements: [],
    bossKills: 0,
    maxCombo: 0,
    bond: 0,
    firstBossDone: false,
    bondMaxShown: false,
    lastLunchChime: 0,
    lastNightChime: 0,
  };
}
function loadState() {
  try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if (!s || s.gold === undefined) return defaultState(); if (!s.skills) s.skills = { attack:0, vitality:0, greed:0, luck:0 }; if (s.skills.luck === undefined) s.skills.luck = 0; if (!s.achievements) s.achievements = []; if (s.bossKills === undefined) s.bossKills = 0; if (s.maxCombo === undefined) s.maxCombo = 0; if (s.bond === undefined) s.bond = 0; if (s.firstBossDone === undefined) s.firstBossDone = false; if (s.bondMaxShown === undefined) s.bondMaxShown = false; if (s.lastLunchChime === undefined) s.lastLunchChime = 0; if (s.lastNightChime === undefined) s.lastNightChime = 0; if (s.chapterBossPending === undefined) s.chapterBossPending = 0; if (s.classId === undefined) s.classId = null; if (!s.pets) s.pets = []; if (s.pendingEggs === undefined) s.pendingEggs = 0; if (s.soul === undefined) s.soul = 0; if (s.prestigeCount === undefined) s.prestigeCount = 0; if (!s.prestigeBuffs) s.prestigeBuffs = { atkStart: 0, goldRate: 0, critStart: 0, hpStart: 0 }; if (!s.outfitOwned || s.outfitOwned.length < 4) s.outfitOwned = [true, s.outfitOwned && s.outfitOwned[1] || false, s.outfitOwned && s.outfitOwned[2] || false, false];
    if (!s.equipment) s.equipment = { head: null, body: null, weapon: null, accessory: null };
    if (!s.inventory) s.inventory = [];
    if (!s.nextItemId) s.nextItemId = 1;
    if (!s.equipment.weapon && s.inventory.length === 0) {
      s.equipment.weapon = { id: s.nextItemId++, slot: 'weapon', name: '木剑', icon: 'swordWep', dmg: 2, hp: 0, rarityIdx: 0, upgradeLevel: 0, affixes: [] };
    }
    return s; }
  catch(e) { return defaultState(); }
}
function recomputeMaxHp() {
  // TDZ guard via try/catch: 顶层启动时 CLASSES/OUTFITS const 还在 TDZ (typeof 也抛错)
  let _cls = null, _skin = null;
  try { _cls = currentClass(); } catch (e) {}
  try { _skin = OUTFITS[state.outfit]; } catch (e) {}
  const outfitHpMult = (_skin && _skin.bonus && _skin.bonus.key === 'hpMult') ? _skin.bonus.value : 1.0;
  const prestigeHp = (state.prestigeBuffs && state.prestigeBuffs.hpStart) ? state.prestigeBuffs.hpStart * 20 : 0;
  const base = Math.floor((100 + (state.level - 1) * 10 + state.skills.vitality * 20 + prestigeHp) * (_cls ? _cls.hpMult : 1) * outfitHpMult);
  const equipHp = sumEquipStat(itemTotalHp);
  state.catMaxHp = Math.floor(base + equipHp);
  if (state.catHp > state.catMaxHp) state.catHp = state.catMaxHp;
}
function saveState() { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }

// Equipment system
const GEAR_BASES = {
  head: [
    { name: '布帽', dmg: 0, hp: 5, icon: '🧢' },
    { name: '皮盔', dmg: 0, hp: 12, icon: '🎩' },
    { name: '铁盔', dmg: 0, hp: 25, icon: '⛑️' },
  ],
  body: [
    { name: '布衣', dmg: 0, hp: 8, icon: '👕' },
    { name: '皮甲', dmg: 0, hp: 18, icon: '🧥' },
    { name: '板甲', dmg: 0, hp: 35, icon: '🛡️' },
  ],
  weapon: [
    { name: '木剑', dmg: 2, hp: 0, icon: 'swordWep' },
    { name: '铁锤', dmg: 5, hp: 0, icon: 'hammerWep' },
    { name: '魔杖', dmg: 9, hp: 0, icon: 'wandWep' },
  ],
  accessory: [
    { name: '幸运符', dmg: 0, hp: 0, icon: '🍀' },
    { name: '利爪项链', dmg: 1, hp: 0, icon: '💎' },
    { name: '魔力戒指', dmg: 0, hp: 15, icon: '💍' },
  ],
};
const AFFIX_POOL = [
  { key: 'critBonus', label: '+暴击', roll: () => (2 + Math.floor(Math.random()*5)) }, // 2-6%
  { key: 'atkBonus', label: '+攻', roll: () => (1 + Math.floor(Math.random()*3)) },
  { key: 'hpBonus', label: '+HP', roll: () => (5 + Math.floor(Math.random()*15)) },
  { key: 'lifesteal', label: '+吸血', roll: () => (1 + Math.floor(Math.random()*3)) }, // 1-3%
  { key: 'gold', label: '+金币', roll: () => (5 + Math.floor(Math.random()*15)) }, // %
];
const RARITY = [
  { name: '普通', color: '#aaaaaa', affixCount: 0 },
  { name: '精良', color: '#44dd44', affixCount: 1 },
  { name: '稀有', color: '#4488ff', affixCount: 2 },
  { name: '史诗', color: '#bb44ff', affixCount: 3 },
  { name: '传说', color: '#ff8800', affixCount: 4 },
];
const SLOT_LABELS = {
  zh: { head: '🎩头', body: '🧥身', weapon: '⚔️武', accessory: '💍饰' },
  en: { head: '🎩Head', body: '🧥Body', weapon: '⚔️Weapon', accessory: '💍Charm' },
};
const STAT_LABELS = {
  zh: { atk: '攻', crit: '暴击', critShort: '暴', hp: 'HP', lifesteal: '吸血', gold: '金币', weapon: '武器', pet: '宠物', bonus: '加成' },
  en: { atk: 'ATK', crit: 'Crit', critShort: 'Crit', hp: 'HP', lifesteal: 'Leech', gold: 'Gold', weapon: 'Weapon', pet: 'Pet', bonus: 'Bonus' },
};
function slotLabel(slot) { return SLOT_LABELS[currentLang][slot] || slot; }
function statLabel(key) { return STAT_LABELS[currentLang][key] || key; }
function itemName(it) { return tx(it && it.name); }
function rarityName(idx) { return tx(RARITY[idx] && RARITY[idx].name); }
function petTypeName(petType) { return tx(petType && petType.name); }
function outfitName(outfit) { return tx(outfit && outfit.name); }
function className(cls) { return tx(cls && cls.name); }
function chapterName(chapter) { return tx(chapter && chapter.name); }
function monsterName(monsterType) { return tx(monsterType && monsterType.name); }
function affixLabel(key, fallback) {
  const byKey = {
    critBonus: choose('+暴击', '+Crit'),
    atkBonus: choose('+攻', '+ATK'),
    hpBonus: '+HP',
    lifesteal: choose('+吸血', '+Lifesteal'),
    gold: choose('+金币', '+Gold'),
  };
  return byKey[key] || tx(fallback);
}
function itemRarityAndName(item) {
  return `${rarityName(item.rarityIdx)} ${itemName(item)}`;
}
function genItem(slot, forcedRarity) {
  const pool = GEAR_BASES[slot];
  const base = pool[Math.floor(Math.random() * pool.length)];
  const rarityIdx = forcedRarity !== undefined ? forcedRarity : Math.floor(Math.random() * RARITY.length);
  const r = RARITY[rarityIdx];
  const affixes = [];
  const available = [...AFFIX_POOL];
  for (let i = 0; i < r.affixCount && available.length; i++) {
    const idx = Math.floor(Math.random() * available.length);
    const a = available.splice(idx, 1)[0];
    affixes.push({ key: a.key, label: a.label, value: a.roll() });
  }
  return {
    id: state.nextItemId++,

function mergeAll() {
  let total = 0;
  for (let round = 0; round < 50; round++) {
    const groups = {};
    for (const it of state.inventory) {
      const k = it.slot + '_' + it.rarityIdx;
      groups[k] = groups[k] || { slot: it.slot, rarityIdx: it.rarityIdx, count: 0 };
      groups[k].count++;
    }
    const mergeable = Object.values(groups).filter(g => g.count >= 3 && g.rarityIdx < RARITY.length - 1);
    if (mergeable.length === 0) break;
    for (const g of mergeable) {
      if (g.count >= 3) { mergeSlotRarity(g.slot, g.rarityIdx); total++; }
    }
  }
  floatTexts.push({ x: 200, y: 30, text: choose('X ' + total + ' 次合成', 'Merged x' + total), color: '#ffb040', life: 2.0 });

  if (modalOpen) openModal('backpack');
}

function _rollPetType() {
  const lv = state.level;
  const weights = [Math.max(1, 20 - lv), Math.max(1, 15 - lv), Math.max(1, 10 - lv * 0.5), Math.max(1, 5), Math.max(0.5, lv * 0.2)];
  const totalW = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * totalW, idx = 0;
  for (let i = 0; i < weights.length; i++) { r -= weights[i]; if (r <= 0) { idx = i; break; } }
  return PET_TYPES[idx];

function mergePet(typeId) {

  const _petCapped = Math.min(totalPetAtkBonus(), _nonPetAtk);

  let critChance = 0.05 + (state.skills.luck * 0.02) + critFromGear + (_cls ? _cls.critRateAdd : 0) + outfitCritRate + totalPetCritBonus() + (state.prestigeBuffs.critStart || 0) * 0.01;
  // 刺客被动: 连击 >=5 时暴击率 ×2

  const isCrit = Math.random() < critChance;

  const outfitCritDmg = (_skinBonus && _skinBonus.key === 'critDmgMult') ? _skinBonus.value : 1.0;
  const critDmgMult = (_cls ? (2 * _cls.critDmgMult) : 2) * outfitCritDmg;
  const dmg = Math.ceil(base * mult * (isCrit ? critDmgMult : 1));
  let hit = false, target = null;

    const _tt = MONSTER_TYPES[target.type];
    if (_tt.img === 'shadowBlade' && Math.random() < 0.30) {
      floatTexts.push({ x: target.x + 10, y: target.y - 5, text: 'MISS', color: '#888888', life: 0.7 });
      return;
    }
    target.hp -= dmg;
    target.flash = 0.15;
    hit = true;
    // 砍击粒子 (5 颗白色闪光)
    for (let _p = 0; _p < 5; _p++) {
      particles.push({
        x: target.x + target.size/2 + (Math.random()-0.5)*20,
        y: target.y + target.size/2 + (Math.random()-0.5)*20,
        vx: (Math.random()-0.5)*80,
        vy: -Math.random()*60,
        color: isCrit ? '#ffaa44' : '#ffffff',
        life: 0.35,
        size: 2,
        glow: false,
        gravity: 200,
        drag: 0.92,
      });
    }
    // 法师被动: 暴击时冰冻减速目标 50% 持续 1.5s
    const _mageC = currentClass();
    if (_mageC && _mageC.id === 'mage' && isCrit) {
      target.frozenTimer = 1.5;
      floatTexts.push({ x: target.x + 10, y: target.y - 18, text: 'FROZEN', color: '#88ddff', life: 0.7 });
    }
    const hitColor = isCrit ? '#ff8040' : (mult >= 2 ? '#ffff40' : (mult >= 1.5 ? '#80ffff' : '#ffffff'));
    floatTexts.push({ x: target.x + 10, y: target.y - 5, text: (isCrit ? 'CRIT -' : '-') + dmg, color: hitColor, life: 0.8 });
    if (isCrit) {
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: target.x + target.size/2 || target.x + 15, y: target.y + 15,
          vx: (Math.random()-0.5)*160, vy: -Math.random()*160,
          color: '#ff8040', life: 0.6,
          size: 3, glow: true, gravity: 150, drag: 0.95,
        });
      }
    }
    if (target.hp <= 0) killMonster(target);
    // Lifesteal affix
    const lifestealPct = sumEquipStat(it => (it ? it.affixes.filter(a => a.key === 'lifesteal').reduce((s, a) => s + a.value, 0) : 0));
    if (lifestealPct > 0 && state.catHp < state.catMaxHp) {
      const heal = Math.ceil(dmg * lifestealPct * 0.01);
      state.catHp = Math.min(state.catMaxHp, state.catHp + heal);
      if (heal > 0) floatTexts.push({ x: 100, y: 55, text: '+' + heal, color: '#44ff88', life: 0.7 });
    }
    comboCount++;
    comboTimer = 3.0;
    if (comboCount > state.maxCombo) state.maxCombo = comboCount;
    const milestones = [10,25,50,100];
    for (const ms of milestones) {
      if (comboCount === ms && lastComboMilestone < ms) {
        lastComboMilestone = ms;
        floatTexts.push({ x: 250, y: 50, text: 'COMBO x' + ms + '!', color: '#ffff00', life: 1.5 });
        if (ms >= 50) sayTaunt('combo50');
        break;
      }
    }
  }
}

function killMonster(m) {
  const t = MONSTER_TYPES[m.type];
  state.kills++;
  state.xp += t.xpVal;
  const xpNeeded = state.level * 15;
  if (state.xp >= xpNeeded) {
    state.level++; state.xp -= xpNeeded; state.catMaxHp += 10; state.catHp = state.catMaxHp;
    floatTexts.push({ x: 80, y: 20, text: 'LEVEL UP!', color: '#ffff00', life: 1.5 });
    // 每 10 级触发章节 boss 必现
    if (state.level % 10 === 0) {
      state.chapterBossPending = 1;
      const nextCh = CHAPTERS[Math.floor(state.level / 10) % CHAPTERS.length];
      floatTexts.push({ x: 250, y: 25, text: choose('★ 进入 ', '★ Enter ') + chapterName(nextCh), color: '#ffd700', life: 2.5 });
    }
  }
  // particles (boss = big explosion)
  const partCount = t.isBoss ? 40 : 14;
  const partSpeed = t.isBoss ? 220 : 120;
  for (let i = 0; i < partCount; i++) {
    particles.push({
      x: m.x + t.size/2, y: m.y + t.size/2,
      vx: (Math.random()-0.5)*partSpeed, vy: (Math.random()-0.5)*partSpeed,
      color: MONSTER_PARTICLE_COLOR[t.img] || '#ffffff',
      life: 0.6 + Math.random()*0.5,
      size: t.isBoss ? 5 : 3,
      glow: t.isBoss,
      gravity: 120, drag: 0.98,
    });
  }
  if (t.isBoss) {
    floatTexts.push({ x: 250, y: 40, text: choose('💥 BOSS 已斩!', '💥 Boss Defeated!'), color: '#ffff40', life: 2.0 });
    if (!state.firstBossDone) { state.firstBossDone = true; sayTaunt('firstBoss'); }
  }
  // 宠物蛋掉落 (boss 20%, 其他 5%)
  const eggChance = t.isBoss ? 0.20 : 0.05;
  if (Math.random() < eggChance) {
    state.pendingEggs++;
    floatTexts.push({ x: m.x, y: m.y - 15, text: choose('🥚 +1 蛋', '🥚 +1 Egg'), color: '#ffeedd', life: 1.8 });
  }
  // chest drop 80%
  if (Math.random() < 0.7) {
    const r = Math.random();
    const rarity = r < 0.6 ? 0 : (r < 0.9 ? 1 : 2);
    const greedBuff = 1 + (state.skills.greed * 0.1) + (state.prestigeBuffs.goldRate || 0) * 0.05; const gold = Math.ceil((t.goldMin + Math.floor(Math.random() * (t.goldMax - t.goldMin + 1))) * greedBuff);
    chestDrops.push({ x: m.x, y: m.y, rarity, gold: m.elite ? gold * 3 : gold, timer: 2.0, collected: false });
  }
  // Item drop
  const dropChance = t.isBoss ? 1.0 : (m.elite ? 0.5 : 0.22);
  if (Math.random() < dropChance) {
    const slots = ['head', 'body', 'weapon', 'accessory'];
    const slot = slots[Math.floor(Math.random() * slots.length)];
    const lv = state.level;
    const weights = m.chapterBoss ? [0, 0, 0, 5, 8] : (t.isBoss ? [1, 2, 3, 5, 8] : [10, 6, Math.max(1, lv - 1), Math.max(0, lv - 4), Math.max(0, lv - 9)]);
    const totalW = weights.reduce((s, w) => s + w, 0);
    let rr = Math.random() * totalW, rIdx = 0;
    for (let i = 0; i < weights.length; i++) { rr -= weights[i]; if (rr <= 0) { rIdx = i; break; } }
    const item = genItem(slot, rIdx);
    state.inventory.push(item);
    floatTexts.push({ x: m.x, y: m.y - 10, text: '📦 ' + itemRarityAndName(item), color: RARITY[rIdx].color, life: 1.8 });
    if (rIdx >= RARITY.length - 1) sayTaunt('legendary');
  }
  saveState();
}

function monsterAttack(m) {
  if (catDead > 0) return;
  // 战士被动: 20% 概率格挡免伤
  const _passC = currentClass();
  if (_passC && _passC.id === 'warrior' && Math.random() < 0.20) {
    catFlash = 0.15;
    floatTexts.push({ x: 80, y: 30, text: 'BLOCK!', color: '#cc6644', life: 0.8 });
    return;
  }
  const t = MONSTER_TYPES[m.type];
  let dmg;
  if (t.img === 'elementalLich') dmg = 16 + Math.floor(state.level * 1.0);
  else if (t.img === 'skeletonKing') dmg = 8 + Math.floor(state.level * 0.7);
  else if (t.img === 'shadowBlade') dmg = 6 + Math.floor(state.level * 0.6);
  else dmg = t.isBoss ? (10 + Math.floor(state.level * 0.8)) : (3 + m.type * 2 + Math.floor(state.level * 0.5));
  state.catHp -= dmg;
  catFlash = 0.2;
  floatTexts.push({ x: 80, y: 40, text: '-' + dmg, color: '#ff4444', life: 0.8 });
  if (state.catHp <= 0) {
    state.catHp = 0;
    catDead = 3.0;
    const lost = Math.floor(state.gold * 0.2);
    state.gold -= lost;
    if (lost > 0) floatTexts.push({ x: 80, y: 30, text: '-' + lost + '💰', color: '#ff6666', life: 1.2 });
  }
  saveState();
}

function compareItem(it) {
  const cur = state.equipment[it.slot];
  if (!cur) return { totalDelta: 999, parts: [] }; // empty slot always better
  const parts = [];
  const dmgA = itemTotalDmg(cur), dmgB = itemTotalDmg(it);
  const hpA = itemTotalHp(cur), hpB = itemTotalHp(it);
  if (dmgB !== dmgA) parts.push({ k: statLabel('atk'), d: +(dmgB - dmgA).toFixed(1) });
  if (hpB !== hpA) parts.push({ k: 'HP', d: Math.floor(hpB - hpA) });
  // Affix diff
  const affixKeys = ['critBonus', 'lifesteal', 'gold'];
  for (const ak of affixKeys) {
    const va = cur.affixes.filter(a => a.key === ak).reduce((s, a) => s + a.value, 0);
    const vb = it.affixes.filter(a => a.key === ak).reduce((s, a) => s + a.value, 0);
    if (va !== vb) {
      const label = { critBonus: statLabel('crit'), lifesteal: statLabel('lifesteal'), gold: statLabel('gold') }[ak];
      parts.push({ k: label, d: vb - va, pct: true });
    }
  }
  const total = parts.reduce((s, p) => s + p.d, 0);
  return { totalDelta: total, parts };
}

function renderCompareHtml(cmp) {
  if (cmp.parts.length === 0) return '';
  return '<span style="font-size:8px;margin-left:4px">' + cmp.parts.map(p => {
    const col = p.d > 0 ? '#44ff66' : '#ff4466';
    const sign = p.d > 0 ? '+' : '';
    const suffix = p.pct ? '%' : '';
    return `<span style="color:${col}">${p.k}${sign}${p.d}${suffix}</span>`;
  }).join(' ') + '</span>';
}

    html += `<div class="row"><span>${choose('章节', 'Chapter')}</span><span>${chapterName(currentChapter())}</span></div>`;
    html += `<div class="row"><span>HP</span><span>${state.catHp} / ${totalHp}</span></div>`;
    html += `<div class="row"><span>${statLabel('atk')}</span><span>${statLabel('weapon')} ${wepDmg} + ${statLabel('pet')} ${totalPetAtkBonus()} + ${statLabel('bonus')} ${Math.floor(state.level*0.5)}</span></div>`;
    html += `<div class="row"><span>${choose('暴击率', 'Crit Rate')}</span><span>${(critRate*100).toFixed(1)}%</span></div>`;
    html += `<div class="row"><span>${choose('最高连击', 'Best Combo')}</span><span>${state.maxCombo}</span></div>`;
    html += `<div class="row"><span>${choose('Boss 击杀', 'Boss Kills')}</span><span>${state.bossKills}</span></div>`;
    html += `<div class="row"><span>${choose('转生', 'Prestige')}</span><span>${state.prestigeCount} ${choose('次', 'times')} · ${choose('灵魂', 'Soul')} ${state.soul}</span></div>`;
    content.innerHTML = html;
  } else if (type === 'skills') {
    let html = `<h3>🌟 ${choose('技能树', 'Skills')} (${choose('金币', 'Gold')} ${state.gold})</h3>`;
    const skillDefs = [
      { key: 'attack',   name: '强化攻击', desc: '+10% 攻击/级' },
      { key: 'vitality', name: '生命强化', desc: '+20 最大HP/级' },
      { key: 'greed',    name: '贪婪',     desc: '+10% 金币/级' },
      { key: 'luck',     name: '幸运',     desc: '+2% 暴击/级' },
    ];
    for (const def of skillDefs) {
      const cur = state.skills[def.key] || 0;
      const cost = skillCost(cur);
      const maxed = cur >= 10;
      const affordable = state.gold >= cost;
      let btn = maxed ? `<button class="owned">${choose('满', 'Max')}</button>` : `<button onclick="buySkill('${def.key}')" ${affordable?'':'style="background:#555;color:#999"'}>${cost}💰</button>`;
      html += `<div class="row"><span><b>${tx(def.name)}</b> Lv${cur}/10<br><span style="font-size:9px;color:#aaa">${tx(def.desc)}</span></span>${btn}</div>`;
    }
    content.innerHTML = html;
  } else if (type === 'achievements') {
    let html = `<h3>🏆 ${choose('成就', 'Achievements')}</h3>`;
    for (const a of ACHIEVEMENTS) {
      const done = state.achievements.includes(a.id);
      const icon = done ? '✅' : '⬜';
      const color = done ? '#44dd44' : '#888';
      html += `<div class="row"><span><span style="color:${color}">${icon} <b>${tx(a.name)}</b></span> — <span style="font-size:9px;color:#aaa">${tx(a.desc)}</span></span><span style="font-size:9px;color:#ffd700">+${a.reward}💰</span></div>`;
    }
    content.innerHTML = html;
  }
}

const ACHIEVEMENTS = [
  { id:'first_blood', name:'首杀', desc:'击败第一只怪物', check: s => s.kills >= 1, reward: 10 },
  { id:'slayer_50', name:'猎人', desc:'累计击杀 50', check: s => s.kills >= 50, reward: 100 },
  { id:'slayer_500', name:'屠戮者', desc:'累计击杀 500', check: s => s.kills >= 500, reward: 1000 },
  { id:'rich', name:'小康', desc:'持有 1000 金币', check: s => s.gold >= 1000, reward: 200 },
  { id:'tycoon', name:'巨贾', desc:'持有 10000 金币', check: s => s.gold >= 10000, reward: 2000 },
  { id:'level_5', name:'学徒', desc:'达到 5 级', check: s => s.level >= 5, reward: 50 },
  { id:'level_15', name:'大师', desc:'达到 15 级', check: s => s.level >= 15, reward: 500 },
  { id:'combo_10', name:'连击手', desc:'连击 10', check: s => s.maxCombo >= 10, reward: 100 },
  { id:'combo_30', name:'机枪手', desc:'连击 30', check: s => s.maxCombo >= 30, reward: 500 },
  { id:'boss_slayer', name:'屠龙者', desc:'首次击杀 BOSS', check: s => s.bossKills >= 1, reward: 1000 },
];

function checkAchievements() {
  let unlocked = false;
  for (const a of ACHIEVEMENTS) {
    if (state.achievements.includes(a.id)) continue;
    if (a.check(state)) {
      state.achievements.push(a.id);
      state.gold += a.reward;
      floatTexts.push({ x: 250, y: 30, text: '🏆 ' + tx(a.name), color: '#ffd700', life: 2.5 });
      floatTexts.push({ x: 250, y: 50, text: '+' + a.reward + '💰', color: '#ffd700', life: 2.5 });
      for (let i = 0; i < 30; i++) {
        particles.push({
          x: 250, y: 40,
          vx: (Math.random()-0.5)*200, vy: -Math.random()*180 - 40,
          color: '#ffd700', life: 1.0 + Math.random()*0.5,
          size: 4, glow: true, gravity: 160, drag: 0.97,
        });
      }
      unlocked = true;
    }
  }
  if (unlocked) saveState();
}

function skillCost(level) { return 50 * (level + 1) * (level + 1); }

function buySkill(key) {
  const cur = state.skills[key];
  if (cur >= 10) return;
  const cost = skillCost(cur);
  if (state.gold < cost) return;
  state.gold -= cost;
  state.skills[key] = cur + 1;
  if (key === 'vitality') { state.catMaxHp += 20; state.catHp = Math.min(state.catMaxHp, state.catHp + 20); }
  saveState();
  openModal('skills');
}

function closeModal() { modalOpen = false; activeModalType = null; document.getElementById('modal').classList.remove('open'); }

function openAllChests() {
  let totalGold = 0;
  let totalCount = state.chests[0] + state.chests[1] + state.chests[2];
  const goldPer = [5, 15, 40];
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < state.chests[i]; j++) {
      totalGold += goldPer[i] + Math.floor(Math.random() * goldPer[i]);
    }
    state.chests[i] = 0;
  }
  if (totalGold > 0) {
    state.gold += totalGold;
    floatTexts.push({ x: 200, y: 50, text: '+' + totalGold + '💰', color: '#FFD700', life: 1.5 });
    // Golden sparkle burst at cat
    for (let i = 0; i < Math.min(60, 10 + totalCount * 3); i++) {
      particles.push({
        x: 100, y: 80,
        vx: (Math.random()-0.5)*180, vy: -Math.random()*200 - 50,
        color: Math.random() < 0.5 ? '#FFD700' : '#ffff80',
        life: 0.8 + Math.random()*0.7,
        size: 4, glow: true,
        gravity: 200, drag: 0.97,
      });
    }
    saveState();
  }
  openModal('backpack');
}


function applyOutfitBonus() {
  // recompute catMaxHp (class + skills + outfit-hp-mult)
  const _cls = currentClass();
  const _skin = OUTFITS[state.outfit];
  const outfitHpMult = (_skin && _skin.bonus && _skin.bonus.key === 'hpMult') ? _skin.bonus.value : 1.0;
  const newMax = Math.floor((100 + (state.level - 1) * 10 + state.skills.vitality * 20) * (_cls ? _cls.hpMult : 1) * outfitHpMult);
  state.catMaxHp = newMax;
  if (state.catHp > newMax) state.catHp = newMax;
}
function buyOutfit(i) {
  if (state.gold >= OUTFITS[i].cost && !state.outfitOwned[i]) {
    state.gold -= OUTFITS[i].cost; state.outfitOwned[i] = true; state.outfit = i;
    applyOutfitBonus();
    saveState(); openModal('shop');
  }
}
function equipOutfit(i) {
  state.outfit = i;
  applyOutfitBonus();
  saveState();
  openModal('shop');
}

// 转生系统
function canPrestige() { return state.level >= 50; }
function prestigeGain() {
  // 灵魂点 = floor(level / 10) + prestigeCount * 2
  return Math.floor(state.level / 10) + state.prestigeCount * 2;
}
function doPrestige() {
  if (!canPrestige()) return;
  const gain = prestigeGain();
  const keepGold = Math.floor(state.gold * 0.5);
  // 保留: classId, soul, prestigeCount, prestigeBuffs, outfitOwned, outfit
  const keep = {
    classId: state.classId,
    soul: state.soul + gain,
    prestigeCount: state.prestigeCount + 1,
    prestigeBuffs: state.prestigeBuffs,
    outfitOwned: state.outfitOwned,
    outfit: state.outfit,
  };
  state = defaultState();
  Object.assign(state, keep);
  state.gold = keepGold;
  // 应用 prestigeBuffs 到初始状态
  applyPrestigeStart();
  saveState();
  floatTexts.push({ x: 200, y: 30, text: choose('★ 转生 +', '★ Prestige +') + gain + ' ' + choose('灵魂', 'Soul'), color: '#ffd700', life: 3.0 });
  sayTaunt('prestige');
  closeModal();
}
function applyPrestigeStart() {
  const b = state.prestigeBuffs;
  // 重算 catMaxHp (加上 hpStart buff)
  const _cls = currentClass();
  const _skin = OUTFITS[state.outfit];
  const outfitHpMult = (_skin && _skin.bonus && _skin.bonus.key === 'hpMult') ? _skin.bonus.value : 1.0;
  const newMax = Math.floor((100 + b.hpStart * 20) * (_cls ? _cls.hpMult : 1) * outfitHpMult);
  state.catMaxHp = newMax;
  state.catHp = newMax;
}
// 购买 prestige buff (花灵魂点)
const PRESTIGE_BUFFS = [
  { key: 'atkStart',  name: '初始攻击', desc: '+1 起始攻击/级', costPer: 1, maxLv: 10 },
  { key: 'goldRate',  name: '金币倍率', desc: '+5% 金币掉落/级', costPer: 1, maxLv: 10 },
  { key: 'critStart', name: '初始暴击', desc: '+1% 起始暴击率/级', costPer: 2, maxLv: 10 },
  { key: 'hpStart',   name: '初始HP', desc: '+20 起始最大HP/级', costPer: 1, maxLv: 10 },
];
function buyPrestigeBuff(k) {
  const def = PRESTIGE_BUFFS.find(x => x.key === k);
  if (!def) return;
  const cur = state.prestigeBuffs[k] || 0;
  if (cur >= def.maxLv) return;
  if (state.soul < def.costPer) return;
  state.soul -= def.costPer;
  state.prestigeBuffs[k] = cur + 1;
  applyPrestigeStart();
  saveState();
  openModal('prestige');
}

function resetData() { state = defaultState(); monsters = []; particles = []; floatTexts = []; chestDrops = []; weatherDrops = []; comboCount = 0; comboTimer = 0; lastComboMilestone = 0; saveState(); }

// ============ UPDATE & RENDER ============
let lastTime = performance.now();

function update(dt) {
  if (modalOpen) return;

  // 羁绊/陪伴节律
  idleSec += dt;
  if (idleSec > 30 && !dozeShown) { dozeShown = true; sayTaunt('idleDoze'); }
  if (idleSec > 60) {
    // 每秒 bond -1, 最低 0
    if (state.bond > 0) state.bond = Math.max(0, state.bond - dt * 1);
  }
  // 整点彩蛋: 午餐 (12:00-12:30)/深夜 (01:00-04:00)，每天最多 1 次
  {
    const _d = new Date();
    const _today = _d.getFullYear() * 10000 + (_d.getMonth() + 1) * 100 + _d.getDate();
    const _hr = _d.getHours();
    if (_hr === 12 && state.lastLunchChime !== _today) {
      state.lastLunchChime = _today; sayTaunt('lunch');
    } else if (_hr >= 1 && _hr <= 4 && state.lastNightChime !== _today) {
      state.lastNightChime = _today; sayTaunt('lateNight');
    }
  }

  // spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) { spawnTimer = 4; spawnMonster(); }
  // 每帧强制章节天气 (避免跨章残留)
  {
    const _chW = currentChapter().weather;
    if (_chW && _chW !== 'clear' && weatherMode !== _chW) { weatherMode = _chW; weatherDrops.length = 0; }
    else if (_chW === 'clear' && weatherMode !== 'clear' && !(weatherMode === 'rain' || weatherMode === 'snow')) { /* 随机天气保留 */ }
  }
  // 切章节时如果从 非clear 章切到 clear 章, 清 drops
  if (state.__lastChapterName !== currentChapter().name) {
    state.__lastChapterName = currentChapter().name;
    const _chW2 = currentChapter().weather;
    if (!_chW2 || _chW2 === 'clear') { weatherMode = 'clear'; weatherDrops.length = 0; }
    else weatherMode = _chW2;
  }

  // weather cycle
  weatherTimer -= dt;
  if (weatherTimer <= 0) {
    weatherTimer = 20 + Math.random() * 40;
    const r = Math.random();
    const _chW = currentChapter().weather;
    if (_chW && _chW !== 'clear') weatherMode = _chW;
    else weatherMode = r < 0.6 ? 'clear' : (r < 0.85 ? 'rain' : 'snow');
    weatherDrops = [];
  }
  // spawn drops
  if (weatherMode === 'rain') {
    for (let i = 0; i < 3; i++) {
      weatherDrops.push({ x: Math.random()*500, y: -5, vx: -40, vy: 380, type: 'rain', life: 1.0 });
    }
  } else if (weatherMode === 'snow') {
    if (Math.random() < 0.5) {
      weatherDrops.push({ x: Math.random()*500, y: -5, vx: Math.sin(Date.now()*0.001)*15, vy: 40 + Math.random()*30, type: 'snow', life: 3.0 });
    }
  }
  for (const d of weatherDrops) {
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    if (d.type === 'snow') d.vx = Math.sin((Date.now() + d.y) * 0.002) * 15;
    d.life -= dt;
    if (d.y > 128) d.life = 0;
  }
  weatherDrops = weatherDrops.filter(d => d.life > 0);

  // cat dead
  if (catDead > 0) {
    catDead -= dt;
    if (catDead <= 0) { state.catHp = state.catMaxHp; saveState(); }
  }

  // attack anim
  if (attackAnim > 0) attackAnim -= dt;
  if (attackArc > 0) attackArc -= dt * 2.5;

  // combo timer (resets combo if no hit in 2s)
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; lastComboMilestone = 0; }
  }

  // cat flash
  if (catFlash > 0) catFlash -= dt;

  // 宠物协同攻击: 只在玩家敲键触发 playerAttack 时叠加 (passive atk bonus), 不再自动独立攻击
  // 核心合同: 不敲键盘=不打怪. 旧的独立定时攻击已移除
  // monsters
  for (const m of monsters) {
    if (m.hp <= 0) continue;
    if (m.flash > 0) m.flash -= dt;
    if (m.frozenTimer > 0) m.frozenTimer -= dt;
    const _mt = MONSTER_TYPES[m.type];
    const isRanged = _mt.img === 'elementalLich';
    const atkRange = isRanged ? 220 : 130;
    const atkCd = isRanged ? 3 : (_mt.img === 'shadowBlade' ? 1.2 : 2);
    const speedMult = (m.frozenTimer > 0) ? 0.5 : 1.0;
    if (m.x > atkRange) {
      m.x -= m.speed * speedMult * dt;
    } else {
      m.atkTimer += dt;
      if (m.atkTimer >= atkCd) { m.atkTimer = 0; monsterAttack(m); }
    }
  }
  monsters = monsters.filter(m => m.hp > 0);

  // chest drops
  for (const c of chestDrops) {
    c.timer -= dt;
    if (c.timer <= 0 && !c.collected) {
      c.collected = true;
      state.chests[c.rarity]++;
      const goldPct = sumEquipStat(it => (it ? it.affixes.filter(a => a.key === 'gold').reduce((s, a) => s + a.value, 0) : 0));
      const finalGold = Math.ceil(c.gold * (1 + goldPct * 0.01));
      state.gold += finalGold;
      floatTexts.push({ x: c.x, y: c.y - 10, text: '+' + finalGold + '💰', color: '#FFD700', life: 1.0 });
      saveState();
    }
    if (c.collected || c.timer <= 0) {
      // fly toward cat
      const pullSpeed = 5 + Math.max(0, state.skills.luck) * 0.5;
      c.x += (80 - c.x) * dt * pullSpeed;
      c.y += (80 - c.y) * dt * pullSpeed;
    }
  }
  chestDrops = chestDrops.filter(c => !c.collected || Math.abs(c.x - 80) > 5);

  // particles (with gravity + drag)
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += (p.gravity || 0) * dt;
    p.vx *= p.drag !== undefined ? p.drag : 1;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  // float texts
  for (const f of floatTexts) { f.y -= 30 * dt; f.life -= dt; }
  floatTexts = floatTexts.filter(f => f.life > 0);
}

function render(time) {
  // clear to transparent
  ctx.clearRect(0, 0, 500, 136);

  // 章节主题天空底色 (multiply 保留前景亮部, 不压死角色)
  {
    const _ch = currentChapter();
    if (_ch.skyTint) {
      ctx.save();
      ctx.globalCompositeOperation = _ch.tintOp || 'multiply';
      ctx.fillStyle = _ch.skyTint;
      ctx.fillRect(0, 0, 500, 120);
      ctx.restore();
    }
  }

  // day/night factor (0=noon, 1=midnight)
  const nowHr = new Date().getHours() + new Date().getMinutes() / 60;
  // 6-18 is day, peak at 12; 18-6 is night, peak at 0
  const distFromNoon = Math.min(Math.abs(nowHr - 12), 24 - Math.abs(nowHr - 12));
  const nightF = Math.min(1, Math.max(0, (distFromNoon - 3) / 6));

  // stars (night only)
  if (nightF > 0.1) {
    for (const s of stars) {
      const bri = (0.3 + 0.7 * Math.abs(Math.sin(time * 0.001 + s.phase))) * nightF;
      ctx.fillStyle = `rgba(255,255,255,${bri})`;
      ctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.s), Math.ceil(s.s));
    }
  }

  // celestial body: moon at night, sun at day
  const celX = 440, celY = 24;
  if (nightF > 0.5) {
    // Moon
    ctx.save();
    ctx.globalAlpha = nightF;
    ctx.fillStyle = '#fffacd';
    ctx.beginPath(); ctx.arc(celX, celY, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(15,15,30,0.85)';
    ctx.beginPath(); ctx.arc(celX - 3, celY - 2, 9, 0, Math.PI*2); ctx.fill();
    // glow
    ctx.globalAlpha = nightF * 0.25;
    ctx.fillStyle = '#fffacd';
    ctx.beginPath(); ctx.arc(celX, celY, 16, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  } else if (nightF < 0.3) {
    // Sun
    ctx.save();
    ctx.globalAlpha = 1 - nightF;
    // Rays
    ctx.strokeStyle = '#ffd840';
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4 + time * 0.0005;
      ctx.beginPath();
      ctx.moveTo(celX + Math.cos(a) * 12, celY + Math.sin(a) * 12);
      ctx.lineTo(celX + Math.cos(a) * 16, celY + Math.sin(a) * 16);
      ctx.stroke();
    }
    ctx.fillStyle = '#ffe040';
    ctx.beginPath(); ctx.arc(celX, celY, 10, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = (1 - nightF) * 0.3;
    ctx.beginPath(); ctx.arc(celX, celY, 18, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // weather drops
  for (const d of weatherDrops) {
    if (d.type === 'rain') {
      ctx.strokeStyle = 'rgba(140,180,255,0.7)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.vx*0.015, d.y + d.vy*0.015);
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(d.x, d.y, 2, 2);
    }
  }

  // grass ground (tiled)
  if (IMG.ground && IMG.ground.complete) {
    for (let i = 0; i < 500; i += 64) {
      ctx.drawImage(IMG.ground, i, 120, 64, 16);
    }
  } else {
    ctx.fillStyle = '#1a5c1a';
    ctx.fillRect(0, 128, 500, 8);
  }
  // 章节主题地面着色 (multiply 保留地面纹理)
  {
    const _ch = currentChapter();
    if (_ch.groundTint) {
      ctx.save();
      ctx.globalCompositeOperation = _ch.tintOp || 'multiply';
      ctx.fillStyle = _ch.groundTint;
      ctx.fillRect(0, 120, 500, 16);
      ctx.restore();
    }
  }

  // chest drops
  for (const c of chestDrops) {
    const cimg = c.rarity === 0 ? IMG.chestN : (c.rarity === 1 ? IMG.chestR : IMG.chestE);
    drawImg(cimg, c.x, c.y, 24, 24, false);
  }

  // monsters
  for (const m of monsters) {
    const t = MONSTER_TYPES[m.type];
    let _drawY = m.y;
    if (t.isBoss) _drawY += Math.sin(time * 0.004 + m.x * 0.01) * 2;
    drawImg(IMG[t.img], m.x, _drawY, t.size, t.size, m.flash > 0);
    if (m.elite) {
      // gold sparkle tint
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      ctx.globalAlpha = 0.35 + 0.15 * Math.sin(time * 0.008);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(m.x, m.y, t.size, t.size);
      ctx.restore();
    }
    // hp bar
    const w = t.size;
    const hpRatio = m.hp / m.maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(m.x, m.y - 5, w, 3);
    ctx.fillStyle = hpRatio > 0.5 ? '#4a4' : '#a44';
    ctx.fillRect(m.x, m.y - 5, w * hpRatio, 3);
  }

  // cat
  const CAT_SIZE = 52;
  const catX = 80, catBaseY = 136 - CAT_SIZE - 8;
  let catY = catBaseY;
  if (attackAnim > 0) catY -= 2;
  const catVisible = catDead > 0 ? (Math.floor(catDead * 6) % 2 === 0) : true;
  if (catVisible) {
    const _skin = OUTFITS[state.outfit] || OUTFITS[0];
    const _skinImg = IMG[_skin.img] || IMG.cat;
    // 水平翻转让猫朝右 (怪来方向). 皮肤自带武器时攻击瞬间整体前倾模拟挥砍
    if (_skinImg && _skinImg.complete) {
      ctx.save();
      if (attackArc > 0 && state.outfit !== 0) {
        const _swingP = Math.max(0, Math.min(1, 1 - attackArc));
        const _lean = Math.sin(_swingP * Math.PI) * 0.24;
        ctx.translate(catX + CAT_SIZE, catY + CAT_SIZE);
        ctx.rotate(_lean);
        ctx.translate(-(catX + CAT_SIZE), -(catY + CAT_SIZE));
      }
      ctx.translate(catX + CAT_SIZE, catY);
      ctx.scale(-1, 1);
      ctx.drawImage(_skinImg, 0, 0, CAT_SIZE, CAT_SIZE);
      if (catFlash > 0) {
        ctx.globalCompositeOperation = 'source-atop';
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, CAT_SIZE, CAT_SIZE);
      }
      ctx.restore();
    }
    // 宠物: 猫后方 一字排开 22x22
    for (let i = 0; i < Math.min(state.pets.length, 5); i++) {
      const pt = PET_TYPES.find(x => x.id === state.pets[i].typeId);
      if (!pt) continue;
      const petImg = IMG[pt.img];
      if (!petImg) continue;
      const px = catX - 26 - i * 24;
      const py = catBaseY + CAT_SIZE - 24 + Math.sin(time * 0.006 + i) * 1.5;
      ctx.save();
      ctx.translate(px + 22, py);
      ctx.scale(-1, 1);
      ctx.drawImage(petImg, 0, 0, 22, 22);
      ctx.restore();
    }
  }

  // cat hp bar
  const hpRatio = state.catHp / state.catMaxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(catX, catY - 7, CAT_SIZE, 4);
  ctx.fillStyle = hpRatio > 0.3 ? '#4c4' : '#c44';
  ctx.fillRect(catX, catY - 7, CAT_SIZE * hpRatio, 4);

  // 打字停摆: 猫咪陪伴 Z 气泡 (idleSec > 10 显示, >30 变 zzz)
  if (idleSec > 10 && catDead <= 0) {
    const zz = idleSec > 30 ? '💤' : '…';
    const bob = Math.sin(time * 0.003) * 2;
    ctx.save();
    ctx.font = 'bold 14px system-ui';
    ctx.globalAlpha = 0.75;
    ctx.fillStyle = '#ffeedd';
    ctx.fillText(zz, catX + CAT_SIZE + 2, catY + 12 + bob);
    ctx.restore();
  }

  // weapon swing — 仅默认皮肤画挥砍武器PNG (其他皮肤自带武器 + 整体前倾模拟)
  if (attackArc > 0) {
    const pivotX = catX + CAT_SIZE - 4;
    const pivotY = catY + CAT_SIZE * 0.45;
    const swingProgress = 1 - attackArc;
    const angle = -Math.PI * 0.3 + swingProgress * Math.PI * 0.8;
    if (state.outfit === 0) {
      const wep = state.equipment.weapon; const wepKey = wep ? wep.icon : 'swordWep'; const wepImg = IMG[wepKey];
      if (wep && wepImg && wepImg.complete) {
        ctx.save();
        ctx.translate(pivotX, pivotY);
        ctx.rotate(angle);
        const wSize = 22;
        ctx.drawImage(wepImg, 0, -wSize/2, wSize, wSize);
        ctx.restore();
      }
    }
    // Slash 弧永远画
    ctx.strokeStyle = `rgba(255,255,255,${Math.min(1, attackArc) * 0.8})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pivotX, pivotY, 22, -Math.PI * 0.3, angle);
    ctx.stroke();
  }

  // particles (size + glow)
  for (const p of particles) {
    const a = Math.min(1, p.life * 2);
    const sz = p.size || 3;
    if (p.glow) {
      ctx.globalAlpha = a * 0.4;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - sz, p.y - sz, sz * 3, sz * 3);
    }
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, sz, sz);
  }
  ctx.globalAlpha = 1;

  // float texts
  ctx.textAlign = 'center';
  for (const f of floatTexts) {
    const a = Math.min(1, f.life * 2);
    ctx.globalAlpha = a;
    ctx.fillStyle = f.color;
    let fontSize = 11;
    if (f.text.includes('LEVEL') || f.text.includes('BOSS') || f.text.includes('COMBO')) fontSize = 15;
    else if (f.text.startsWith('CRIT')) fontSize = 14;
    else if (f.text.startsWith('🏆')) fontSize = 14;
    ctx.font = 'bold ' + fontSize + 'px monospace';
    // text shadow for readability
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 3;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.textAlign = 'start';
}

function gameLoop(now) {
  try {
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    update(dt);
    render(now);
    // update stats
    const comboStr = comboCount >= 2 ? ` 🔥${comboCount}x${comboMultiplier()}` : '';
    if (!window._achTick) window._achTick = 0;
    window._achTick++;
    if (window._achTick % 60 === 0) checkAchievements();
    const xpNeeded = state.level * 15; const xpPct = Math.min(100, (state.xp / xpNeeded) * 100); document.getElementById('xpbar').style.width = xpPct + '%';
    const _nextCh = Math.floor(state.level / 10) * 10 + 1;
    const _chHint = (state.level < _nextCh - 1) ? ` →Lv${_nextCh}` : '';
    const bondStr = state.bond > 0 ? ` ❤${Math.floor(state.bond)}` : '';
    document.getElementById('stats').textContent = `[${chapterName(currentChapter())}${_chHint}] 💰${state.gold} ⚔️${state.kills} Lv${state.level}${bondStr}${comboStr}`;
  } catch(e) { console.error(e); }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// ============ INPUT ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { if (modalOpen) closeModal(); return; }
  if (modalOpen) return;
  playerAttack();
});

canvas.addEventListener('click', () => {
  if (modalOpen) return;
  playerAttack();
});

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ============ TAURI ============
async function hideWindow() {
  if (window.__TAURI__) {
    await window.__TAURI__.window.getCurrentWindow().hide();
  }
}

if (window.__TAURI__) {
  const { listen } = window.__TAURI__.event;
  listen('open-backpack', () => openModal('backpack'));
  listen('open-shop', () => openModal('shop'));
  listen('reset-data', () => resetData());
  let lastGlobal = 0;
  window.keyHits = 0;
  window.mouseHits = 0;
  window.tapStatus = 'pending';
  listen('global-input', (e) => {
    // counter updated via heartbeat
    if (modalOpen) return;
    const now = Date.now();
    if (now - lastGlobal > 150) { lastGlobal = now; playerAttack(); }
  });
  listen('input-heartbeat', (e) => {
    if (e.payload && typeof e.payload === 'object') { window.keyHits = e.payload.k || 0; window.mouseHits = e.payload.m || 0; }
  });
}

// Accessibility permission
async function openAxSettings() {
  if (window.__TAURI__) {
    try { await window.__TAURI__.core.invoke('open_ax_settings'); }
    catch (e) { console.error('open_ax_settings failed', e); }
  }
}

if (window.__TAURI__) {
  const { listen: listenAx } = window.__TAURI__.event;
  listenAx('accessibility-needed', () => { document.getElementById('axwarn').style.display = 'block'; window.tapStatus = 'pending'; });
  listenAx('input-tap-failed', () => { window.tapStatus = 'fail';
    const w = document.getElementById('axwarn');
    w.style.display = 'block';
  });
  listenAx('input-tap-ok', () => { document.getElementById('axwarn').style.display = 'none'; window.tapStatus = 'ok'; });
}
</script>

  setTimeout(() => {
    if (!state.classId) {
      try { openModal('class'); } catch (e) { console.warn('class modal failed', e); }
    }
  }, 600);
});
